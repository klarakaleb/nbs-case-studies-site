<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NbS case review (prototype)</title>
<style>
:root{--bg:#f6f7f9;--card:#fff;--line:#e3e6ea;--ok:#1a7f37;--bad:#cf222e;--accent:#0969da;--muted:#656d76}
*{box-sizing:border-box}body{margin:0;font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:#1f2328}
.app{display:grid;grid-template-columns:360px 1fr;height:100vh}
.side{border-right:1px solid var(--line);background:var(--card);overflow:auto}
.side h1{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:14px 16px 6px}
.filt{display:flex;gap:5px;padding:6px 16px 4px;flex-wrap:wrap}
.fb{font-size:12px;padding:3px 11px;border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer}
.fb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.flab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);align-self:center;margin-right:4px;min-width:38px}
.prog{padding:4px 16px 10px;color:var(--muted);font-size:13px}
.cl{padding:9px 16px;border-top:1px solid var(--line);cursor:pointer}
.cl-row{display:flex;gap:8px;align-items:baseline}
.cl:hover{background:#f0f3f6}.cl.sel{background:#ddf4ff;box-shadow:inset 3px 0 0 var(--accent)}
.cl .t{flex:1;font-size:13.5px}
.cl .n{font-size:11px;font-weight:700;color:#fff;background:var(--bad);border-radius:11px;padding:1px 7px;min-width:20px;text-align:center;align-self:center}
.cl.done .t{color:var(--muted);text-decoration:line-through}.cl.done .n{background:var(--ok)}
.main{overflow:auto;padding:28px 32px;max-width:860px}
.hdr{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#eaeef2;color:#444}
h2{margin:6px 0 2px;font-size:22px}.desc{color:#3a3f45;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin:14px 0}
.refs{margin:8px 0 22px}
.refgrp{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:6px 0}
.rl{font-size:12px;font-weight:600;color:var(--muted);width:100%;margin-bottom:2px}
.pill{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--line);color:var(--muted);text-decoration:none;cursor:pointer;display:inline-block}
a.pill:hover{border-color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.pill.BROKEN{color:var(--bad);border-color:#ffc9c9;background:#fff5f5}.pill.LIVE,.pill.REDIRECT{color:var(--ok)}.pill.BLOCKED{color:#9a6700;background:#fff8e6}
.item{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:8px;padding:14px 16px;margin:12px 0}
.item.kind-link{border-left-color:var(--bad)}
.item.kind-literature{border-left-color:#8250df}
.item.kind-resource{border-left-color:#0a7ea4}
.item.decided{opacity:.62}
.chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 7px;border-radius:5px;margin-right:7px;white-space:nowrap}
.chip.c-link{background:#ffebe9;color:var(--bad)}.chip.c-literature{background:#f3eefc;color:#8250df}.chip.c-resource{background:#e3f3f8;color:#0a7ea4}
.btns button.on{color:#fff}.acc.on{background:var(--ok);border-color:var(--ok)}.rej.on{background:var(--bad);border-color:var(--bad)}.dis.on{background:#9a6700;border-color:#9a6700}
.infobase{display:flex;align-items:center;gap:8px;margin:2px 0 18px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.ib-bar{flex:0 0 120px;height:8px;border-radius:4px;background:#d7dbe0;overflow:hidden;display:inline-block}
.ib-peer{display:block;height:100%;background:var(--ok)}
.ib-mini{height:3px;background:#e3e6ea;border-radius:2px;margin-top:4px;overflow:hidden}
.ib-mini span{display:block;height:100%;background:var(--ok)}
.note{margin-top:9px;width:100%;padding:5px 9px;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:13px;background:#fafbfc}
.note:focus{background:#fff;border-color:var(--accent);outline:none}
.item .lab{font-weight:600}.via{font-size:11px;color:var(--muted);font-weight:400;margin-left:8px;font-style:italic}
.item .u{font-size:13px;color:var(--accent);word-break:break-all;text-decoration:none;display:inline-block;margin-top:3px}
.item a.u:hover{text-decoration:underline}
.item .d{font-size:13px;color:var(--muted);margin-top:4px}
.item.flagged{border-left-color:#9a6700;background:#fffdf7}
.flag{background:#fff4e5;border:1px solid #ffd8a8;color:#9a6700;font-size:12px;padding:5px 9px;border-radius:6px;margin:7px 0}
.flag b{text-transform:uppercase;letter-spacing:.03em;font-size:11px}
.btns{margin-top:10px;display:flex;gap:8px}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:6px;padding:5px 12px;cursor:pointer}
button:hover{background:#f0f3f6}.acc{color:var(--ok)}.rej{color:var(--bad)}.dis{color:#9a6700}
.tag{font-size:12px;margin-left:8px;color:var(--muted)}
.top{position:sticky;top:0;background:var(--bg);padding-bottom:8px;display:flex;gap:10px}
.exp{margin-left:auto}.kbd{font-size:11px;color:var(--muted)}
.litbox{margin-top:22px;border-top:1px dashed var(--line);padding-top:14px}
.lithead{font-weight:600;margin-bottom:8px}
.litctl{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.litctl input{flex:1;min-width:240px;padding:6px 10px;border:1px solid var(--line);border-radius:6px;font:inherit}
.litctl button{background:var(--accent);color:#fff;border-color:var(--accent)}
.litback{margin-bottom:10px;font-size:12px}
.keylink{font-size:11px;color:var(--accent);cursor:pointer;margin-left:6px;font-weight:400}
#search{width:calc(100% - 32px);margin:6px 16px;padding:7px 10px;border:1px solid var(--line);border-radius:6px;font:inherit}
.authchips{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:2}
.authchip{font-size:12px;padding:3px 10px;margin:0 4px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer}
.authchip:hover{border-color:var(--accent);color:var(--accent)}
.authsm{font-size:11px;padding:1px 7px;margin:0 2px}
</style></head><body><div class="app">
<div class="side"><h1>Cases</h1><input id="search" placeholder="search cases…" oninput="renderList()"/><div class="filt" id="filt"></div><div class="filt" id="actfilt"></div><div class="prog" id="prog"></div><div id="list"></div></div>
<div class="main"><div class="top"><span class="kbd">j/k cases · a accept · r reject · d discuss</span>
<button class="exp" id="sortbtn" onclick="toggleSort()">Sort: review queue</button>
<button onclick="exportJSON()">Export decisions</button></div><div id="casePanel"></div></div>
</div><script>
const DATA=[{"title": "Curtailment of muddy floods in the Sompting catchment area", "db": "HUB + NbSI", "id": "681", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=681", "description": "The conversion of agricultural land to grassland and other management changes resulted in a drastic reduction of muddy floods, soil erosion and runoff in the Sompting catchment area in the South Downs of the UK. Nature-based Intervention: In 1992, around 100 hectares of agricultural land, mainly located on slopes vulnerable to runoff and erosion, were permanently set aside to revert back into grassland, funded through the EU's Common Agricultural Policy and an Environmentally Sensitive Area scheme. Overview of context and outcomes: Prior to these changes, the area and town of Sompting experienced intense flooding and excessive soil erosion in the 1980s and early 1990s. As a result of the intervention, runoff and continuous down-valley flows were reduced and valley floor flows were prevented from linking up, reportedly reducing flooding. Much less frequent flooding events were observed after the intervention, even in particularly wet years, according to a peer-reviewed study of the area.", "authors": [], "refs": [{"url": "https://doi.org/10.1079/SUM2003193", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://aru.figshare.com/articles/journal\\_contribution/Curtailment\\_of\\_muddy\\_floods\\_in\\_the\\_Sompting\\_catchment\\_South\\_Downs\\_West\\_Sussex\\_southern\\_England/23770548", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nOpen-access version of the existing DOI — accessible alternative if paywall hits.", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Good resource, credible, detailed WHEN I FOUND IT at another link, as the one found by AI here has no files attached only a summary. https://bsssjournals.onlinelibrary.wiley.com/doi/abs/10.1111/j.1475-2743.2003.tb00308.x"}, {"kind": "resource", "label": "Add source", "url": "https://www.naturebasedsolutionsevidence.info/article/curtailment-of-muddy-floods-in-the-sompting-catchment-south-downs-west-sussex-southern-england/", "detail": "🔎 Adds [🟢new]: peer-reviewed Evans & Boardman 2003 — 12-yr Sompting monitoring data\nIndependent analysis in parallel evidence database.", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Duplicate of prop-2026-06-11-a1f5d1"}, {"kind": "resource", "label": "Add source", "url": "https://www.parliament.uk/globalassets/documents/post/postpn265.pdf", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nAdds policy context for the soil-erosion framing.", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Info is fine, but only a little bit on the Sompting case.  ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Land management strategies from small-scale farmers in the upper amazon", "db": "NbSI", "id": "558", "country": "Peru", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=558", "description": "Small-scale farmers in the upper amazon have implemented a diverse array of strategies to combat soil erosion, land degradation, and decreasing fallow periods in order to minimize the effects on marginal farmlands and maximize the forest-soil relationship. Nature-based Intervention: In order to address the challenges of farming on marginal lands, small-scale farmers have implement a diverse array of land management and agricultural strategies to minimize their individual risk. In order to manage hill slopes and limit run-off, farmers strategically reforest steep areas and leave forest fragments within steep regions. They also create barriers of plant matter (called shuntos ) out of weeds found in the fields in order to slow water flow down the mountain and concentrate nutrients within the growing area. Farmers adapt to shorter fallow periods by encouraging the growth of nitrogen fixing native trees and fast-growing palms to accelerate the creation of secondary forest growth within the fields. Many of the small-scale farmers do not have heavy machinery and instead use fire as a key management tool. However, fire is not used as a single strategy, but rather a highly diverse mix of complete burns, patch burns, and burn piles depending on the crop and environmental conditions. This knowledge was then implemented in land restoration experiments under the farmers guidance, where they recommended reforestation rather than manure as the best way to rehabilitate the land. Overview of context and outcomes: Small-scale farmers in the upper amazon regions of Peru live in areas of increasing population density which are also considered biodiversity hotspots. Most of these farmers operate on marginal lands and must cope with soil degradation, deforestation, reduced fallow periods, and soil erosion. Through viewing the forest as the main driver in creating healthy soils it creates an ingrained dedication to positive forest management in order to ensure the greatest positive outcome for the environment and local communities. Learning from these local farmers not only provides key advice on how to limit marginal farmland degradation, but also how to reforest and restore damaged areas.", "authors": [], "refs": [{"url": "http://www.redalyc.org/articulo.oa?id=33913158005", "status": "BROKEN", "code": "503", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "http://www.redalyc.org/articulo.oa?id=33913158005", "detail": "HTTP 503", "extra": "", "via": "link check"}, {"kind": "literature", "label": "Add source", "url": "https://www.interciencia.net/wp-content/uploads/2018/01/421-MARQUARDT-9.pdf", "detail": "🔎 Adds [🟢new]: report on Peruvian Amazon land management (PDF)\nThe Marquardt action-research study of upper-Amazon farmers' slope/fallow/fire/weed management — including the shunto plant-matter barriers — that this case rests on. (Proposed by Claude Opus 4.8 enrichment pass, 2026", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "good info and broken NBSI link"}, {"kind": "literature", "label": "Add source", "url": "https://link.springer.com/article/10.1007/s11842-018-9408-3", "detail": "🔎 Adds [🟢new]: peer-reviewed Marquardt et al 2019 — Peruvian Amazon forest dynamics\nForest Dynamics in the Peruvian Amazon: Understanding Processes of Change' — the fallow-cycle and land-condition dynamics behind the farmers' strategies. (Proposed by Claude Opus 4.8 enrichment pa", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "good info and broken NBSI link"}], "health": {"broken": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Littlestock Brook Natural Flood Management", "db": "HUB", "id": "2032", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=2032", "description": "Award-winning project to reduce flood risk in a small, rural community through the creation of landscape features that store water flow during heavy rainfall, with wider benefits for biodiversity and people. Nature-based intervention: The Natural Flood Management project at Littlestock Brook aims to reduce flood risk in a small village, Milton-under-Wychwood, by diverting and storing water during heavy rainfall (1), with wider benefits for water quality, river habitat and people's health and wellbeing (2). Interventions were conducted across 17 fields on the Bruern Estate and four in Fifield. Prior to implementation, hydraulic modelling and consultations with local communities were conducted to evaluate the effectiveness of interventions in reducing flood risk. This resulted in the creation of 15 low soil banks (bunds) in field corners that can temporarily store 30,000 m3 of flood water, along with 27 woody dams to regulate water flow, 14 nutrient retention ponds and 5 other ponds. In addition, 150m of stream was de-culverted and re-connected to its natural course. Because the stream is deeply incised, swales (trenches) have been dug to enable water to flow out of the stream and into the storage areas when the level rises. To further improve habitats for wildlife and soak up floodwater, 14 hectares of native woodland were planted, some with the involvement of the local community. In addition, farmers in the catchment are using cover crops and reduced tillage to reduce soil erosion and runoff that pollutes watercourses. Overview of context: The Littlestock Brook is a tributary of the River Evenlode. The brook frequently overflows (3), with the worst case being in July 2007 when multiple properties in the small rural community of Milton-under-Wychwood were flooded to a depth of around 30 cm (4). However, as a relatively small number of properties were affected, it was not possible to obtain funding for engineered flood mitigation schemes (3), so the Natural Flood Management project was adopted to address flood risks instead. The project was implemented from 2016 to 2021 by Wild Oxfordshire, the Environment Agency and the Evenlode Catchment Partnership (5), and won the Climate Resilient Places category in the Flood &amp; Coast Excellence Awards 2021 (1).", "authors": ["Ramsbottom", "Pinto", "Roca", "Body", "Robotham", "Old", "Rameshwaran", "Sear"], "refs": [{"url": "https://www.wildoxfordshire.org.uk/evenlode/natural-flood-management", "status": "BROKEN", "code": "404", "field": "literature"}, {"url": "https://www.wildoxfordshire.org.uk/evenlode/natural-flood-management", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://www.gov.uk/government/publications/natural-flood-management-programme-initial-findings/using-the-power-of-nature-to-increase-flood-resilience", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.hrwallingford.com/insight/nfm-proves-its-worth-cotswolds", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.westoxon.gov.uk/media/y1zd0xrd/milton-under-wychwood-flood-report.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://consult.environment-agency.gov.uk/thames/littlestock-brook-nfm/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://consult.environment-agency.gov.uk/thames/littlestock-brook-nfm/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://nora.nerc.ac.uk/id/eprint/533217/1/N533217CR.pdf", "status": "BROKEN", "code": "0", "field": "literature"}, {"url": "https://static.iahr.org/34/368.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://onlinelibrary.wiley.com/doi/full/10.1002/esp.5483", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://oxlel.zoo.ox.ac.uk/research/projects/hydromorphological-hydraulic-and-ecological-effects-of-engineered-woody-dams-a-natural-flood-management-technique", "status": "BROKEN", "code": "0", "field": "literature"}], "actions": [{"kind": "link", "label": "Replace with Wayback archive", "url": "https://www.wildoxfordshire.org.uk/evenlode/natural-flood-management", "detail": "HTTP 404", "extra": "https://web.archive.org/web/20241005214302/https://www.wildoxfordshire.org.uk/evenlode/natural-flood-management", "via": "link check"}, {"kind": "link", "label": "Replace with Wayback archive", "url": "https://nora.nerc.ac.uk/id/eprint/533217/1/N533217CR.pdf", "detail": "connection timed out", "extra": "https://web.archive.org/web/20250708203705/https://nora.nerc.ac.uk/id/eprint/533217/1/N533217CR.pdf", "via": "link check"}, {"kind": "link", "label": "Replace with Wayback archive", "url": "https://oxlel.zoo.ox.ac.uk/research/projects/hydromorphological-hydraulic-and-ecological-effects-of-engineered-woody-dams-a-natural-flood-management-technique", "detail": "SSL error: [SSL: CERTIFICATE_VERIFY_FAILED] certificate verify failed: Hostname mismatch, certificate is not valid for 'oxlel.zoo.o", "extra": "https://web.archive.org/web/20220702145139/https://oxlel.zoo.ox.ac.uk/research/projects/hydromorphological-hydraulic-and-ecological-effects-of-engineered-woody-dams-a-natural-flood-management-technique", "via": "link check"}], "health": {"broken": 4, "ok": 7}, "base": {"peer": 2, "grey": 9}}, {"title": "Local committee promotes food security and adaptation through agrobiodiversity, coastal afforestation, and a pearl farm", "db": "NbSI", "id": "173", "country": "Marshall Islands", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=173", "description": "Namdrik Atoll is a coral atoll in the Pacific Ocean that already suffers from climate change-induced impacts similar to those faced by other low-lying island states. The Local Resource Committee is therefore working to reduce dependence on declining fisheries and implement various agricultural and revegetation methods to improve food security, coastal resilience, and the well-being of marine species. Nature-based Intervention: The Namdrik Atoll Local Resources Committee, in an effort to improve community self-sufficiency, food security, and adaptive capacity, is increasing the use of traditional crops such as breadfruit, taro, and native pandanus. These efforts have reduced the recent increased dependence on imports for food. Furthermore, a pearl farm has been created to provide jobs for local community members. These combined efforts also serve to reduce community dependence on declining fisheries. Sustainable fisheries policies, seasonal no take zones, and shoreline vegetation restoration have been implemented in order to further improve the resilience of the coastal community and protect marine ecosystems. Improved rainwater harvesting techniques and the increased use of solar technology have also been adopted. Overview of context and outcomes: The Namdrik Atoll Local Resources Committee was established to implement a Resource Management Plan created in consultation with local community members. This Plan included a focus on managing the likely impacts of climate change facing this part of the low-lying island state of the Marshall Islands. The main issues identified included waste water management, declining fisheries, erosion, flooding, invasive species, threats to mangroves, and seasonal shifts.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1_1374009695.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://globalislandpartnership.org/bright-spot/namdrik-atoll-local-resources-committee", "detail": "🔎 Adds [🟡corroborates]: GLISPA profile — management-plan crops/components\nGlobal Island Partnership 'bright spot' on the Namdrik Local Resources Committee — independent island-network documentation of the management plan, pearl farm and traditional crops. (Proposed by Claude Opus", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": ""}, {"kind": "resource", "label": "Add source", "url": "https://panorama.solutions/en/solution/food-security-and-climate-change-adaptation-atoll-community", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nPANORAMA solution on atoll food security and adaptation at Namdrik — structured building blocks for replication. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": "ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}, {"kind": "resource", "label": "Add source", "url": "https://www.ramsar.org/news/mangrove-rehabilitation-replanting-project-namdrik-jaluit-atolls-ramsar-sites-marshall-islands", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nRamsar on the mangrove rehabilitation at the Namdrik and Jaluit Ramsar sites — the coastal-afforestation strand of this case. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": "ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Local non-profit promotes forest restoration and community watershed management", "db": "NbSI", "id": "151", "country": "Ecuador", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=151", "description": "DECOIN, a locally managed non-profit organisation, facilitates forest restoration and community watershed management and promotes alternative sustainable livelihood options to combat the influence and impacts of copper mining in the area. Nature-based Intervention: In order to improve water security for local communities, Defensa y Conservación Ecológica de Intag (DECOIN) creates or purchases large reserves that can range from just a few hectares in size to thousands of hectares of cloud forest, which are then handed over to communities for sustainable management. Communities not only benefit from improved ownership of land and resources, but have also managed to benefit from improved water quality as a result of the better management of forest-hydrological reserves. Second, DECOIN manages forest restoration efforts in order to protect local biodiversity and ecosystems. To date, two native plant nurseries have been created and communities have planted over 50,000 trees. In addition to these nature-based solutions to water and ecological conservation, DECOIN promotes sustainable livelihood alternatives, aiming to support increased independence from mining activities, including ecotourism, shade-grown sustainable coffee, women-led handicraft production, and the creation of a fair trade shop. DECOIN also conducts environmental education and awareness programs and contributed to making the government of Cotacachi the first Ecological County in Latin America. Overview of context and outcomes: DECOIN, is a non-profit organisation comprised of and working for people living in the Intag-Cotacachi-Imbabura area of northwestern Ecuador. The region is remote and mountainous in the Tropical Andes and Tumbes-Chocó-Magdalena and is part of the Tropical Andes Hotspot that contains one-sixth of all plant life on the planet. DECOIN was established in 1995, largely as a response to the damage caused by encroaching copper mining interests on livelihoods and local Andean biodiversity. They work to oppose mining interests in the area, create forest reserves, and maintain community-managed water reserves for the benefit of local communities.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2019/12/DECOIN-Ecuador-1.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://decoin.org/accomplishments/", "detail": "🔎 Adds [🟡corroborates]: DECOIN accomplishments page (org self-report)\nDECOIN's own accomplishments record — 38 community watershed reserves totalling 12,000 ha and 75,000+ trees planted; the primary source for this case's claims. (Proposed by Claude Opus 4.8 enrichment pass, 2026", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": ""}, {"kind": "resource", "label": "Add source", "url": "https://news.mongabay.com/2023/01/in-ecuador-communities-protecting-a-terrestrial-coral-reef-face-a-mining-giant/", "detail": "🔎 Adds [🟡corroborates]: 2023 Mongabay feature on Intag communities vs mining\nRecent reporting on Intag communities defending the cloud forest against mining — current pressures on the conservation model this case describes. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": ""}, {"kind": "literature", "label": "Add source", "url": "https://restoration.elti.yale.edu/resource/communal-management-strategy-restoring-cloud-forest-landscapes-andean-ecuador", "detail": "🔎 Adds [🟢new]: peer-reviewed paper on communal cloud-forest restoration, Andean Ecuador\nYale ELTI library entry on communal management for cloud-forest restoration in Andean Ecuador — academic framing of the Intag model. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": ""}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Marine protected areas help maintain predators of invasive sea urchin pests", "db": "NbSI", "id": "674", "country": "Australia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=674", "description": "Two 'no-take' Marine Protected Areas (MPAs) off the coast of eastern Tasmania have been shown to conserve large-sized spiny lobsters ( Jasus edwardsii ) which are the most important predator of the long-spined sea urchin ( Centrostephanus rodgersii ) that is responsible for degrading kelp beds. Nature-based Intervention: Two 'no-take' Marine Protected Areas (MPAs), the Maria Island Marine Reserve and the Crayfish Point Research Reserve, were established and assessed by academic researchers 12 and 31 years, respectively, after their creation for their influence on urchin populations. The academic study found that the MPAs had prevented fishing of lobsters, effectively keeping the sea urchin population under control and preventing sea kelp bed degradation to barren states. Overview of context and outcomes: Warmer waters caused by climate change have increased the range of the long-spined sea urchin, driving it into new areas with less predators, while the higher temperatures have also increased their reproductive potential, resulting in larger urchin populations. The high populations of urchins have begun to overgraze sea kelp beds in various locations along the coast of Tasmania, and some sites have experienced a dramatic phase-shift, whereby the ecosystems shift into an impoverished, barren and undesirable state that is difficult to reverse. These findings are an example of how multiple interacting factors of human influence - in this case climate change and lobster fishing - can have non-linear consequences for ecosystem resilience.", "authors": [], "refs": [{"url": "https://doi.org/10.1073/pnas.0907529106", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "literature", "label": "Add source", "url": "https://academic.oup.com/icesjms/article/79/4/1353/6565266", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nSpiny lobsters prefer native prey over range-extending invasive urchins' — peer-reviewed evidence directly testing the predator-control mechanism the case rests on. (Proposed by Claude Opus 4.8", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": "ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}, {"kind": "literature", "label": "Add source", "url": "https://publish.csiro.au/MF/fulltext/MF23140", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nMulti-method diet analysis of lobster predation on barren-forming urchins — recent (2023) peer-reviewed support for the trophic interaction, full text open. (Proposed by Claude Opus 4.8 enrichm", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": "ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}, {"kind": "resource", "label": "Add source", "url": "https://theconversation.com/sea-urchins-have-invaded-tasmania-and-victoria-but-we-cant-work-out-what-to-do-with-them-194534", "detail": "🔎 Adds [🟡corroborates]: popular-science context on the Tasmania urchin invasion\nAccessible expert overview of the urchin invasion and management options across Tasmania/Victoria — broader management context around the MPA approach. (Proposed by Claude Opus 4.8 enrichment pass, 20", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": ""}], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Mayesbrook Climate Change Park Restoration Project", "db": "HUB", "id": "2012", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=2012", "description": "Multi-partner urban river restoration project to address climate change risks from floods and droughts with wider benefits for local communities and wildlife. Nature-based intervention: Mayesbrook Park is a 45 hectare park in East London which previously largely consisted of short-mown grass, and had become neglected and full of rubbish. During the creation of the park in the 1930s, the Mayes Brook which gave the park its name was diverted to run in a deep concrete channel along the west side of the park (1). This was fenced off and disconnected from the park, blocking the view of the river and limiting its function to a road drain and flood water channel (2). Flood risks were inadvertently increased, as an embankment formed by the accumulation of dredge from the brook lay at a higher level than adjacent properties, and two lakes created by the extraction of gravel and sand to build properties became heavily polluted by storm water overflow from the brook (3). In addition, many flood management assets on site (e.g. sluices, pumps) needed to be replaced. To address these risks and create a climate-resilient park for both people and wildlife, the river was brought back into the park and reconnected to the floodplain, treating it as an asset instead of a hazard. The project created 500 m of meandering channels to reduce high water flow, 450 m of graded river banks to increase river capacity, multiple sustainable urban drainage (SuDS) areas, 3 hectares of woodland, and 1.5 hectares of floodplain to facilitate floodwater storage (1,2). These initiatives also created attractive nature-rich green spaces for people and improved habitat diversity for wildlife, as well as making the park more resilient to droughts and helping to reduce the urban heat island effect. Local communities were engaged throughout the process, including through educational activities with school children, helping to promote local stewardship and a sense of pride in the area. Overview of context: The area was designated as an urban park in the 1930s, but development was halted in 1939 due to the start of the Second World War. Lack of maintenance and investment contributed to fears of crime and antisocial behaviour at the park, with fewer visitors (3), and in 2003 the London Borough of Barking and Dagenham Parks and Green Spaces Strategy identified the park as an area in need of rejuvenation (1). In 2007, as the masterplan to restore the site was being prepared by the Council, Thames River Restoration Trust, the Environment Agency and Design for London, the Mayes Brook site was also identified by the River Restoration Centre as having great potential to demonstrate natural flood management processes. This led to the focus on restoring the river in order to reduce flood and drought risk and provide more natural green spaces for park users.", "authors": ["Burgess-Gamble", "Everard", "Shuker", "Gurnell", "Petrou"], "refs": [{"url": "https://publications.naturalengland.org.uk/publication/11909565", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://publications.naturalengland.org.uk/publication/11909565", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.therrc.co.uk/sites/default/files/projects/2_mayesbrook.pdf", "status": "BROKEN", "code": "404", "field": "literature"}, {"url": "https://catalog.ipbes.net/system/assessment/193/references/files/568/original/The_Mayes_Brook_restoration_in_Mayesbrook_Park_East_London_-_an_ecosystem_service_assessment.pdf?1364316259", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "http://better-thames-network.westminster.ac.uk/files/Fishery_proposal_for_Mayesbrook,_Phillip_Petrou.pdf", "status": "BROKEN", "code": "0", "field": "literature"}, {"url": "https://www.lbbd.gov.uk/find-your-nearest/mayesbrook-park", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.wildlondon.org.uk/projects", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.therrc.co.uk/sites/default/files/projects/p1279.pdf", "status": "BROKEN", "code": "404", "field": "literature"}, {"url": "https://restorerivers.eu/wiki/images/3/3d/Mayesbrook_project_monitoring_strategy_-_September_2012.pdf", "status": "LIVE", "code": "200", "field": "literature"}], "actions": [{"kind": "link", "label": "Replace with Wayback archive", "url": "https://www.therrc.co.uk/sites/default/files/projects/2_mayesbrook.pdf", "detail": "HTTP 404", "extra": "https://web.archive.org/web/20240502170505/https://www.therrc.co.uk/sites/default/files/projects/2_mayesbrook.pdf", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "http://better-thames-network.westminster.ac.uk/files/Fishery_proposal_for_Mayesbrook,_Phillip_Petrou.pdf", "detail": "DNS failure (domain does not resolve)", "extra": "", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "https://www.therrc.co.uk/sites/default/files/projects/p1279.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 6, "broken": 3}, "base": {"peer": 0, "grey": 9}}, {"title": "Working wetlands at Steart Marshes", "db": "HUB", "id": "2014", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=2014", "description": "Flood risk management through the creation of working wetlands at Steart Peninsula Nature-based intervention: To manage flood risks to homes and businesses on the Steart peninsula, 300 hectares of farmland used for cattle grazing and arable crops were restored to intertidal habitats. As part of the Managed Realignment technique, new embankments were created a kilometre further inland and the old embankments were then removed (1). Over time, natural tidal processes created new channels and deposited silt and the seeds of salt-tolerant plants, restoring the original saltmarsh habitats. Farming intensity was reduced, and large areas of the reserve are now managed to stay wet. The Steart Marshes are working wetlands, providing habitat for wildlife, flood protection for local villages, grazing land for low-intensity production of saltmarsh lamb and beef (including from Longhorn cattle), and nursery sites in saltmarsh creeks that support commercial fish stocks such as sea bass (1). In addition, wildfowling is permitted in three areas within the site (2). Overview of context: The Steart peninsula consists largely of low-lying farmland created on drained, reclaimed land and is at high risk of flooding (3). By 1997, however, coastal defences had deteriorated as a result of erosion and sea level rise (5). Sea level in the Severn Estuary is predicted to rise by another metre in the next 100 years, resulting in the loss of an area the size of 500 football fields, and increasing the pressure on man-made embankments (4). The Steart Marshes project was proposed by the Environment Agency, to compensate for losses of intertidal habitat elsewhere in the Severn Estuary, partly through ‘coastal squeeze’ due to sea level rise and partly due to development at the port of Bristol. Work began in 2011 and was completed in 2014. Steart Marshes is now one of the largest wetland reserves in the UK (2) and is part of a Site of Special Scientific Interest, Ramsar Site, and Special Protection Area. The marshes are managed by the Wildfowl and Wetland Trust (WWT), as a demonstration site to showcase the value of wetlands (4).", "authors": ["Pontee", "Serato", "George", "Mossman", "Born", "Hill", "Lawrence", "Rae"], "refs": [{"url": "https://www.wwt.org.uk/our-work/projects/creating-steart-marshes", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.burnham-on-sea.com/tourist-information/visiting-stert-island/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.nationaltrail.co.uk/en_GB/short-routes/steart-circular/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.wwt.org.uk/wetland-centres/steart-marshes/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wwt.org.uk/wetland-centres/steart-marshes/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://web.archive.org/web/20070927182252/http://www.environment-agency.gov.uk/commondata/acrobat/stolford_to_combwich.pdf.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wwt.org.uk/wetland-centres/steart-marshes/news/grcf-monitoring-and-citizen-science-steart-marshes", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wwt.org.uk/wetland-centres/steart-marshes/news/otter-snapped-at-steart-for-first-time", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wwt.org.uk/wetland-centres/steart-marshes/wildlife-at-steart-marshes/#tab_summer3_1", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wwt.org.uk/wetland-centres/steart-marshes/news/released-black-tailed-godwit-seen-at-wwt-steart-marshes", "status": "BROKEN", "code": "404", "field": "literature"}, {"url": "https://www.wwt.org.uk/wetland-centres/steart-marshes/news/community-orchards-planted-at-steart", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wwt.org.uk/news- england-somerset-26952881", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.rewildingbritain.org.uk/why-rewild/rewilding-success-stories/case-studies/steart-marshes", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.sciencedirect.com/science/article/abs/pii/S0964569117310505", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://core.ac.uk/download/pdf/424580304.pdf", "status": "BROKEN", "code": "0", "field": "literature"}, {"url": "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0259033", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://uwe-repository.worktribe.com/index.php/preview/2614338/2019.10.26.ISESEA.Seoul.UK%27s%20learning%282019.08.29%29.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.icevirtuallibrary.com/doi/epdf/10.1680/cm.61149.663", "status": "BLOCKED", "code": "403", "field": "literature"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.wwt.org.uk/wetland-centres/steart-marshes/news/released-black-tailed-godwit-seen-at-wwt-steart-marshes", "detail": "HTTP 404", "extra": "", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "https://www.wwt.org.uk/wetland-centres/steart-marshes/visiting-steart-marshes/learning-at-steart-marshes/", "detail": "HTTP 404", "extra": "", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "https://core.ac.uk/download/pdf/424580304.pdf", "detail": "connection timed out", "extra": "", "via": "link check"}], "health": {"ok": 28, "broken": 3}, "base": {"peer": 3, "grey": 28}}, {"title": "Adaptive forest landscape restoration in the Shouf Biosphere Reserve", "db": "NbSI", "id": "533", "country": "Lebanon", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=533", "description": "Diverse interventions to restore forest landscapes in the Shouf Biosphere Reserve aim to boost biodiversity and reduce vulnerability to drought and heat waves. Nature-based Intervention: The Mediterranean Mosaics project works to increase the resilience of forest ecosystems in the Shouf Biosphere Reserve (SBR) through adaptive forest management and landscape restoration. Over the course of three years, several practices were piloted at various sites across the SBR. Among other interventions, previously isolated cedar forests were connected through oak forest stands that would shelter nascent and growing cedar trees from excessive solar radiation and herbivore damage while improving soil fertility and water retention. In another area of the SBR, fifteen species-diverse \"woodland islets,\" or fenced plots of diverse seedlings, were planted in overgrazed areas to boost ecological services and biodiversity. Elsewhere, various tree and shrub species were planted in high mountain forest habitats to stimulate upward migration in response to predicted changes in bio-climatic conditions due to climate change. Natural vegetation was restored in proximity to former mine sites to encourage growth over abandoned quarries. A 'green barrier' was also created between the road and adjacent wetland to increase the diversity of riparian species and improve habitat conditions for several bird species and other fauna. These combined efforts aim to counter the climate change-induced impacts of reduced rainfall and prolonged droughts causing water scarcity and the increased vulnerability of the landscape to extreme weather events such as forest fires and heat waves. Overview of context and outcomes: These combined efforts aim to counter the climate change-induced impacts of reduced rainfall and prolonged droughts causing water scarcity and the increased vulnerability of the landscape to extreme weather events such as forest fires and heat waves.", "authors": [], "refs": [{"url": "http://hdl.handle.net/2042/68833", "status": "BROKEN", "code": "0", "field": "resource"}, {"url": "http://www.scienzadellavegetazione.it/sisv/documenti/Articolo/pdf/526.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "http://hdl.handle.net/2042/68833", "detail": "connection timed out", "extra": "", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "http://www.scienzadellavegetazione.it/sisv/documenti/Articolo/pdf/526.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 2}, "base": {"peer": 1, "grey": 1}}, {"title": "Agro-forestry and ecosystem restoration for adaptation and disaster risk reduction", "db": "NbSI", "id": "363", "country": "Senegal", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=363", "description": "Six villages in Senegal engaged in agro-forestry, forest restoration, and assisted natural regeneration to improve the ecosystem-based adaptation potential of the area. Various nature-based structures were also deployed to reduce salt water intrusion on forest and agricultural land. Nature-based Intervention: The International Union for Conservation of Nature conducted the Ecosystems Protecting Infrastructure and Communities (EPIC) project in six countries including Senegal. EPIC worked primarily to build community resilience to climate change through ecosystem- and nature-based solutions. In Senegal, the project was implemented in six villages within the Djilor District in the Fatick Region. More specifically, EPIC in Senegal constructed 76 anti-salt bunds which are small structures made of deadwood or sticks built along the contours of slopes to reduce salt intrusion and soil erosion while increasing water infiltration. Furthermore, assisted natural regeneration was implemented to conserve and restore forest resources, with 7,192 saplings growing on 232 hectares of cultivated land by the end of the project's five-year time frame. Additionally, two nurseries were established to assist these natural regeneration and forest conservation efforts. The nurseries produced 1,766 plants over the course of five years. Agro-forestry parks were established using local forest species. Overview of context and outcomes: Livelihoods in this area depend largely on agriculture, livestock rearing and fisheries. These livelihoods are therefore inherently dependent on the surrounding ecosystems including mainly tropical and subtropical grasslands, savannahs, and shrublands as well as mangroves. The interventions were all fundamentally supported by capacity building efforts in which local communities participated in trainings and implemented the various initiatives themselves. This ensured that the interventions could continue to be carried out past the end date of EPIC's involvement in the area.", "authors": [], "refs": [{"url": "https://pubs.iied.org/pdfs/17631IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://www.iied.org/eba-evidence-policy-senegal", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nIIED's Senegal EbA evidence-and-policy page — the EPIC project evidence from village-level assisted natural regeneration feeding national adaptation policy. (Proposed by Claude Opus 4.8 enrichm", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Useful and relevant information at the link, but the NBSI case is offline  ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}, {"kind": "literature", "label": "Add source", "url": "https://reliefweb.int/report/senegal/ecosystem-based-approaches-adaptation-strengthening-evidence-and-informing-policy", "detail": "🔎 Adds [🟢new]: IIED/IUCN/UNEP EbA research report on the Senegal EPIC project\nThe EPIC Senegal research results report — strengthening the EbA evidence base from the village interventions this case describes. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Useful and relevant information at the link, but the NBSI case is offline"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Bioremediation to reduce nitrate contamination", "db": "NbSI", "id": "239", "country": "Sri Lanka", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=239", "description": "Bioremediation, restored vegetation, and organic farming methods have been implemented to reduce high levels of groundwater nitrate contamination and boost food production. Nature-based Intervention: In order to reduce dependence on chemical fertilizers, restore existing water resources, and regenerate the local ecosystem, the community engaged in bioremediation and biological fencing around production and planting areas. Bioremediation is the process of using organic microbes to clean up contaminated soil or groundwater. First, deep rooted trees were planted close together to form a root mat that would facilitate the uptake of contaminants. Bioremediation requires a carbon rich environment; therefore, coconut peat and straw were added to the sandy soil. As the surrounding trees grew, their leaf fall and detritus naturally provided the organic matter required for bioremediation. Furthermore, in order to boost agricultural production as well as restore the weakened local ecosystem, trees able to withstand salt laden sea breezes were planted as wind-breaking fences. Within and around the plant fences, monocropping was replaced with more organic agricultural methods. Nearly 8,000 plants of fifty-four different species were planted on the project site. The intervention's success inspired its implementation in over 1,000 wells in Kalmunai on the opposite coast of Sri Lanka. Overview of context and outcomes: In response to traditionally low and increasingly erratic rainfall in the region, local communities in Kalpitiya Peninsula had begun to withdraw water for crop and domestic use from the underlying aquifer. However, a high dependence on chemical fertilizer for monocropping had caused nitrates to seep into farm and domestic wells. Not only does such contamination contribute to the release of nitrous oxide, a greenhouse gas, but also implicates local health and well-being. At the start of the project, it was reported that 64% of local infants had methaemoglobin levels above the recommended range, a consequence of nitrate contamination. Additionally, the stability of local vegetation had been compromised by increasing temperatures, salt-laden winds, and the clearing of formerly protective mangroves and other trees for shrimp and agricultural production.", "authors": [], "refs": [{"url": "https://www.undp.org/content/dam/undp/library/Environment%20and%20Energy/Local%20Development/CWI_Fostering_Water_Security_and_Adaptation.pdf", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "http://www.analogforestry.org/wpsite/wp-content/uploads/2015/03/Bioremediation-of-Nitrates-in-groundwater.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.undp.org/content/dam/undp/library/Environment%20and%20Energy/Local%20Development/CWI_Fostering_Water_Security_and_Adaptation.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "http://www.analogforestry.org/wpsite/wp-content/uploads/2015/03/Bioremediation-of-Nitrates-in-groundwater.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Community-based ecosystem restoration", "db": "NbSI", "id": "143", "country": "Afghanistan", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=143", "description": "Community-driven landscape and ecosystem restoration emerged following decades of conflict, insecurity, and overharvesting of natural resources. Through tree planting, nurseries, forest patrols, river restoration, and improved resource management, communities have strengthened ecosystem functioning. Nature-based Intervention: Community members have protected two kilometres of river, constructed 125 check dams and 120,000 metres of terracing, and planted over 200,000 trees that prevent soil erosion and contribute to food security. Community tree nurseries and forest guard patrols support improved management of the reforestation efforts. The planting of varieties of indigenous trees and vine species enable ecosystem restoration and income generation for community members of one of the most remote and poor provinces in Afghanistan. The community efforts started in one local area but have since expanded to seven others, working to also ban illegal fishing and hunting, improve food security, and restore degraded lands throughout the region. Restoration techniques are developed and communicated in partnership with local religious leaders, commanders, and elders, ensuring a community-based approach to the interventions. Overview of context and outcomes: The Rural Green Environment Organization (RGEO) facilitates the project and works in northeastern Afghanistan to restore and more sustainably manage forests.", "authors": [], "refs": [{"url": "http://www.old.equatorinitiative.org/images/stories/winners/219/mdg_poster/mdg_1456516832.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://www.unep.org/news-and-stories/story/facing-floods-and-landslides-afghans-turn-nature-protection", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nUNEP field reporting on the Deh-shahr catchment work — native replanting, gully dams, terracing — with concrete flood/landslide protection outcomes for the communities the case describes. (Prop", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Resource seems fine, if a little brief, but the title is not indicative of much and the nbsi link is broken  ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}, {"kind": "literature", "label": "Add source", "url": "https://cdn.climatepolicyradar.org/navigator/AFG/2010/building-adaptive-capacity-and-resilience-to-climate-change-in-afghanistan\\_80b7b8ba38f37059de68c9f51ca68cab.pdf", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nThe underlying UNEP/GEF project document — objectives, sites (Badakhshan, Balkh, Koh-e Baba, Daikundi) and budget; the primary source for the intervention design. (Proposed by Claude Opus 4.8 e", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Very good, detailed report, but not sure if it's relevant as the nbsi link is broken and the title doesn't give much away"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Community-led mangrove restoration and sustainable fishing", "db": "NbSI", "id": "389", "country": "Thailand", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=389", "description": "Community-led initiative in Pred Nai village aims to restore a critically important mangrove ecosystem after decades of degradation caused by charcoal mining and pollution from commercial prawn farming. Nature-based Intervention: A group of Pred Nai community members decided to embark on forest restoration in response to the severe degradation of the local mangrove ecosystem by charcoal mining and water pollution from commercial prawn farming. The community group, led by a well-respected monk, further organised the support of surrounding villages to form a Community Coastal Resource Management Network in Trat Province. This Management Network now coordinates the area's reforestation efforts and facilitates the creation of private enterprises based on natural resources to help support local livelihoods. Micro-credit programs have also been created with the aim of increasing investments in support of local community needs. Primarily, the work of this community group revolves around the reforestation of mangroves in order to provide important ecosystem services including stabilised shorelines that can better combat coastal erosion. The mangrove reforestation efforts also aim to create valuable habitat for fish and crustacean species that were previously reported to be declining. In further support of this effort, a community patrol group improved enforcement of existing regulation against push nets that destroy near-shore coastal ecosystems and implemented a voluntary fishery closure during the reproductive season of an ecologically and economically significant crab species each October. Overview of context and outcomes: The mangrove ecosystem on Thailand's eastern seaboard once covered 48,000 hectares but had been reduced to only ten percent of its original size prior to the start of the Pred Nai Mangrove Restoration Project.", "authors": [], "refs": [{"url": "https://wedocs.unep.org/bitstream/handle/20.500.11822/7945/-Connecting%20the%20Dots_%20%20%20Biodiversity,%20Adaptation,%20Food%20Security%20and%20Livelihoods-2010publicationconnectingdots.pdf?sequence=3&amp%3BisAllowed=", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "literature", "label": "Add source", "url": "https://link.springer.com/chapter/10.1007/978-4-431-54804-1\\_8", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nCommunity-Based Mangrove Forest Management in Thailand' — documents Pred Nai's 1,920 ha restoration and the lessons that fed national community-forestry reforms. (Proposed by Claude Opus 4.8 en", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Very good, detailed report, but not sure if it's relevant as the nbsi link is broken and the title doesn't give much away"}, {"kind": "resource", "label": "Add source", "url": "https://www.recoftc.org/stories/local-wisdom-and-modern-science-community-based-mangrove-restoration-research", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nRECOFTC on combining local wisdom and science in Thai community mangrove restoration — the research partnership side of the Pred Nai model and its crab-bank economics. (Proposed by Claude Opus ", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Good, credible, limited detail, but nbsi link is broken   ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Conservation, forest restoration, and organic soil nutrient management in mountain ecosystems", "db": "NbSI", "id": "358", "country": "Nepal", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=358", "description": "Conservation, forest restoration, and organic soil nutrient management in mountainous areas of the Panchase region of Nepal aim to strengthen adaptive capacity of local communities and ecosystems. Nature-based Intervention: Working with national partners as well as 17 village development committees, the Nepal Mountain EbA project included maintaining and restoring ecosystems through agroforestry, forest resource conservation, plantation of fodder and broom grass species, restoration of wetlands, springs, and ponds, organic vegetable farming, promotion of bee-keeping, climate-smart agricultural practices, forest management activities, and more. Soil nutrient management was also promoted through the use of organic nutrients from compost dung and animal urine. Overview of context and outcomes: The Mountain Ecosystem-based Adaptation Project implemented in Nepal as one of several in a global programme took place in three districts: Kaski, Parbat, Syangja in the Panchase region.", "authors": [], "refs": [{"url": "https://pubs.iied.org/pdfs/17626IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://www.adaptation-undp.org/projects/mountain-eba-nepal", "detail": "🔎 Adds [🟡corroborates]: UNDP Mountain EbA Nepal project page\nUNDP's Mountain EbA in Nepal project page — the UNDP/UNEP/IUCN programme in the Panchase region (17 VDCs across Kaski, Syangja, Parbat) behind this case. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Limited information on that page, but some very sueful-looking ceondary links"}, {"kind": "resource", "label": "Add source", "url": "https://iucn.org/story/202211/using-ecosystem-based-adaptation-enhance-livelihoods-and-improve-resilience-mountain", "detail": "🔎 Adds [🟡corroborates]: IUCN story on the Nepal mountain EbA project\nIUCN on EbA outcomes in mountain ecosystems including Panchase — restored community ponds (240 households) and water sources (111 households). (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Interestign again, but included as one of several cases here with limited etail"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Conversion of World War II Factory into Wetland Preserve", "db": "NbSI", "id": "1156", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1156", "description": "The Fernald Preserve represents a former World War Two Uranium plant reimagined and revitalized as a community nature reserve which supports native biodiversity. Nature-based Intervention: The 1,050-acre former industrial site has been cleaned of its pollution and transformed into a mosaic of created habitats through reintroducing native plant and grass species. Included in this are 385 acres of grassland(including tallgrass prairies and savannas), upland forests, lakes, riparian corridors, and one of the largest man-made wetlands in Ohio. The intervention also included creating 7 miles worth of hiking trails to increase access to the natural site for the local community. Continued management of the site occurs with a large focus on improving ground and surface water quality. Interventions also take place to limit erosion and the presence of invasive species. Overview of context and outcomes: This site previously produced high-purity uranium metal products for the American military during World War Two. After it was decommissioned in 1989, efforts shifted to clean up and restore the environment surrounding the site. It took until 2006 for the project to have successfully cleaned and restored the landscape and at the time it was one of the largest environmental cleanup operations ever undertaken in U.S. history. It cost 4.4 billion USD to successfully clean and restore the site and it has been heralded as one of the most successful \"reuse\" projects undertaken in the United States.", "authors": [], "refs": [{"url": "https://www.energy.gov/sites/prod/files/2020/05/f75/FernaldPreserveFactSheet.pdf", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.energy.gov/sites/prod/files/2020/05/f75/FernaldPreserveFactSheet.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Deer Island Marshland Restoration Project", "db": "NbSI", "id": "1152", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1152", "description": "The Deer Island Restoration project uses revegetation and nearby dredging material to restore the barrier island's footprint and increase local community storm protection. Nature-based Intervention: Deer Island is a barrier island in the Mississippi sound which has recently undergone restoration efforts to reverse past degradation. Dredging material from nearby navigation channels was put to beneficial use to expand the shoreline and restore areas which has been degraded by erosion. This was paired with marshland restoration and vegetation planting on the island to accompany the newly creased shorelines. This resulted in the creation of new aquatic and terrestrial habitats for local species. Furthermore the plants play a key role in stabilizing the new shoreline and limiting the erosion of the newly transferred materials. Overview of context and outcomes: The Mississippi sound is prone to being hit with high intensity hurricanes. Historically these hurricanes have caused large scale damage to Deer Island and surrounding communities. Since 1850 the island has experienced near continuous erosion resulting in the loss of around 300 acres of land area. This equates to almost one third of the islands original 1850 footprint being lost. As climate change leads to higher sea levels and more severe storms the rate of erosion was likely to increase without intervention putting the local community at greater risk.", "authors": [], "refs": [{"url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://masgc.org/news/article/restoration-monitoring-provides-learning-opportunity", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.restorethegulf.gov/sites/default/files/Restoration%20of%20Deer%20Island%20with%20Beneficial%20Use%20of%20Dredged%20Material.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "https://www.restorethegulf.gov/sites/default/files/Restoration%20of%20Deer%20Island%20with%20Beneficial%20Use%20of%20Dredged%20Material.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 2, "ok": 1}, "base": {"peer": 0, "grey": 3}}, {"title": "Enhancing food security through forest landscape restoration", "db": "NbSI", "id": "247", "country": "Guatemala", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=247", "description": "Farmers in the Chiquimula province of Guatemala engaged in participatory planning and dissemination of a traditional agroforestry method called kuxur rum. Kuxur rum uses a native tree planted throughout agricultural plots to protect and improve the quality of soils yielding a more resilient agricultural system. Nature-based Intervention: The Food and Agriculture Organization (FAO) worked with the Guatemalan Ministry of Agriculture to implement a food security program in Chiquimula province. The main intervention required the implementation of a traditional agroforestry system called kuxur rum , which relies on the dispersed planting of the native Gliricidia sepium throughout agricultural plots. This practice helps protect soil and crops from the potentially erosive effect of rain and preserve soil moisture in the dry season. Furthermore, the shade provided by the trees reduces evapotranspiration while leaf litter naturally adds organic matter to the soil below. Kuxur rum is a traditional practice that allows farmers to take advantage of local natural resources and reduce dependence on foreign inputs. The planning, adoption, and promotion of the practice was disseminated through participatory farmer field schools. Overview of context and outcomes: Guatemala experiences high levels of food insecurity and malnutrition partly as a result of hazards to agricultural production including droughts, erosion, wildfires, landslides caused by extreme weather events, and lack of seeds and planting material.", "authors": [], "refs": [{"url": "https://portals.iucn.org/library/sites/library/files/documents/2015-034.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "literature", "label": "Add source", "url": "https://www.fao.org/in-action/kore/good-practices/good-practices-details/en/c/854298/", "detail": "🔎 Adds [🟢new]: FAO KORE good-practice profile of kuxur rum agroforestry\nFAO's good-practice write-up of kuxur rum against natural hazards — soil moisture +10-12%, drought resistance +15-20 days; the implementing agency's documented evidence. (Proposed by Claude Opus 4.8 enrichmen", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Good resource, credible, detailed. NBSI link not working"}, {"kind": "literature", "label": "Add source", "url": "https://www.diva-portal.org/smash/get/diva2:1727078/FULLTEXT01.pdf", "detail": "🔎 Adds [🟢new]: FAO kuxur rum report (PDF)\nKuxur Rum and the Management of Commons' — independent academic analysis of the governance side of the agroforestry system. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Good resource, credible, detailed. NBSI link not working"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Indigenous Fire Management of the Fish River Savanna", "db": "NbSI", "id": "1160", "country": "Australia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1160", "description": "Controlled burning managed by indigenous firefighters has been used to reduce carbon emissions and protect from intense wildfires. Nature-based Intervention: Managed fires were started to limit the dead and dry grasses within the savannas of the fire river region. These controlled burns worked as a method for reducing the risk of larger and more intense fires, but are also managed as a form of carbon offset. These managed low intensity fires, often called \"cool burns\", release far less carbon and do far less damage than intense wildfires often referred to as \"hot burns\". Through avoiding these high intensity fires with active management strategies, it reduces the risk faced by the local community and allows them to sell carbon credits for the avoided emissions which would have been generated by the more intense fires. Overview of context and outcomes: This program is built upon Indigenous science and the use of traditional pattern burning. Since the implementation of this technique it has drastically reduced the amount of high intensity late season fires which had increasingly threatened the savanna ecosystem. The area burnt by these destructive late season fires has been reduced from 35 percent pre-intervention, to less than three percent after its implementation.", "authors": [], "refs": [{"url": "https://www.researchgate.net/publication/279951384_Payment_for_ecosystem_services_in_practice_-_savanna_burning_and_carbon_abatement_at_Fish_River_northern_Australia", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.indigenous.gov.au/savanna-burning-a-cleaner-future", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://www.cleanenergyregulator.gov.au/Infohub/Media-Centre/Resources/erf-media-resources/fighting-fire-with-fire-in-fish-river#:~:text=Fish%20River%20was%20the%20first,on%20on%2Dground%20burning%20work", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.indigenous.gov.au/savanna-burning-a-cleaner-future", "detail": "HTTP 404", "extra": "", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "https://www.cleanenergyregulator.gov.au/Infohub/Media-Centre/Resources/erf-media-resources/fighting-fire-with-fire-in-fish-river#:~:text=Fish%20River%20was%20the%20first,on%20on%2Dground%20burning%20work", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 1, "broken": 2}, "base": {"peer": 1, "grey": 2}}, {"title": "Indigenous association works to secure land rights and sustainably manage natural resources", "db": "NbSI", "id": "144", "country": "Guyana", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=144", "description": "The South Central People’s Development Association (SCPDA) is a federation of 17 indigenous Wapichan communities in Guyana that works to secure indigenous land rights and promote socioecological resilience. Nature-based Intervention: To support efforts to secure land rights and the sustainable use of natural resources, the South Central People’s Development Association (SCPDA) have developed a ‘living digital map’ of their traditional lands, created by community mapping teams using field research, smart phones, GPS units, and a drone. These methods and resulting map are then used to detect deforestation and other environmental damage caused by illegal logging and mining in their territories. In parallel, a Common Land Use Plan, adopted by all 17 villages, builds on local traditional knowledge to guide the communities to sustainably manage and conserve their natural resources. As part of the plan, community-conserved areas were established and inter-community agreements on the use of natural resources in Wapichan territories were brokered. A proposal has been submitted to create a 1.4 million-hectare Wapichan Conserved Forest area, which is currently being complemented by over 100 community-conserved areas established to protect key sites for ecological, cultural, and spiritual heritage. Moreover, explicit actions have reportedly been taken in service of climate change adaptation to risks such as prolonged dry seasons and drought including community-based fire management agreements and altered farming methods. Overview of context and outcomes: The Wapichan community territory in Guyana represents one of the most biologically rich and diverse areas within the country.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/SCPDA-Guyana.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://www.forestpeoples.org/partners-countries/partners/partner/south-rupununi-district-council-srdc/", "detail": "🔎 Adds [🟡corroborates]: Forest Peoples Programme — partner-org context\nFPP partner page for the SRDC (SCPDA as secretariat) — the 2012 territorial plan 'Thinking Together for Those Coming Behind Us' and the smartphone-based territorial monitoring system. (Proposed by Claude Opus ", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Limited info and broken NBSI link"}, {"kind": "resource", "label": "Add source", "url": "https://news.mongabay.com/2012/02/guyanese-tribe-maps-connecticut-sized-rainforest-for-land-rights/", "detail": "🔎 Adds [🟡corroborates]: Mongabay feature — Wapichan community land-mapping\nReporting on the Wapichan territorial mapping — the community-led cartography underpinning the land-rights claim. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Limited info and broken NBSI link"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Indigenous council practices community-based conservation and natural resource management", "db": "NbSI", "id": "136", "country": "Bolivia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=136", "description": "An indigenous council representing the communities of an exceptionally biodiverse region of the central Tropical Andes, has successfully gained a collective title to manage several hundred thousand hectares of land. This collective land title allows for greater control and management purview to the original stewards of the land that continue to practice sustainable natural resource management, monitor endangered species, and promote sustainable livelihoods. Nature-based Intervention: The Consejo Indígena del Pueblo Tacana (CIPTA), or Indigenous Council of the Tacana People, established in 1992 brought a land claim to the Bolivian government and managed to obtain a collective land title to manage 389,303 hectares of forest and savanna. Despite significant deforestation pressures, the Tacana people have managed to preserve traditional land and natural resource management principles protecting the integrity of the land. The management framework of the land title continues this legacy by prioritizing biodiversity conservation, forest protection, and the establishment of sustainable livelihood options for the twenty communities that live in the territory. More precisely, CIPTA engages in monitoring of endangered species, coordinated planning of current and future land uses, stricter hunting regulations, and the implementation of various disaster prevention mechanisms including the restoration of native crop varieties and relocating chicken runs and other animal enclosures to higher altitudes less vulnerable to flooding. The CIPTA has also created 24 community-based associations to both conduct and live off of agroforestry, ecotourism, cocoa production, and sustainable caiman hunting enterprises. Furthermore, to raise the level of participation of women in community works, an independent women’s organization has been establis
