hile also restoring biodiversity. Nature-based Intervention: Eddleston Water was a straightened river that risked flooding 500 properties downstream. Therefore, the Scottish Tweed Forum embarked on an assessment of the natural flood management potential associated with restoring Eddleston Water. Working with local landowners, they managed to plant over 200 hectares of native trees, create cross-slope hedgerows, and install 116 log barriers on high tributaries to create small wetlands. Furthermore, 28 flood storage ponds were created, three kilometres of the main river were re-meandered, and several embankments were removed reconnecting the river with its surrounding floodplain. Overview of context and outcomes: Straightened rivers , as opposed to natural meandering rivers, are associated with negative environmental impacts caused by faster flows, the diversion of rivers from natural recharge points, and the disruption of natural wildlife habitats. The combined interventions implemented are intended to reduce flood risk in the river catchment as well as restore the natural ecosystem of the river.", "authors": [], "refs": [{"url": "https://www.rspb.org.uk/globalassets/downloads/policy-briefings/nature-based-solutions-adaption-report.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://tweedforum.org/our-work/projects/the-eddleston-water-project/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "http://tweedforum-org.stackstaging.com/wp-content/uploads/2018/08/Eddleston_Report_Jan_2017.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://northsearegion.eu/media/15157/integrating-natural-capital-into-flood-risk-management-appraisal-report-v3.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 4}, "base": {"peer": 0, "grey": 4}}, {"title": "Rural community-led climate action to reduce emissions", "db": "NbSI", "id": "1168", "country": "Mexico", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1168", "description": "The the Laguna Om ejidos came together to manage 84,000 hectares of tropical forest in order to generate carbon credit revenues which could be reinvested into the community. Nature-based Intervention: Rural communities often come together to govern their land through something called ejidos . Within the Laguna Om ejidos the community has decided to invest in restoring the forest and using the carbon credits to further nature restoration and fund the community. They utilized on-the-ground technical support from their business partners in order to calculate emissions reductions and strategize the best land use options. The community then designated 84,000 hectares of forest for protection on their lands as part of an updated land use strategy. Overview of context and outcomes: The Laguna Om is one of the largest ejidos within Mexico and encompasses approximately 84,000 hectares of land. The ejido network in Mexico contains more than two-thirds of the country’s water and more than 80 percent of its overall biodiversity. The Laguna Om collaborates with the company Toroto, which is based in Mexico City specializes in nature-based solutions.", "authors": [], "refs": [{"url": "https://www.wbcsd.org/download/file/15179", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Salt marshes for flood defense in the Dutch Wadden Sea", "db": "NbSI", "id": "730", "country": "Netherlands", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=730", "description": "Evaluations of man-made salt marshes in the Dutch Wadden Sea, on the northern coast of the Netherlands, found that they may be more economically viable than increasing the height of dikes and thus potentially reduce the need for dike reinforcement. Nature-based Intervention: Classified as semi-natural habitats, approximately 9000 hectares of constructed salt marshes exist on the shores of the Netherlands and the barrier islands. For a particular case study location in the Netherlands where 25 kilometers of man-made salt marsh were constructed along a dike, a cost-effectiveness evaluation found salt marsh construction to be more cost-effective than dike heightening in instances where economic damage in the case of dike breaching is small to moderate. Models of the system showed that construction of earthen breakwaters within the saltmarsh, above the area where sediment naturally accumulates, appears to be more effective than increasing the height of the dike itself. The Wadden Region Delta Programme has therefore determined through its research that integrating salt marshes into flood defense plans in this region is a preferred strategy for climate change adaptation. Overview of context and outcomes: The Wadden Sea lies between the coasts of the Netherlands, Germany and Denmark and a string of barrier islands stretching 500 kilometers separating it from the North Sea. Consisting of tidal mudflats and salt marshes, it is an important biologically productive ecosystem, of which several stretches have earned the title of UNESCO World Heritage Sites.", "authors": [], "refs": [{"url": "https://doi.org/10.1007/s11027-015-9640-5", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://doi.org/10.1016/j.ocecoaman.2019.01.010", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://doi.org/10.1016/j.coastaleng.2018.05.002", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 3, "grey": 0}}, {"title": "Sand dams and climate-smart agriculture", "db": "NbSI", "id": "751", "country": "Kenya", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=751", "description": "Sand dams have been constructed along sandy rivers to improve the water retention capacity and quality of the landscape's soil. Combined with more sustainable farming techniques, communities are reporting greater agricultural productivity and water security. Nature-based Intervention: Local Communities are building and employing sand dams, a low-cost technique to harvest rainwater. More specifically, sand dams are reinforced stone masonry walls built along rivers to accumulate sand which is later washed down during the rainy season to protect water sources from contamination and evaporation. These sand dams require very minimal maintenance and can last for 60 years or more. Water collected behind sand dams raises the water table in the surrounding area improving soil quality and nourishing crops and grazing lands. This improved soil quality in turn enables the planting of trees with a higher survival rate which sets in motion a symbiotic cycle of increased water retention capacity and soil quality improvement. The construction of sand dams was complemented by the increased uptake of sustainable farming methods including the introduction of drought-tolerant seeds, land terracing to prevent soil run-off, and the use of tree nurseries. Overview of context and outcomes: Climate change induced changes in rainfall have resulted in prolonged periods of drought that lead to the loss of grasses, trees, topsoil and reductions in the land's ability to retain water. These disturbances threaten both the water security and agricultural productivity of communities in the area.", "authors": [], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Sand dune restoration for coastal resiliency", "db": "NbSI", "id": "1162", "country": "Portugal", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1162", "description": "Through utilizing European Union funding the island of Porto Santo underwent Dune restoration efforts to increase its coastal resiliency. Nature-based Intervention: This intervention focuses on the restoration and continued survival of the sand dune ecosystem on the island of Porto Santo. In order to achieve this the project is focusing on the restoration of a higher-risk depression dune area. The intervention involves the replanting of 39,000 native plants in the area, working to control invasive species in a buffer area and geomorphological work to support the dunes using approximately 90 000 meters cubed of dredged sand from near-shore sand banks. This dredging is strategically done to occur without without compromising regular coastal dynamics. They also plan to utilize sustainable agricultural techniques in pre-dune areas to mitigate the losses threatened through wind-erosion. There are currently 19,000 meters squared worth of agricultural demonstration plots which have show wind-erosion reductions including almost 11,000 meters squared of vineyards. Overview of context and outcomes: The sand dunes on the coastline of the Madeira archipelago island of Porto Santo Island are an attractive tourist and recreation destination on island which is mainly rocks and rolling hills. This dune ecosystem is however at risk, due to increases in extreme weather events due to climate change which threaten the ecosystem. Increases in sea level rise are also likely to lead to coastline regression within the area.", "authors": [], "refs": [{"url": "https://webgate.ec.europa.eu/life/publicWebsite/index.cfm?fuseaction=search.dspPage&n_proj_id=7556", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Seed banking and a hybrid of traditional and novel sustainable agriculture techniques", "db": "NbSI", "id": "390", "country": "India", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=390", "description": "Seed banking and a combination of revitalised traditional and introduced novel agricultural practices are helping improve food security and climate change adaptive potential in the drylands of Karnataka, India. Nature-based Intervention: In the drylands of Karnataka state in India, the Genetic Resource, Energy, Ecology and Nutrition (GREEN) Foundation is working to conserve agricultural biodiversity and encourage sustainable farming practices mainly through the provision and protection of climate-resilient traditional seed varieties. A method of on-farm selection of high-yielding, pest- and disease-resistant strains helps improve food security for farmers in the drylands partly through the improved ability to adapt to future climate change impacts. The Foundation also practices seed banking which has facilitated the collection and conservation of over 90 varieties of finger millet, 85 varieties of paddy, 55 minor millet varieties, 25 pulses and numerous oil seeds and vegetables. Kitchen gardens have also been encouraged, providing hundreds of families with food, fuel, medicines, and fodder for livestock. Seed fairs, seed management committees, and seed saver networks are helping spread knowledge about the value of seed banking for food security and climate change adaptation. Overview of context and outcomes: These efforts were further bolstered by a revitalisation of traditional and incorporation of new agricultural practices including mixed cropping, intercropping, nursery production, and indigenous agroforestry and livestock management.", "authors": [], "refs": [{"url": "https://wedocs.unep.org/bitstream/handle/20.500.11822/7945/-Connecting%20the%20Dots_%20%20%20Biodiversity,%20Adaptation,%20Food%20Security%20and%20Livelihoods-2010publicationconnectingdots.pdf?sequence=3&amp%3BisAllowed=", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Seed banks and support for Palestinian farmers", "db": "NbSI", "id": "117", "country": "West Bank and Gaza", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=117", "description": "The Union of Agricultural Work Committees (UAWC) is an organization that works with Palestinian farmers in the West Bank and Gaza Strip to help them achieve agricultural sovereignty through the creation of seed banks and implementation of sustainable agriculture practices. Nature-based Intervention: The UAWC facilitates access to locally adapted seed varieties and other germplasm through the construction of seed banks and fruit tree nurseries. Other activities include reclaiming degraded land, rehabilitating pasture land, training and supporting farmers in using organic agriculture techniques, and assisting with integrated water management including supporting the sustainable harvesting of rainwater and the installation of greywater treatment systems. Overview of context and outcomes: The UAWC supports 47 local agricultural committees and vulnerable farmers in a variety of ways. The organization also engages in lobbying and advocacy activities for the rights of Palestinian farmers in the face of ongoing conflict.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1471988073.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Silvo-aquaculture in the Mekong Delta", "db": "NbSI", "id": "260", "country": "Vietnam", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=260", "description": "Communities along the Mekong Delta coast are coming together to create and experiment with new silvo-aquaculture techniques to reduce the risk of fisheries collapse and diversify incomes. Nature-based Intervention: Fishers are partnering with the Bac Lieu Experimental Station for Aquaculture to test, implement, and share ecological aquaculture techniques. In particular, silvo-aquaculture, or the inclusion of mangroves in fisheries, is increasingly being practiced. An important element of the initiative is the establishment of Farmer Interest Groups that allow for collaborative experimentation and learning as well as economic support for investment and financial hardship recovery. Overview of context and outcomes: Fisheries along the Mekong Delta coast suffer from frequent calamities due to the fragility of monoculture techniques. Through these Farmer Interest Groups, silvo-aquaculture methods have been improved over time by testing various species compositions, stock densities, water management, nursing, and conservation systems.", "authors": [], "refs": [{"url": "https://www.worldfuturecouncil.org/wp-content/uploads/2016/01/WFCplus_2014_Blue_Solutions_from_Asia_and_the_Pacific.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Silvopastoral system addresses climate change and livelihoods risk in livestock sector", "db": "NbSI", "id": "1261", "country": "Colombia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1261", "description": "Livestock based agriculture is both a large source of emissions and critical source of income for Colombia, with investments in silvopastoral systems being a critical pathway for reducing emissions while sustaining this vital income source. Nature-based Intervention: The project worked with 4,100 farms across the country in order to facilitate the conversion of 38,000 ha of degraded cattle pastures into silvopastoral systems. Silvopastoral systems are those that involve planting trees, shrubs and fodder crops on grazing land in ways that increase and preserve tree cover, enhance carbon dioxide sequestration, improve biodiversity and soil quality, and increase livestock productivity. In this case the intervention targeted rural cattle ranchers and hoped to increase habitat connectivity within the landscape. In this national program the additonal money provided by the United Kingdom was able to set up a payment for ecosystem services scheme which compensated farmers for the additonal carbon captured on their lands as part of the silvopastoral system. The funding was also able to support farmers through technical assistance and information exchange. This included setting up demonstration farms and subsidizing the cost of seedlings, trees and organic fertilisers in order to facilitate the adoption of silvopastoral systems. Overview of context and outcomes: In Colombia the agricultural sector produces 38% of the countries greenhouse gas emissions. At the same time cattle ranching employs 28% of the rural populations, making it critical to the livelihoods of these communities. Poor farmers in rural communities are also especially vulnerable to climate change risks, making their income sources potentially unstable. The outcomes of this intervention caused the doubling of the sustainable livestock target in the 2018-2022 Colombian National Development Plan.", "authors": [], "refs": [{"url": "https://data.jncc.gov.uk/data/376d989f-0563-4e7f-b034-c79108f63758/nbs-triple-win-toolkit.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Sussex Kelp Recovery Project", "db": "HUB", "id": "1387", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1387", "description": "The Sussex Kelp Recovery Project has been established to monitor, assess, and assist the natural recovery of kelp forests on the West Sussex Coastline, following a public campaign that led to landmark legislation banning trawling in the area. Nature-based intervention: The Sussex Kelp Recovery Project (SKRP) commenced in March 2021, after a long campaign led to the implementation of the Sussex Nearshore Trawling Byelaw to prevent further damage to the remaining kelp beds. This legislation bans heavy trawling throughout the year to protect 304 km 2 of kelp forests along the Sussex coastline, and the marine life they support. While most kelp projects globally use active planting, the SKRP is exploring whether it is possible to ‘rewild’ the seas by supporting and monitoring the natural recovery of the kelp following the ban on trawling. A key feature of the project is that they adopt a holistic approach, examining both socioeconomic and ecological outcomes. This is supported by thorough monitoring using various cutting-edge techniques. Although the overall goal is for nature-led recovery in the protected site, SKRP continuously assesses whether active restoration would also be beneficial – they report that additional planting and seeding may become useful in the future. They also work to identify and manage potential barriers to recovery, with a large focus on sedimentation processes, which are identified as a key issue by various stakeholders. Community engagement and education about the importance of kelp ecologically, commercially and recreationally are also major elements of the intervention. The SKRP have worked with universities and local schools, and have acquired a large social media presence. They have also hosted a Kelp Summit, furthering their goal of reaching a global audience. The Sussex Wildlife Trust trialled the application of the IUCN Global Standard for NbS to inform and develop the design of the SKRP, acting as one of initial projects in the UK piloting the Standard's self-assessment tool. The project is also part of the wider Weald to Waves initiative, which aims to establish a 100 mile nature recovery corridor across Sussex to connect the fragmented landscape and link it to the sea. Overview of context: Kelp are large brown seaweeds (algae) commonly found in cool, rocky waters close to the shore. Thriving at high densities, they form so-called 'kelp forests,' which are some of the most biodiverse marine environments on the planet. Back in the 1970’s, the kelp forests along the Sussex Coast were vast and teemed with life. The once 170 km 2 kelp forest supported numerous species including the European Lobster and Sea Bass. Since then however, the devastation of the Great Storm of 1987 alongside extensive fishing using heavy trawler nets has resulted in the disappearance of 97% of the kelp and the marine life it supported. Under growing concern, the ‘Help our Kelp’ campaign was set up which worked alongside the Sussex Inshore Fisheries and Conservation Authority to pass the byelaw. This eventually evolved into the SKRP which oversees the recovery today.", "authors": [], "refs": [{"url": "https://www.bluemarinefoundation.com/wp-content/uploads/2023/03/Sussex-Kelp-Recovery-Project-Progress-Impact-Report-2021-2022.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.bluemarinefoundation.com/wp-content/uploads/2023/03/Sussex-Kelp-Recovery-Project-Progress-Impact-Report-2021-2022.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://sussexkelp.org.uk/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://sussexkelp.org.uk/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.youtube.com/watch?v=WCu0zXEDhAc&ab_channel=SussexWildlifeTrust", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://sussexwildlifetrust.org.uk/helpourkelp", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 6}, "base": {"peer": 0, "grey": 6}}, {"title": "Sustainable agriculture for the restoration of land degraded by sand mining", "db": "NbSI", "id": "120", "country": "Ghana", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=120", "description": "Sustainable land management and livelihood activities were employed with the aim of restoring land degraded by sand mining. Nature-based Intervention: The Integrated Development in Focus program in Ghana, initiated in 2009, tackles land degradation caused primarily by sand mining with its land restoration and sustainable livelihoods program. It does this by supporting reforestation, composting with locally available resources including house and farm waste or manure, organic agriculture, agroforestry, and conservation agriculture. The program involves provisioning composting kits and more efficient cooking stoves, setting up tree nurseries, providing alternative crop species, and introducing concepts such as intercropping, the use of local crop varieties, maintenance of a community garden, and the rearing of small livestock. Overview of context and outcomes: The main beneficiaries of the program are local women farmers, who are trained and subsequently commit to educating ten additional farmers each in sustainable farming techniques, ensuring the continuity of the program.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1459268655.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Sustainable forest management and agroforestry implemented by indigenous communities", "db": "NbSI", "id": "1232", "country": "Bolivia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1232", "description": "Working with 271 indigenous producers of coffee and cocoa, the project works to implement sustainable agroforestry practices in the indigenous territories of the T’simane Mosetene, Leco and Tacana communities. Nature-based Intervention: The project focused on building technical capacity in agroforestry through hosting training and workshops. They promoted an agroforestry model which focuses on having a diversified forest canopy alongside the important crops of coffee and cocoa. These biodiverse plots can support more native species and capture more carbon than traditional plantations. In order to promote the security of these interventions and support indigenous land tenure a decentralized and cost-efficient system for control and vigilance of indigenous territories was established. This program uses technologies such as phone apps and collaborations with local national park authorities to bolster protections against illegal land encroachment. Overview of context and outcomes: The Territories of the T’simane Mosetene, Leco and Tacana indigenous communities cover over 1,000,000 ha and intersect with the Madidi and Pilón Lajas protected areas. This highly biodiverse landscape is threatened by deforestation which is done for illegal agricultural clearing and settlements, timber extraction and gold mining. These acts are damaging to the livelihoods of forest-dependent communities and perpetuate cycles of poverty.", "authors": [], "refs": [{"url": "https://data.jncc.gov.uk/data/376d989f-0563-4e7f-b034-c79108f63758/nbs-triple-win-toolkit.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.darwininitiative.org.uk/project/DAR24011/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Tenure reform and sustainable forest management", "db": "NbSI", "id": "294", "country": "Philippines", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=294", "description": "Watershed rehabilitation and sustainable forest management is promoted through land tenure reform with a specific focus on increasing land ownership among women. Nature-based Intervention: The Philippine Environmental Governance Project (EcoGov) assisted the local government in creating and implementing a Forest Land Use Plan (FLUP) for the municipality of Wao that awarded individual property rights (IPR) to farmer-claimants under the condition that they follow a set of conservation-oriented agroforestry principles and forest land-use guidelines. Such guidelines include having to prepare and implement a plan for cultivating perennial fruit or native trees and monitoring any forest violations. Addressing a historical lack of attention to gender differences in other iterations of land tenure reform, this project also aimed to increase land ownership among women. The involvement of a Gender and Development team ensured that at least 20% of current IPRs were awarded to women. Furthermore, the IPRs were assigned within a watershed of almost 2,000 hectares and land-claimants were required to contribute to a watershed rehabilitation program through the plantation of rubber and fruit trees. Overview of context and outcomes: Although Wao's forestlands are large, nearly 20,000 hectares in size, they have suffered significant deforestation which leads to increased intensity of flash flooding and water shortages during long periods of drought, issues that the watershed rehabilitation program aims to alleviate.", "authors": [], "refs": [{"url": "https://portals.iucn.org/library/efiles/documents/2011-070.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "The Blenheim Estate: Nature-based solutions in a historic parkland", "db": "HUB", "id": "1943", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1943", "description": "The Blenheim Estate shows how nature-based solutions can be used within and around a historic parkland and World Heritage site, to support Net Zero goals, improve water quality, provide health and wellbeing benefits and support local economies. Nature-based intervention: A range of nature-based approaches are being used at Blenheim in support of their Net Zero ambitions, as well as to reduce soil erosion, improve water quality and support local communities. Native woodlands (along with commercial timber species) have been planted on the sides of the Dorn and Glyme valleys, north of the historic parkland, to sequester carbon and reduce runoff of sediment into the river. On the valley floor, the floodplain is being restored by creating wetlands and re-meandering the channel. These measures are intended to reduce the sediment load entering Blenheim Lake, which had to be dredged recently at great expense as it had become extremely shallow. Within the historic parkland, the ancient wood-pasture at High Park is managed through grazing by cattle to trample the bracken (1). The estate has also recently partnered with the Berkshire, Buckinghamshire and Oxfordshire Wildlife Trust (BBOWT) to develop plans for restoration of the northern part of the park, including new wildflower meadows for pollinators, potentially funded through biodiversity net gain (2). These initiatives are carried out in partnership with conservation organisations, research groups, and local businesses. In addition, Blenheim Estate aims to create local jobs and support local businesses, (3), as well as creating active travel routes, encouraging health walks and hosting forest schools. Overview of context: Blenheim Park is a UNESCO World Heritage Site and a major visitor attraction. The Palace and gardens are set in a Capability Brown parkland that includes the highest concentration of ancient oak trees in Europe. High Park, an ancient oak woodland designated as a Site of Specific Scientific Interest (SSSI), has been under continuous management since mediaeval times, originally as a deer park with fishponds and timber production (1), with new oaks planted for 25 years starting in 1983 (4). The northern part of the parkland is used for agriculture, and has now been reverted from arable to pasture. As well as the park, the estate (which covers 12,000 acres) includes farmland and forestry in the surrounding area, and is involved in housing development on its land. Blenheim Estate aims to show how its ambitious sustainability targets can be delivered as part of a viable business model that also balances the need to maintain the historic landscape and cater for large numbers of visitors.", "authors": ["Baggs", "Blair", "Colvin", "Cooper", "Day", "Selwyn", "Townley"], "refs": [{"url": "https://www.blenheimestate.com/news/local-farmers-join-forces.html", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/land/strategy/natural-balance/high-park/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.bbowt.org.uk/news/bbowt-partners-blenheim-put-nature-heart-estate", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimpalace.com/community/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.british-history.ac.uk/vch/oxon/vol12/pp460-470", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/news/morgan-sindall-tree-project.html", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/land/strategy/landed-gently/growing-natural-capital/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/land/strategy/landed-gently/stage-zero/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/news/survey-biodiversity-woodland.html", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/news/owl-chicks-hatch.html\\", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://bsg-ecology.com/promotion-of-the-profession-blenheim-bats-on-countryfile/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/news/rare-bat-colonies.html", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/land/strategy/natural-balance/bees/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://rowsehoney.co.uk/news/bee-educated/discover-the-enchanting-world-of-britains-wild-bees-at-blenheim-palace", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://rowsehoney.co.uk/hives-for-lives/feed-the-bees/wildlife-thriving-as-part-of-major-conservation-project", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimpalace.com/flipbook/blenheim/2023/Blenheim-Local-Newsletter-Winter-2023/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/land/strategy/grass-routes/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/land/strategy/natural-health-service/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/land/strategy/natural-health-service/aspire/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://starfishsearch.com/wp-content/uploads/2022/03/Blenheim-Palace-Appointment-of-a-Trustee.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimpalace.com/about-us/smt/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimpalace.com/restoration/savingthefinestview/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/news/rare-bats.html", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/news/robot-to-monitor-estate%E2%80%99s-ecosystem.html", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.forestresearch.gov.uk/tools-and-resources/statistics/forestry-statistics/forestry-statistics-2021/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://bsg-ecology.com/portfolio_page/blenheim-palace-ecological-lake-restoration/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 27}, "base": {"peer": 0, "grey": 27}}, {"title": "The Carbon Community: Tackling knowledge gaps on carbon sequestration by trees and soil", "db": "HUB", "id": "1941", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1941", "description": "The Carbon Community works in partnership with scientists and the community to analyse and establish effective reforestation strategies to increase carbon sequestration through tree planting, with soil microbiome inoculation and basalt addition. Nature-based intervention: In May 2021, The Carbon Community established a replicated field trial in Glandwr Forest to assess reforestation efforts that maximise carbon sequestration in trees and soil. Two novel approaches are being tested, soil microbiome inoculation and addition of crushed basalt, to evaluate whether this accelerates and enhances carbon sequestration in conifer monoculture and mixed broadleaf forests (1). Prior to planting, crushed basalt was applied to the fields using a modified lime spreader, and at the time of planting, soil samples from established conifer or broadleaf forests were added. Crushed basalt addition to the soil is thought to capture carbon dioxide, fertilise trees and potentially simulate mycorrhizal fungi growth. Across 11 hectares of land with 25,600 planted trees, there are 8 treatments manipulating forest type, soil microbiome inoculation, and basalt addition, and one grassland control, replicated 8 times in a randomised design. This level of replication provides statistical robustness, allowing for possible differences in microclimate between the plots. The experiment tests whether the microbiome and basalt treatments improve tree seedling growth and survival rates. The main study was designed in partnership with scientists from 4 research institutions, with later contributions from 4 other research institutions. Overview of context: The Carbon Community aims to establish field research projects to increase carbon sequestration in reforestation. Their landmark project is the experimental trial launched at Glandwr Forest. This was established in May 2021 on upland grassland that was previously grazed, with patches of existing woodland, wetland and a small site of ancient woodland. The site is adjacent to a stream.", "authors": [], "refs": [{"url": "https://www.carboncommunity.org/carbon-projects", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.carboncommunity.org/carbon-community-updates/our-trees-in-the-drought", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.carboncommunity.org/faq", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.carboncommunity.org/join", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.youtube.com/watch?v=5A6WfRbXPVE", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.carboncommunity.org/carbon-community-updates/fungi-and-soil-carbon-sequestration", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.carboncommunity.org/carbon-community-updates/how-to-measure-rock-weathering-carbon-sequestration-explainer-video", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.carboncommunity.org/carbon-community-updates/different-kinds-of-forest", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.carboncommunity.org/carbon-community-updates/watch-university-of-oxford-start-biodiversity-study-at-the-carbon-community", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.carboncommunity.org/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 10}, "base": {"peer": 0, "grey": 10}}, {"title": "The Great Fen", "db": "HUB", "id": "2048", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=2048", "description": "The Great Fen project aims to restore wetland habitats and implement new farming methods that address climate mitigation and adaptation, enhance biodiversity, and benefit people. Nature-based intervention: Wild fen habitats in the Great Fen drastically decreased due to drainage and farming. Although reclaimed fenland is prime agricultural land, it produces very high carbon dioxide emissions as the peat dries out and oxidises. In 2001, five organisations formed the Great Fen Steering Group and started a landscape-scale project to restore 14 square miles of land (3,741 hectares) to wild fen, connecting two National Nature Reserves (1). Land has been gradually purchased over 20 years, reaching a total of 4,000 acres (1,620 hectares) today. Arable fields are being gradually restored into grasslands through grazing and hay cutting and finally restored to wetlands (2). Clay banks were also constructed along the Woodwalton Fen reserve boundary to enhance water retention on the reserve (3). Gradual recovery has resulted in a mosaic of habitats across the Great Fen including wetlands, meadows, woodlands, bogs, wet heaths, and wild fen, all at different stages of restoration, together with some patches of ancient fen habitat. In 2023, a new system of wet farming (paludiculture) was launched across a 120 hectare area as part of a 5-year National Lottery Heritage project (4). This system of farming with a higher water table is expected to reduce the high emissions from crop production on peatland, with additional benefits for wildlife, water quality, and people. Overview of context: Drainage of fens to create farmland in the 17th century destroyed 99% of wild fen habitat in the area (1). Only two isolated ancient fen habitats remained, Woodwalton Fen (208 hectares) and Holme Fen (266 hectares). Woodwalton Fen was preserved as it was purchased by Charles Rothschild in 1910 and designated as a National Nature Reserve in 1954. Holme Fen remained as the area was too wet for farming, though due to drainage of adjacent areas, the Holme Fen National Nature Reserve dried out (5).", "authors": ["Evans", "Carver"], "refs": [{"url": "https://www.greatfen.org.uk/about-great-fen", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/big-ideas/habitat-restoration", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/woodwalton-fen", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/peatland-progress", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/holme-fen", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/water-works", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/about-great-fen/heritage/brief-history-great-fen", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/big-ideas/flood-protection", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/frequently-asked-questions", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/wildlife/monitoring-research", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/explore/walks-trails/trail-guides", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/explore/all-terrain-tramper", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/get-involved/wild-experiences/events-family-activities", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/about-great-fen/heritage/fen-stories-and-memories", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/big-ideas/connecting-people-nature/plans-future-visitor-centre", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/about-great-fen/partners-and-supporters/great-fen-steering-group", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/about-great-fen/supporters-and-patrons/supporter-funded-projects", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/wildlife/monitoring-research/stonechat-research-great-fen", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/blog/guest-post/water-works-presented-global-audience-rrr2021", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://uk-air.defra.gov.uk/assets/documents/reports/cat07/1904111135_UK_peatland_GHG_emissions.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/sites/default/files/2019-10/HLF%20Evaluation%20Report%202017%20for%20web.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/about-great-fen/restoration-project-progress", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.greatfen.org.uk/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 23}, "base": {"peer": 0, "grey": 23}}, {"title": "The Heiveld Rooibos Co-operative", "db": "NbSI", "id": "110", "country": "South Africa", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=110", "description": "Heiveld is a co-operative of indigenous rooibos farmers in the Suid Bokkeveld region of South Africa that has received both Organic and Fairtrade accreditation, successfully producing rooibos in a sustainable way and yielding positive socioeconomic impacts for the local community. Nature-based Intervention: The cooperative employs many techniques for producing the rooibos sustainably, including planting hedgerows with native species, attracting birds of prey as natural pest control, and using conservation tillage. Most significantly, Heiveld has formulated and puts into practice guidelines for the harvesting of wild rooibos, which ensures the sustainability of the wider ecosystem and draw from traditional knowledge, such as harvesting plants only every second year, using prescribed fires at particular frequencies, percentages for harvest allowance, and removing non-native species which can exacerbate drought and wildfires. The harvesting of wild rooibos reduces the pressure of demand on cultivated rooibos, which requires land clearing, compared to the wild rooibos which thrives in the natural fynbos vegetation endemic to the region, allowing for the conservation of the native ecosystem. These and other measures have reportedly contributed to higher and more stable incomes for member farmers, and the premiums received from the certifications have been reinvested into the community to yield socioeconomic benefits. Overview of context and outcomes: Rooibos is a plant that is native to South Africa, grown commercially nowhere else in the world, which is sold as a popular herbal tea worldwide. Contrary to most rooibos production in the country which is owned by white, large-scale farmers, Heiveld's farmers are indigenous smallholders. With the Organic and Fairtrade certifications, the coop is able to sell its product at a premium and directly on the market, instead of to the larger white farmers acting as middlemen and setting unfair low prices. Heiveld tea is sold throughout Europe and North America, as well as in Japan, New Zealand and locally in South Africa.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1471988796.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "http://www.heiveld.co.za/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "The Hinewai Reserve Ecological Restoration Project", "db": "NbSI", "id": "1236", "country": "New Zealand", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1236", "description": "The Hinewai Reserve is a privately owned nature regeneration project which covers 1,250 hectares and focuses on the natural restoration of endemic plants and animals. Nature-based Intervention: The reserve was initially marginal farmland which contained remnant of old growth forest, with the first purchase of 109 hectares of land occurring in 1987 by the Maurice White Native Forest Trust. As the reserve grew to its full size they utilized a natural regeneration technique with limited interventions to bring back native vegetation and wildlife alongside the 50 hectares of old growth forest the reserve protects. Non-native species which seriously impeded this natural regeneration were removed (such as feral goats which were eliminated from the reserve in 1999), but other species were left such as non-native gorse. Gorse which is widely seen as an agricultural pest in New Zealand, but the land managers found that its thorny branches and nitrogen fixing properties allowed it to protect native tree saplings until they grew large enough to eventually shade-out and kill the gorse. The scale of forest regeneration on the land have allowed the reserve to enter the emissions trading scheme. Overview of context and outcomes: The reserve is located near the township of Akaroa and includes a network of walking trails which are open to public used. The managers of the Hinewai Reserve have also overseen the adjacent 192 hectare Purple Peak Curry Reserve which was purchased by the New Zealand Native Forest Restoration Trust in 2016.", "authors": [], "refs": [{"url": "https://climateandnature.org.nz/solutions/our-places/banks-peninsula/hinewai-reserve/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.hinewai.org.nz/about/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://onlinelibrary.wiley.com/doi/full/10.1111/emr.12261?saml_referrer", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 1, "grey": 2}}, {"title": "The Medmerry project for intertidal habitat restoration with managed coastal realignment", "db": "HUB + NbSI", "id": "660", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=660", "description": "The largest managed realignment project in open coastal Europe has regenerated 184 hectares of intertidal habitat, restoring wildlife functioning and protecting communities from flooding and coastal erosion. Nature-based Intervention: Managed realignment is the practice of building a structural sea defence inland from the coast and allowing the exposure of an intertidal area between the defence and the ocean. The Medmerry project constructed seven kilometres of flood bank inland, creating 184 hectares of saltmarsh and mudflat habitat and 263 hectares of other priority habitats. The flood bank itself was built using several hundreds of thousands of cubic metres of clay extracted from the site which also led to the formation of freshwater ponds and reedbeds that have attracted wildlife back to the area. In partnership with local farmers, the saltmarsh is grazed by sheep and cattle at low density and cereals and special wild bird seed mixes are grown on land surrounding the habitat to attract and benefit wildlife. A system of collective ditch management has also created adjacent freshwater habitats for water voles, amphibians, and dragonflies, likely countering the area’s recent biodiversity losses. The project has also provided a water treatment facility and a road serving 5,000 residents. Overview of context and outcomes: Many parts of England’s coastlines are facing a loss of intertidal habitats to sea level rise and coastal erosion. Intertidal habitats such as salt marshes, mudflats, sand dunes, and shingle provide important coastal protection from strong waves, high tides, erosion, and storm surges. They also serve as habitat for important wildlife species like wetland and shore-birds. Thus, built on years of research, the Medmerry project is practicing managed realignment to help restore the lost and weakened intertidal habitat that is crucial to the well-being of both humans and wildlife. Medmerry is one of the largest managed realignment projects on the open coast of Europe and serves an older, lower income population that frequently faces pressures from coastal inundation. Today, the project is taught in school curriculum nation-wide and has received over 16 major national and international awards.", "authors": ["Beaumont", "Jones", "Garbutt", "Hansom", "Toberman", "Holland", "Krawiec"], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.gov.uk/government/publications/medmerry-coastal-flood-defence-scheme/medmerry-coastal-flood-defence-scheme", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.rspb.org.uk/reserves-and-events/reserves-a-z/medmerry/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 0, "grey": 3}}, {"title": "Traditional agricultural techniques for water conservation and land restoration", "db": "NbSI", "id": "108", "country": "Burkina Faso", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=108", "description": "The Association Zoramb Naagtaaba (AZN) was formed by community members from 10 neighbouring villages to restore degraded land and address water scarcity issues through the use of traditional agricultural techniques and other practices tested on demonstration plots. Nature-based Intervention: Association Zoramb Naagtaaba (AZN) promotes the restoration of degraded land through the reintroduction of traditional agricultural practices. Demonstration plots are used to test various seed and crop varieties and allow farmers to learn first-hand about hedge and pond construction and other agricultural techniques to improve productivity. Tree planting works to improve soil fertility and reduce run-off while hedgerows help recover storm water, protect crops from wind damage, and serve as a mechanism for keeping livestock out of production areas. A 15-meter firewall is cleared of vegetation yearly to protect the hedgerows from bushfires. A pond area has also been created to further decrease water run-off. Trees were planted around the pond to slow evaporation. Zaï , a traditional cultivation technique to conserve water and soil, has been expanded on the cultivation area. Zaï requires the digging of 15-centimetre deep holes with seeds and compost placed inside and a ridge of soil built up around the perimeter of the hole during the dry season. During the wet season, the holes fill with water and the ridges prevent the organic matter from washing away. Rotational grazing of livestock has been introduced to reduce damage caused by wandering livestock. Overview of context and outcomes: In order to address water scarcity, environmental degradation, declining agricultural yields, and high rates of poverty, 10 villages in two provinces of Burkina Faso came together to create AZN.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1469737836.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Training centre provides demonstration plots and research support for sustainable agriculture and agroforestry", "db": "NbSI", "id": "122", "country": "Zambia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=122", "description": "The Kasisi Agricultural Training Centre provides research and training support for small-scale farmers working to incorporate and implement more sustainable agricultural practices and engage in agroforestry. Nature-based Intervention: the Kasisi Agricultural Training Centre Training Centre focuses on teaching and supporting the implementation of land restoration and sustainable agriculture techniques. More specifically, the Training Centre provides demonstration plots used for hands-on learning and research to support farmer testing of sustainable agriculture techniques. For example, the use of crop rotation, intercropping, composting, native seeds, nitrogen-fixing shrubs and cover plants have all been encouraged and supported through the Training Centre's work. These efforts have helped increase the diversity and quantity of food available in the area. Additionally, agroforestry is carried out with the purpose of restoring degraded land, improving soil fertility, and increasing biodiversity. The trees planted not only provide non-timber forest products including fruits such as papayas, mangoes, oranges, and lemons, but also serve as windbreaks and living fences. \" Biodiversity fairs \" are hosted so that farmers can engage in mutual learning exchanges about various topics including crop diversification, apiculture, and agroforestry techniques. The Training Centre has also created a village saving initiative enabling women to access capital. Overview of context and outcomes: The Kasisi Agricultural Training Centre provides agricultural training, research, and marketing support to over 10,000 small-scale farmers in the Chongwe and Rufunsa Districts of Zambia. The area has suffered wide-scale deforestation due to a high demand for firewood and charcoal. Furthermore, the intensive use of chemical inputs to agriculture has degraded soils. These issues are further exacerbated by oncoming climate change-induced challenges including drought.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1459269593.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Trans-border indigenous alliance promotes conservation and development in highlands of Borneo", "db": "NbSI", "id": "137", "country": "Malaysia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=137", "description": "A trans-border alliance between local indigenous populations sharing a cultural heritage on the island of Borneo works to preserve indigenous culture and knowledge, promote sustainable agriculture, and conserve the island's largest intact forested and traditionally farmed catchment. Nature-based Intervention: Local indigenous groups came together to create the Forum Masyarakat Adat Dataran Tinggi Borneo (FORMADAT) or the Alliance of the Indigenous Peoples of the Highlands in the Heart of Borneo to advance conservation and development goals. FORMADAT promotes sustainable agriculture techniques, agroforestry, the use of diverse and native varieties of rice, and the establishment of nurseries to breed distinctive species of local fruit which have been domesticated and bred over generations. The inhabitants of the highlands use a traditional wet rice farming system and cultivate native fruit and rice varieties, often partnering with NGOs and gaining organic and fair trade certifications to access niche markets. The traditional wet rice farming method involves the use of a wet paddy system irrigated by mountain waters. Once the rice is harvested, water buffalo are released to churn and fertilise the soils. This system allows for greater food production as opposed to shifting agriculture and also maintains the integrity of local water supply as communities do not rely on chemical inputs to agriculture. Agroforestry has been practiced sustainably by the local communities for generations through which they derive timber, medicinal plants, foods, dyes, and material for handicrafts. FORMADAT created a Cultural Field School in 2011 to preserve local knowledge and educate locals and tourists about the cultural and agricultural practices of the area. Overview of context and outcomes: The island of Borneo is politically divided between Malaysia, Indonesia, and Brunei. In the highlands of Borneo, the Dayak Lundayeh/Lun Bawang, Kelabit, and Sa’ban peoples of Indonesia and Malaysia share a cultural and historical heritage. The highlands of Borneo exhibit the largest surviving intact forested and traditionally farmed catchment on the island.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/FORMADAT-Indonesia-Malaysia.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Transboundary conservation of the Greater Gola Landscape", "db": "NbSI", "id": "750", "country": "Liberia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=750", "description": "Transboundary collaboration is enabling the restoration of a major biodiversity hotspot in the Upper Guinean Forest Eco-Region. Liberia and Sierra Leone are conducting joint and independent initiatives to ensure the conservation of the Gola Peace Park which straddles their shared boundary, encompassing a park on either side. Nature-based Intervention: In 2011, Liberia and Sierra Leone signed an agreement to conserve the Gola Peace Park which encompasses the connected national parks on either side of the border. The two countries are approaching conservation differently yet in a complementary way. First, Sierra Leone’s Gola Rainforest Conservation Company employs rangers to monitor illegal activity and conducts periodic assessments of deforestation. The conservation project in Sierra Leone is supported by the Reduced Emissions from Deforestation and Degradation (REDD+) program. Second, Liberia aims to promote forest connectivity by establishing community forests to connect the various parts of the Gola Peace Park within and across its borders. In collaboration with international conservation groups, the two countries are promoting “rainforest-friendly livelihood” activities including beekeeping, farmer field schools, cocoa farming, and the planting of nitrogen fixing plants. Overview of context and outcomes: The Upper Guinean Forest Eco-region is one of three biodiversity hotspots in Africa but has unfortunately suffered extensive deforestation. The Greater Gola Landscape is the largest remnant of this Eco-region and straddles the boundary between Sierra Leone and Liberia. Thus, several government agencies and international NGOs are working with local forest management and conservation bodies to promote a landscape-scale and transboundary management scheme.", "authors": ["Holland", "Payne", "Bashir", "Schenk", "Safford", "Brien", "Waliczky", "Utomo"], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Volunteer association engaging women and youth in agroforestry and reforestation on degraded land", "db": "NbSI", "id": "112", "country": "Chad", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=112", "description": "A volunteer association promotes agroforestry, sustainable farming techniques, and forest restoration through the empowerment of youth and women who are traditionally excluded from land ownership and the benefits of production. Nature-based Intervention: To date, the Chadian Volunteers' Association for the Protection of the Environment has planted 20,000 trees and distributed 70,000 seedlings to surrounding rural communities. The association teaches mainly women and youth the basics of soil fertility, plant production, and natural resource management. Sustainable agriculture methods are promoted including the use of intercropping, locally available organic compost, natural insecticides, and hedgerows and living fences to protect crops from wind damage, erosion, and water evaporation. The association also managed to help women access farmland, something they have historically been excluded from in this region. Through improved agroforestry and soil management, these women turned degraded lands into productive farmland, replanted thousands of trees, and began producing okra, cucumbers, peppers, and other crops for sale. Overview of context and outcomes: The Association Tchadienne des Volontaires pour la Protection de l’Environnement, or Chadian Volunteers' Association for the Protection of the Environment, trains women and youth in ecosystem restoration and agroforestry. The initiative focuses primarily on countering the impacts of drought, land degradation, and desertification that all threaten food security in the area. One of the association's central activities is the planting and management of trees.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1_1471989233.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Wallasea Island Wild Coast restoration project", "db": "HUB + NbSI", "id": "1254", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1254", "description": "Recreating a wetland landscape of mudflats, saltmarsh, lagoons and pasture in an internationally important estuary, close to the Thames Gateway, using a managed realignment strategy and beneficial reuse of clean spoil from the London Crossrail infrastructure project. Europe's largest coastal habitat restoration project. Nature-based Intervention: Commencing in 2008 and completed in 2018, the Royal Society for the Protection of Birds (RSPB) has undertaken a project over a site spanning 900 hectares to restore coastal wetland from reclaimed arable land on Wallasea Island in the Crouch and Roach estuaries in Essex. Using a managed realignment scheme, a partnership with Crossrail to reuse 3 million tonnes of earth excavated from project tunnelling to raise land above sea level and breaches in the existing sea walls, 115 hectares of new tidal wildlife habitat has been created consisting of lagoons, saltmarsh and mudflats. Overview of context and outcomes: Since the 16th century, land reclamation for agriculture had transformed five separate saltmarsh islands into Wallasea Island. The Wallasea Island Wild Coast restoration project aims to recreate the ancient wetland landscape of mudflats, saltmarsh, lagoons and pasture to combat coastal flooding and climate change threats and compensate for the loss of tidal habitats elsewhere in England. The Wallasea Island site has been designated as a Ramsar site and Special Protection Area as a breeding site for migratory birds. The project is expected to future-proof coastal areas against sea-level rise, store carbon, and increase habitat for overwintering waders and wildfowl, including Brent geese ( Branta bernicl ), and increase species diversity by attracting avocets ( Recurvirostra ), little ringed plovers ( Charadrius dubius ) and black-winged stilts ( Himantopus himantopus ).", "authors": [], "refs": [{"url": "https://www.rspb.org.uk/our-work/casework/cases/wallasea-island/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.rspb.org.uk/reserves-and-events/reserves-a-z/wallasea-island/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.gov.uk/government/news/environment-minister-rebecca-pow-visits-wallasea-island", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.rewildingbritain.org.uk/rewilding-projects/wallasea-island", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://rewildingeurope.com/rew-project/wallasea-island-wild-coast-project/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 5}, "base": {"peer": 0, "grey": 5}}, {"title": "Water harvesting techniques for small communities in arid areas", "db": "NbSI", "id": "672", "country": "Australia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=672", "description": "In Western Australia, cases of water harvesting strategies have been documented in four locations in the water-scarce region, including the use of swales, infiltration trenches and basins, rainwater harvesting off of roofs, and sand dams. Nature-based Intervention: In Cheeditha, an Aboriginal community on the outskirts of Roeburn, the 'Greening Cheeditha Project' was developed in 1997 to mitigate the effects of the harsh climate, which is characterized by very little rainfall, severe drought, intense hot winds, and short periods of heavy rainfall which cause floods. Swales were constructed consisting of open wide and long trenches dug topographically on the contour of the land. Theses swales serve to slow and manage the direction of water runoff and increase infiltration to control flooding. These swales are often filled with vegetation. The excess runoff from these swales during periods of rain was directed toward newly-planted fruit trees, shrubs and herbs including mangoes, figs, guavas and cotton plants. In the Jigalong community, earth banks, swales and a series of basins for stormwater retention were constructed alongside roads and subsequently planted with fruit and timber trees to increase productivity and mitigate the effects of high wind and floods in a desert-like climate. In the community of Karratha, a local college has retrofitted its roof to harvest and direct rainwater to a ethnobotanical garden planted with indigenous edible foods and beneficial plants, with the excess runoff directed by swales to other nearby gardens. Lastly, in Wittenoom, the Arid Permaculture Research Facility was founded, where 'sand dam' basins have been constructed to regulate the water available for the adjacent permaculture gardens. Overview of context and outcomes: The vegetation reportedly reduced soil erosion and acted as a much-needed windbreak for the residential area. All of these water harvesting techniques employ low-tech strategies consisting of digging at various angles and shapes using natural materials such as earth and sand, and paired with plantings of vegetation and fruit trees.", "authors": [], "refs": [{"url": "https://doi.org/10.2166/wst.2001.0372", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.researchgate.net/publication/11653304_Water_harvesting_techniques_for_small_communities_in_arid_areas", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 2, "grey": 0}}, {"title": "Wetland restoration in St. Aidan&#8217;s Nature Reserve", "db": "HUB + NbSI", "id": "780", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=780", "description": "A converted opencast coal mine provides a buffer zone for flooding and habitats for diverse species. Nature-based Intervention: The Environment Agency, Royal Society for the Protection of Birds, and Leeds City Council have converted a former opencast coal mine into a 400 hectare wetland nature reserve. This 7.5 million cubic metre capacity flood plain reportedly reduces flood risk to local communities while providing habitat for diverse species including lapwing, curlew, and bitterns. Overview of context and outcomes: The floodplain-like protection system is preferable to structural barriers as it reduces flooding of communities overall rather than simply displacing flooding to another area. A long-retired dragline, once the largest in the world helping to extract millions of tonnes of coal from the area, now attracts tourists as it has become a large nestbox, home to nesting kestrels, owls, stock doves, and carrion crows.", "authors": [], "refs": [{"url": "https://www.rspb.org.uk/globalassets/downloads/policy-briefings/nature-based-solutions-adaption-report.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.rspb.org.uk/reserves-and-events/reserves-a-z/st-aidans/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Wild Haweswater: sustainable upland hill farming and ecological restoration", "db": "HUB", "id": "1932", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1932", "description": "Wild Haweswater is a partnership between the RSPB who manage the site and landowner United Utilities. Together, they aim to showcase how sustainable farming techniques can work alongside ecological restoration to improve water quality, enhance biodiversity and benefit people. Nature-based intervention: The Naddle and Swindale farms at Haweswater are situated within an upland landscape featuring wildflower meadows, ancient woodlands, peatlands, watercourses, and acidic grasslands. Notably, the Haweswater catchment is identified as a crucial drinking water source for north-west England (1). Historical intensive grazing by sheep and deer on common land has resulted in species poor grasslands and large areas dominated by bracken. Other historical farming practices have similarly altered the landscape, such as peat bog drainage and stream straightening. Since the RSPB started managing the area, farming practices have been altered to reduce and restrict grazing intensity (2). Completed and ongoing interventions include the planting of native trees and wildflowers, naturalisation of straightened watercourses (see separate case study for Swindale Beck), rewetting of peat, enhanced landscape connectivity through the removal of fencing, and the restoration of habitat for the reintroduction of native birds and mammals. Additionally, the project aims to establish sustainable and diversified income streams and engage the community through events and experiences. Overview of context: Originally a natural lake, Haweswater was dammed by United Utilities (then Manchester Corporation) to form a reservoir for drinking water supply. In the 1980s, water pollution caused by cattle housing and yard run-off from an upstream farm led to the closure of a stream that feeds into the reservoir, resulting in significant economic impacts due to the loss of water yield (3). The adoption of modified farming practices facilitated the reopening of the intake, underscoring the importance of sustainable farming in this environment. Since 2012, the RSPB has leased two farms in the area and, in collaboration with United Utilities and other partners, is engaged in running a sustainable livestock farm and undertaking landscape-scale ecological restoration.", "authors": [], "refs": [{"url": "https://www.rewildingbritain.org.uk/rewilding-projects/wild-haweswater", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://wildhaweswater.co.uk/2022/02/20/a-vision-of-haweswaters-future/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "http://hdl.handle.net/1834/22274", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.endangeredlandscapes.org/wp-content/uploads/2023/11/CumbriaConnect_MitigationSummary.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.unitedutilities.com/corporate/newsroom/latest-news/lake-district-reservoir-partnership-sets-bar-for-landscape-strategy/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://wildhaweswater.co.uk/2019/11/28/woodland-a-nature-based-solution-to-climate-change/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://onlinelibrary.wiley.com/doi/10.1002/hyp.14453", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.sciencedirect.com/science/article/pii/S2468312421000080", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.rspb.org.uk/whats-happening/news/why-salmon-need-our-help-in-england", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.theguardian.com/environment/2023/mar/10/haweswater-project-lake-district-rewilding-farming-jobs", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://wildhaweswater.co.uk/2023/11/20/meet-the-haweswater-tweed/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://wildhaweswater.co.uk/2023/12/19/record-breaking-breeding-season-for-pied-flycatchers/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://wildhaweswater.co.uk/2023/07/11/englands-rarest-habitats-to-be-enhanced-in-one-of-uks-largest-landscape-programmes/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://wildhaweswater.co.uk/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 14}, "base": {"peer": 3, "grey": 11}}, {"title": "Wilder Woodah: Nature recovery and carbon storage on a working livestock farm", "db": "HUB", "id": "1962", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1962", "description": "At Woodah Farm, there are ambitious plans to scale up nature recovery alongside food production and carbon storage, acting as a demonstration centre for nature-based solutions on working livestock farms. Nature-based intervention: Woodah Farm, a 57 hectare site near Doddiscombleigh, was left as a legacy to the Devon Wildlife trust who took full ownership in 2009. Since then, efforts have been made to restore several parts for wildlife, whilst the area continues to operate as a working livestock farm. Initially, many tasks focused on managing hedgerows. However as time passed, the project expanded, and in 2021, Woodah Farm was selected as one of 12 high-impact initiatives committed to helping the UK achieve net-zero carbon emissions by 2050. As part of this, various management practices are being trialed and evaluated, in hopes of Woodah acting as a ‘demonstration site’ for nature-based solutions in similar areas across Devon. The core of this project is assessing how grazing levels can be reduced whilst maintaining species diversity and maximising carbon storage. Thus, from 2020 to 2021, cattle numbers were reduced from 44 to 35. Additionally, the Trust aims to promote soil recovery, restore the land's natural processes, and enhance water availability by planting trees and expanding ponds. Exeter University collaborates with volunteers to evaluate the effectiveness of the approaches, so that other land-owners may be inspired to adopt similar practices that best suit their needs. Overview of context: Before being handed to the Trust, Woodah was a typical traditional Devon smallholding. The land was used for cattle and sheep grazing but had not received active management from the previous owner for an extended period. Consequently, several issues arose: the grass was over-grazed, leading to a depletion of topsoil nutrients, there was a lack of thick hedges, and the infrastructure was deteriorating. Despite encountering these challenges, the area still maintained a moderate species richness, which is characteristic of grassland habitats. Moreover, the trust had also gained ownership of Scanniclift Copse, a rich 1.8 hectare woodland adjoining the farm, creating potential for successful restoration.", "authors": [], "refs": [{"url": "https://www.devonwildlifetrust.org/wilder-woodah", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.devonwildlifetrust.org/wilder-woodah", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.one-mag.co.uk/15-minutes-with-devon-wildlife-trusts-woodah-farm/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.one-mag.co.uk/15-minutes-with-devon-wildlife-trusts-woodah-farm/", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.bbc.co.uk/news/uk-england-57756586", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://ww
