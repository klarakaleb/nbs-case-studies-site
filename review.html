 hectare per year. Overview of context and outcomes: The Gazi Bay, located on the southern coast of Kenya, has seen significant depletion and degradation of its mangrove ecosystem mainly due to a high demand for building materials and fuelwood. This overexploitation has led to the destabilization of the surrounding ecosystem evidenced by dwindling fish stocks and the destruction of habitats for coastal species. Mangroves provide an important biological barrier for the coastline and their disappearance from the Gazi Bay leaves adjacent communities vulnerable to coastal erosion.", "authors": [], "refs": [{"url": "https://portals.iucn.org/library/sites/library/files/documents/2015-032.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://wedocs.unep.org/bitstream/handle/20.500.11822/7948/EA_Mangrove_forests.pdf?sequence=3&isAllowed=y", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://doi.org/10.1080/14498596.2008.9635137", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://wwf.panda.org/wwf_news/successes/?311014/Kenyan-coastal-community-earning-economic-livelihood-through-conservation-of-mangrove-trees", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 4}, "base": {"peer": 1, "grey": 3}}, {"title": "Community-based project for forest protection along the Caribbean Coast", "db": "NbSI", "id": "1165", "country": "Guatemala", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1165", "description": "Local land owners worked together in order to protect 55,308 hectares of threatened tropical rainforest, while sequestering 6 million tons of CO2 and protecting key habitat corridors. Nature-based Intervention: This project focused on bringing together a collective of local land owners in order to protect 55,308 hectares of threatened tropical rainforest. The long term goal of the project is to eventually bring 128,448 hectares under protections. Through conserving this forest it has helped remove 6 million tonnes of CO2 emissions from the atmosphere. The project also has a focus on supporting local entrepreneurs, who through their endeavors have contributed €8.4 million to the local economy. They have supporting increasing the regional production of sustainable commodities such as cardamom pepper and lychee. The project has also helped provide legal support to the indigenous Q’eqchi’ people in order to get them land titles. As land owners they can then receive benefits from conservation incentive programs within the country. Overall this has allowed them to create a network of over 1,000 property owners that own approximately 700 forest parcels which combine to make the protected area. Overview of context and outcomes: The project is located in a region of Guatemala which has experienced some of the highest global deforestation rates recorded. These forests lie along the Mesoamerican Biological Corridor, which serves as a critical habitat pathway for migratory birds traveling central America. The area is also occupied by many indigenous Q’eqchi’ people who tend farms, but do not have recognized land rights within the government system. Large scale cattle ranches and palm oil plantations were displacing these farmers as well as destroying the forest in the region.", "authors": [], "refs": [{"url": "https://www.wbcsd.org/download/file/14217", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Community-based reforestation and forest management", "db": "NbSI", "id": "585", "country": "Bhutan", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=585", "description": "Community-based reforestation and forest management in Bhutan in the 1990s marked an important transition from national to local management of forest resources. Communities benefitting from and participating in reforestation efforts recognize the value of the forest's ecosystem service provisioning role. Nature-based Intervention: Forest plantations were established to restore degraded hillsides and improve the provisioning of ecosystem services to communities dependent on them. Five plantations established in the early 1990s comprised mainly of Bhutan cypress trees and later enriched with Quercus and Cryptomeria were assessed for their social and biophysical impacts. Forest management of these plantations is based on principles of sustained yield, ensuring that forest products are not harvested at the net expense of the ecosystem. Overview of context and outcomes: Although forest plantation programs had been initiated by civil authorities in Bhutan as early as the 1940s, the Department of Forests responded to a call for more community-based management and land restoration needs in the 1990s. More specifically, the Department moved from project-based reforestation efforts to community-based reforestation to transfer the authority and responsibility for forest management to local populations.", "authors": [], "refs": [{"url": "https://doi.org/10.3390/f9110675", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Community-led mangrove forest restoration and seaweed farming", "db": "NbSI", "id": "659", "country": "Kenya", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=659", "description": "Communities on the coast of Kenya are restoring lost and fragile mangrove forests to protect ecosystems, livelihoods, and people. Seaweed farming with a high level of female participation is also providing an additional source of income. Nature-based Intervention: Four communities managing about seventeen hectares of land in the southern coastal region of Kwale County, Kenya are responding to the challenge of climate change induced perturbations to rainfall patterns, increased intensity and frequency of storm surges and heatwaves by restoring and replanting weakened or destroyed mangrove forests. Community-based groups with equal representation of women and men are actively growing and managing mangrove seedlings with 243,000 planted to date. As the coastal mangrove forests are restored, communities have also started seaweed farming, a non-invasive, non-polluting activity that can provide an extra source of income. These combined efforts are helping households counter the economic and health stresses and shocks caused by reported declines in fish productivity. Overview of context and outcomes: Mangrove forests provide protection from coastal flooding, coastal erosion, and storm surges while simultaneously providing and sheltering the habitats of a wealth of native species in both coastal and inland areas.", "authors": [], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://doi.org/10.1007/978-3-030-45106-6_118", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 1, "grey": 1}}, {"title": "Community-led sustainable agriculture, land restoration, and disaster risk reduction", "db": "NbSI", "id": "118", "country": "Jamaica", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=118", "description": "In response to challenges related to land degradation, natural disasters, and an irregular water supply, the Jeffrey Town Farmers Association works to educate farmers about sustainable agriculture techniques and uses reforestation to stabilise the landscape susceptible to landslides and erosion. Nature-based Intervention: The Jeffrey Town Farmers Association worked with local farmers to encourage practices like land restoration, water harvesting, and organic farming. Furthermore, they have implemented climate resilient infrastructure in concert with the planting of pineapple plants to stabilise hillsides that were previously susceptible to landslides. The planting of fruit-bearing trees as part of these land restoration efforts is also expected to improve local food security. Terracing of steep slopes, increasing tree cover, and planting trees along roads have all been embraced as additional methods for reducing vulnerability to hurricanes and landslides. The Association grounds a lot of its work in educational and training activities, ensuring that practices can be developed over time and implemented by community members themselves. For example, demonstration plots are used to showcase the benefits of cultivating drought resistant crops. The Association has also put in place solar streetlights, built a new health facility, and launched a local radio station aimed to engage youth in the cause and keep the community informed about various issues. Overview of context and outcomes: Community members of Jeffrey Town in Jamaica came together to educate farming communities about various disaster risk reduction, sustainable agriculture, and alternative energy options in response to challenges associated with land degradation, natural disasters, and irregular water supply. Additionally, Jeffrey Town Farmers Association's work was responding to a perceived difficulty for local farmers to earn a decent living from conventional crops that relied on various unsustainable agriculture practices. Slash-and-burn farming, for example, was common in the region and had exhausted local soil of nutrients.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1458760405.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Coral gardening for climate change adaptation", "db": "NbSI", "id": "293", "country": "Vanuatu", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=293", "description": "A network of sixteen indigenous communities on the islands of Nguna and Pele in Vanuatu have come together to advance a coral gardening project. The coral gardening efforts aim to restore coral reef ecosystems weakened by ocean acidification and rising surface temperatures. Furthermore, the stronger reef is intended to act as natural buffer between local communities and coastal impacts such as erosion and storms. Nature-based Intervention: Vanuatu's Nguna-Pele Marine and Land Protected Area Network, a non-governmental organisation comprised of sixteen indigenous communities on the islands of Nguna and Pele, came together to implement a coral reef climate change adaptation project focusing primarily on mariculture, or coral gardening. More precisely, coral fragments are attached to structures that are later submerged off-shore in areas that have been previously destroyed by cyclones or other pressures. The coral beds are submerged in areas about six meters deep so they are sheltered from potential cyclone swells. The coral varieties to be replanted are carefully selected for their ability to cope with heat stress and ocean acidification. Over 3,000 coral fragments have been planted in the area. These efforts have been implemented with the aim of restoring coastline biodiversity, including the coral reef itself, as well as serve as a buffer against coastal pressures that challenge local communities. Tourists are invited to participate in the efforts, generating additional income for local communities. Education programs have also been initiated to teach over 500 youth about coral reefs and climate change adaptation needs. Overview of context and outcomes: Vanuatu, as with other low-lying island states, is already suffering from climate change induced impacts. First, increasing ocean surface temperatures and ocean acidification are jeopardising the health of coral ecosystems that sustain myriad wildlife on the coast, including species that support local food security. Second, sea level rise and the increasing occurrence of extreme weather events are causing more frequent and severe coastal and inland inundation and erosion.", "authors": [], "refs": [{"url": "https://www.weadapt.org/sites/weadapt.org/files/eba_from_mountains_to_oceans_0.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Creating an analogue forest in Chimborazo province", "db": "NbSI", "id": "280", "country": "Ecuador", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=280", "description": "One landowner has created the first analogue forest in Chimborazo province, using ecological associations of various trees to aid in the conservation of endangered species. Nature-based Intervention: In the village of Buenos Aires, Ecuador, Mr. Manuel Ramón created an analogue forest on a deforested area of his property. Analogue forests aim to become ecologically stable and socio-economically productive by mimicking the structure and ecology of natural forests. Centrally, the landowner created two ecological associations between six species: one between mahogany (Swietenia macrophylla) and Ecuador laurel (Cordia alliodora) and the other association between the Brazilian fire tree (Schizolobium parahybum), teak (Tectona grandis), mahogany, and Ecuador laurel. Through trial and error, he was able to better understand optimal planting distances and times and adapted his techniques continuously. These methods also reportedly helped to improve soil moisture and fertility of the area over time. In total, Mr. Ramón has succeeded in restoring a 10-hectare forest. Overview of context and outcomes: As a former logger turned conservationist, the landowner was also able to identify specific species best suited for timber production, and with these revenues was able to hire three workers, extending the economic benefit of his project to the broader community. With conservation continuously in mind, he collected the seeds from the best trees to create and maintain a nursery of saplings that would replace each harvested tree. He has since collaborated with the government to attract tourists and researchers to spread knowledge about his conservation techniques.", "authors": [], "refs": [{"url": "https://portals.iucn.org/library/sites/library/files/documents/2016-036.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "http://www.analogforestry.org/about-us/analog-forestry/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Drought-resilient rice farming for communities and biodiversity", "db": "NbSI", "id": "1235", "country": "Cambodia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1235", "description": "The Ibis Rice concept was developed and implemented by Sansom Mlup Prey (SMP) to provide local communities a premium price on drought-resistance rice if they abide by local conservation agreements. Nature-based Intervention: In this program local communities work to create their own sets of rules and regulations to protect local species which are then approved by the government. These rules often include the creation of a land-use plan and no-hunting rules. If farmers then abide by these rules they are offered a premium price for the sale of their rice crops incentivizing their participation in the local conservation agreement. As drought has become a larger threat to the local community, the program has expanded to promoting climate resilient agriculture to ensure food security and the continuation of the program. The program began providing drought-tolerant organic-certified seed to participating farmers in order in bolster their resilience to droughts. To maximize drought adaptability they have also promoted soil conservation, crop diversification in order to promote soil fertility and other sustainable production techniques. Overview of context and outcomes: The Ibis Rice concept has reportedly been a successful intervention which utilized wildlife-friendly farming to bolster local livelihoods and protect the critically endangered white shouldered ibis( Pseudibis davisoni ) and the critically endangered giant ibis( Thaumatibis gigantea ). However, the success of this initiative and local food security has been undermined by climate-change induced droughts which the area has a high vulnerability to.", "authors": [], "refs": [{"url": "https://data.jncc.gov.uk/data/376d989f-0563-4e7f-b034-c79108f63758/nbs-triple-win-toolkit.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://conbio.onlinelibrary.wiley.com/doi/full/10.1111/cobi.12423", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.sciencedirect.com/science/article/pii/S0305750X17302796", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 2, "grey": 1}}, {"title": "Dryland forest protection and carbon credit project through community land use planning", "db": "NbSI", "id": "1209", "country": "Tanzania, United Republic of", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1209", "description": "Protection of dryland forest from conversion to grazing land for pastoralist local communities in the Makame Wildlife Management Area with revenues from carbon credits used for community development needs, improving health and educational infrastructure, and supporting locally led project monitoring. Nature-based Intervention: Since 2016, Carbon Tanzania has worked with five Maasai communities with approximately 15,000 people located in the Makame WMA, a critical habitat for wildlife in the Tarangire-Manyara ecosystem to protect 364,322 hectares of dryland forests. The project is built on upon securing community land tenure to existing seasonal grazing land and generating income from the sale of certified carbon credits for avoided deforestation. Using a REDD+ project model the intervention is reportedly estimated to provide a cumulative net greenhouse gas reduction of reduction of 1,365,037 tonnes of CO2 between 2016 and 2026. They have used these funds for the creation of an anti-poaching unit, wildlife monitoring, environmental education, governance and management training, natural resource management infrastructure, and women empowerment initiatives. Overview of context and outcomes: The Makame WMA is a species rich habitat in the Tarangire-Manyara ecosystem. The WMA is a form of community-based natural resource management where local communities develop and implement a land use plan that can be used to secure community land tenure to existing seasonal grazing land within the WMA and designate areas that can and cannot be used for grazing. Funds generated through the sales of carbon credits for avoided deforestation are used to fund community development needs and employ Village Game Scouts as an anti-poaching unit.", "authors": [], "refs": [{"url": "https://link.springer.com/chapter/10.1007/978-3-030-93604-4_15", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.carbontanzania.com/wp-content/uploads/2022/05/impact-report-2021-web-1.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.wbcsd.org/download/file/15180", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 1, "grey": 2}}, {"title": "Ecosystem-based adaptation to cope with sea-level rise and extreme climatic events", "db": "NbSI", "id": "720", "country": "Uruguay", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=720", "description": "Ecosystem-based adaptation (EbA) strategies were implemented near Kiyú on the Uruguayan coast to mitigate the effects of sea-level rise, storm surges, strong winds and sand dune erosion. Nature-based Intervention: In a coastal area of Uruguay, regeneration of sand dunes and revegetation with native plants was carried out to aid in the recovery of the coastal ecosystem. To make conditions more favorable to the native sand dune grasses and shrubs, large planted Eucalyptus trees were cut down, a strategy which has been shown be beneficial to the maintenance of sand bluffs. A low-tech, low-cost sand captor fence made out of tree branches was also installed to protect the bluff and support the recovery of the dune system. The regrowth of native vegetation reportedly helped reduce erosion and increase natural drainage, building resilience to flooding in storms. Overview of context and outcomes: According to a study, the initiative was implemented in a participatory way, involving the local community and institutional stakeholders, and prioritized the capacity building of municipal and local government actors in EbA and Integrated Coastal Management (ICM). A Vulnerability Reduction Assessment (VRA), an important tool used by the United Nations Development Program (UNDP) for their community-based adaptation programmes, was conducted post-implementation and revealed that participants perceived themselves to have lower vulnerability and higher adaptive capacity after the implementation of the program. The study reported an increase in the resilience of the social-ecological system, encompassing both the ecosystem and human components. A systematic monitoring and evaluation strategy was also put into place as part of the program.", "authors": [], "refs": [{"url": "https://doi.org/10.1108/ijccsm-07-2017-0149", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Ecosystem-based approaches to mangrove and wetland restoration in the Paz River basin", "db": "NbSI", "id": "360", "country": "El Salvador", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=360", "description": "Communities in the Paz River basin are employing mangrove restoration, unblocking freshwater channels, removing silt in mangrove canals, and conducting a community surveillance program enforcing a Local Plan for Sustainable Extraction to strengthen and recover the local wetland ecosystem. Nature-based Intervention: A local NGO Unidad Ecológica Salvadoreña (UNES) in cooperation with the IUCN is implementing various ecosystem-based approaches to adaptation aiming to counter adverse impacts. First, the organisation is working to unblock and remove silt from channels and mangrove canals in the river basin to recover the hydrodynamics of the ecosystem so that freshwater can enter and restore optimal salinity levels in the mangrove system. Second, UNES is promoting the restoration of degraded mangrove areas which include areas felled for livestock grazing. Seeing as unsustainable fishing practices are known to contribute to the destruction of the mangrove ecosystem, UNES designed and implemented a Local Plan for Sustainable Extraction (PLES) to ensure that local livelihoods dependent on fish, crustaceans, and mammals align with conservation needs. Overview of context and outcomes: Coastal communities in the Paz River basin of El Salvador are directly dependent on ecosystem services provided by the surrounding wetlands. However, the integrity and reliability of these ecosystem services are threatened by sea level rise, mangrove loss, increased incidence of droughts, saltwater intrusion, and flooding.", "authors": [], "refs": [{"url": "https://pubs.iied.org/pdfs/17628IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Exclosure practices help to restore overgrazed pastoral rangeland", "db": "NbSI", "id": "559", "country": "Algeria", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=559", "description": "Exclosure practices were adopted with the aim of rehabilitating and recovering the biodiversity of overgrazed pastoral rangeland. Nature-based Intervention: Exclosure is a practice that, through the periodic rotation of different parts of a grazing area, is known to promote landscape restoration and biodiversity recovery. Therefore, 32 sites of exclosure covering 18% of the grazing courses of the Naama province were fenced in to eliminate human and animal disturbances and have reportedly succeeded in significantly restoring natural biodiversity of the steppe ecosystem. The continued use of this practice is expected to aid in adapting to both human and climate change induced pressures on the rangeland. Overview of context and outcomes: In Naama province, the pastoral rangelands are subject to intense desertification through the exposure of the soil surface by land clearing and overexploitation of vegetation. An increase in sheep flocks and grazing has further exacerbated the issue.", "authors": [], "refs": [{"url": "https://www.jmaterenvironsci.com/Document/vol2/vol2_S1/27-JMES-S1-19-2011%20benaradj-T6.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://doi.org/10.1515/eko-2017-0005", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 1, "grey": 1}}, {"title": "Farmer-managed forest landscape restoration", "db": "NbSI", "id": "555", "country": "Ethiopia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=555", "description": "Farmer-managed natural regeneration (FMNR) employed to restore overgrazed and deforested land, boost biodiversity, and generate carbon offset revenues for local communities. Nature-based Intervention: Seven village cooperatives in Humbo, with the support of World Vision Ethiopia, practice FMNR, a low-cost technique that restores and regenerates cut down trees faster than planting seedlings by encouraging sprouting from tree stumps and root systems (1). By emphasizing the regeneration of native vegetation, FMNR also avoids the potential negative consequences of introducing exotic species and addresses concerns about the reduced biodiversity associated with new plantations. Since the start of the project in 2005, farmers in the region have mastered the many techniques necessary to stimulate fast regrowth and take care to regenerate a wide variety of species that provide both material, food, ecosystem, nitrogen fixing, and carbon sequestration benefits. Through written agreements between local communities, the most severely overgrazed and overcut areas were closed off for use exclusively by FMNR-practicing farmers. Additionally to the implementation of FMNR, local communities planted a further several hundred hectares with indigenous and commercially-viable tree species to add to reforestation efforts. Overview of context and outcomes: Across Ethiopia, only 4% of native forests remained prior to the start of the project. These FNMR efforts have helped to restore the forests and overgrazed lands of Humbo which, much like those across the rest of the country, have suffered extreme deforestation pressures largely due to a nation-wide need for agricultural land and food (4). The region in which Humbo is located also plays home to unique biodiversity with 10 endemic species on the IUCN red list who stand to benefit from the restoration (3). This project also provided significant revenue for the local community as World Vision’s first Clean Development Mechanism project. In addition to economic benefits for farmers and the affected communities, improved soil quality and stability has reportedly led to better recharging of groundwater and reduced flash flooding. Furthermore, the drastically increased vegetative cover has led to increases in several biodiversity metrics and the return of native animal species that had previously disappeared from the area.", "authors": ["Rinaudo", "Holland", "Brown", "Dettmann", "Tefera", "Tofu", "Lemma", "Tekalign"], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://doi.org/10.1007/s00267-010-9590-3", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 1, "grey": 1}}, {"title": "Female-led turtle conservation, reef restoration, and sustainable fishing", "db": "NbSI", "id": "198", "country": "India", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=198", "description": "A female-led federation dedicated to marine conservation, in particular of the endangered Olive Ridley turtle, are working to boost fish stocks through sustainable fishing practices and artificial reef construction, harness the carbon sequestration potential of seaweed, and create stable incomes for women in the area. Nature-based Intervention: The Samudram Women's Federation, comprising 160 women's self-help groups with over 5,000 members in total, works to protect the Olive Ridley turtle, promote sustainable fishing practices, cultivate seaweed for carbon sequestration, implement artificial reefs to increase fish stocks, and provide training in sustainable livelihoods. The Samudram Federation bolsters turtle protection policies by monitoring the turtle's population size, protecting and reintroducing young turtles into the wild, restoring its habitats, and advocating against extractive industry practices in nesting sites. The Federation has also constructed an artificial reef with concrete mounds to protect the shoreline and coastal habitats. This reef has had the added consequence of disincentivizing fishing in the area as bottom-trawler fishers are worried about getting their nets caught in the reef. Furthermore, to raise awareness about climate change as well as augment local incomes, members are cultivating seaweed for its carbon sequestration benefits and for processing into a natural gelatin substitute called 'agar-agar.' The federation focuses simultaneously on conservation and poverty reduction, reportedly providing income benefits to members and their families. For example, the Federation promotes and teaches a variety of sustainable fishing practices to its female members and has set up nine processing centers owned and run by the women themselves. Efforts have increased female ownership of key economic activities and improved access to services such as healthcare and education. Overview of context and outcomes: The Olive Ridley turtle is an endangered sea turtle whose key nesting sites are along the Odissa coastline. The government has banned fishing in the Gahirmatha Marine Sanctuary and restricted fishing in Rushikulya and Devi Rookery during peak nesting period in order to protect the turtle. Overfishing in the Bay of Bengal has caused fish stocks to dwindle and rising sea temperatures are coercing the stocks that do remain to deeper waters in which traditional fishing equipment is not viable.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1348165017.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.communityconservation.net/wp-content/uploads/2015/12/Odisha3.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Flood recovery and mangrove reforestation in the Limpopo River Estuary", "db": "NbSI", "id": "404", "country": "Mozambique", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=404", "description": "Communities surrounding the Limpopo River Estuary maintain a mangrove nursery, plant seedlings, and monitor the state of reforested areas. The reforested areas have already been found to provide improved flood protection, reduce salt intrusion on agricultural land, and bring back previously diminished wildlife species. Nature-based Intervention: Starting in 2008, 58 community members began restoring the channels that had previously connected the mangroves with the tides. Two years later, a mangrove nursery was created, which has to date produced 168,367 seedlings of six different mangrove varieties, and 200 community members have begun replanting. Seedlings have survived at a rate of 74% after community monitors responded to the threat of grazing crabs by covering seedlings with reeds. Seeing the benefits of the restored mangrove for agriculture, wildlife, and flood protection (another incident of severe flooding occurred in 2013 with significantly less damage), community members ultimately imposed a ban on forest product extraction in the reforestation zone. Overview of context and outcomes: In 2000, heavy rains caused devastating flooding of the Limpopo River Estuary. The flooding left mangrove forests uprooted and vulnerable to dieback. Although the mangrove forests in the estuary had previously been weakened due to both human and environmental pressures, they still served an important ecological and economic role for the surrounding communities.", "authors": [], "refs": [{"url": "http://www.cifor.org/publications/pdf_files/brief/GLFNairobi-Story8.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Floodplain restoration and rewilding for local risk reduction", "db": "NbSI", "id": "1188", "country": "Netherlands", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1188", "description": "The restoration of the Gelderse poort allowed for the rehabilitation of a key delta ecosystem while also allowing for increased flood defenses for nearby communities. Nature-based Intervention: This project represents a restored floodplain of around 5000 ha located at the top of a delta. This intervention was a a collaboration between companies excavating clay from the riverbed and NGOs. As the clay was extracted the NGOs would remove fences from the area and implemented naturalistic grazing regimes. Other areas were acquired and added to these excavated plots in order to create greater interlinkages within the rewilded area. Dams were removed and 50 houses and 10 farms were relocated to allow for natural flow dynamics. Free-roaming horses and Galloway cattle were added to the landscape to facilitate the naturalistic grazing regimes. The project also helped reintroduce key species to the landscape such as beaver ( Castor fiber ), otter ( Lutra lutra ), and sturgeon ( Acipenser sturio ). Overview of context and outcomes: This region is highly prone to flooding and is located near the city of Nijmegen. The project started in the early 1990s and slowly grew over time, until having the management handed over to the government in 2009. The project continues to be run under a naturalistic rewilding strategy. The area has also become a popular recreation area with the site reportedly having over 1 million visitors a year.", "authors": [], "refs": [{"url": "https://royalsocietypublishing.org/doi/10.1098/rstb.2017.0434", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.theguardian.com/environment/2022/sep/20/dutch-rewilding-project-turns-back-the-clock-500-years-aoe", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 1, "grey": 1}}, {"title": "Floodplain restoration for flood protection along the lower Danube river", "db": "NbSI", "id": "1240", "country": "Bulgaria", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1240", "description": "The lower Danube green corridor project is a collaboration between Bulgaria, Romania, Ukraine and Moldova to create a green corridor along the entire 1,000+ km stretch of the lower Danube river in order to reduce the risk of major flooding events and bolster local economies. Nature-based Intervention: The lower Danube green corridor project was formed as an agreement between the governments of Bulgaria, Romania, Ukraine and Moldova to restore 224,000 hectares of floodplain as part of a broader green corridor which would include a preserved area of 935,000 hectares along the lower Danube river. As of 2020, more than 60,000 hectares of floodplains have been restored. Alongside this restoration there have been dike removals along the river to allow for it to resume its natural flow patterns and causing over 750 hectares of land to naturally return to a flooded state. Invasive plants were also an issue along the river, so investments were made to clear these plants and traditional cattle breeds were brought in to graze the invasive plants. Native vegetation was also planted along the corridor with tens of thousands of native trees planted along the river and areas created for natural forest regeneration. Overview of context and outcomes: The lower Danube river is an important regional river which has faced large scale degradation over the last century. The river had been cut-off from three quarters of its natural floodplains due to the construction of dikes which has lead to large changes in its flow course. This puts the region at greater risk as it is highly prone to flooding and this is likely to be exacerbated by climate change. Gravel extraction, dredging and dams construction along the river has also lead to lower water tables in nearby agricultural lands and the erosion of the riverbed. The river has also experienced high levels of eutrophication due to agricultural run-off.", "authors": [], "refs": [{"url": "https://wwfeu.awsassets.panda.org/downloads/lessons_learnt_fromthe_lower_danube_landscape.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://climate-adapt.eea.europa.eu/en/metadata/case-studies/lower-danube-green-corridor-floodplain-restoration-for-flood-protection#:~:text=In%20the%20Lower%20Danube%20Green,in%20a%20long%20term%20perspective", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Forest and riverbank restoration in a conflict zone near the Kpaya River", "db": "NbSI", "id": "133", "country": "Central African Republic", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=133", "description": "A female-led local NGO is championing forest restoration and sustainable resource management to counter devastating land degradation and improve food security in a conflict zone. Nature-based Intervention: Representatives from three villages have come together to form Amical Bè Ôko, a women-led NGO focusing on the reforestation of the degraded banks of the river, improving food security, and promoting sustainable resource management. The intentional use of palm and fruit-bearing trees serve to improve local health, nutrition, and food security. The replanting of the bambara groundnut and moringa trees species have been used to reclaim and restore over four hectares of overexploited and previously unusable farmland. The moringa tree in particular is known for its resistance to drought and can be harvested as frequently as every six weeks. The initiative promotes sustainable hunting and fishing practices. Overview of context and outcomes: Slash-and-burn agriculture, uncontrolled bushfires, and overgrazing have contributed to land degradation and food insecurity along the banks of the Kpaya River. Although slash-and-burn agriculture can be sustainable in tropical environments like the south-central region of the Central African Republic, demographic pressures in local villages have reduced the time that land is left fallow, negatively impacting soil fertility. Community members often use bushfires to aid in hunting, fragmenting habitats and endangering several species. Fishers on the Kpaya River often use micro-dams to increase their catches which can cause damage to the riverine ecosystem, reduce water availability, and cause substantial changes to the river's microclimate.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1490634840.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Forest rehabilitation and crop sequencing to increase yields", "db": "NbSI", "id": "213", "country": "Nigeria", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=213", "description": "To combat land degradation, farmers were trained in and engaged in mutual exchanges to learn from each other about various organic farming methods including crop sequencing. Forest area was also rehabilitated mainly through the planting of endangered fruit and nut trees. Nature-based Intervention: An initiative implemented by the NGO Rural Infrastructures Services for Under-Served Populations (RISEUP) aims to combat land degradation in order to restore key poverty-reducing ecosystem services. The main tenets of the intervention included the implementation of organic farming methods, simple irrigation practices to better manage soil and water resources, and increasing access to high-quality, drought-resistant hybrid seeds. More specifically, organic farming practices that were taught and implemented included crop scheduling, sequential growing to provide space for fertilization from crop detritus, grafting and nurturing of vegetables that struggle to propagate naturally, mulching, and composting. These methods were often carried out on \"demonstration\" plots which allowed for learning and exchanges between farmers as the project advanced. Furthermore, extensive tree planting was carried out to restore forest in the area and provide edible non-timber forest products such as nuts and fruit. The community propagated over 4,000 threatened afang vine and bush mango seedlings, which have been planted out as part of the reforestation effort. Overview of context and outcomes: Majority of farmers in Obudu in the Cross River State of Nigeria cultivate small-scale plots of less than one hectare. The area suffers significant impacts from human-induced land degradation compounded by irregular and unpredictable rainfall, flooding, land degradation, and low agricultural productivity. Due to these human-induced and environmental stresses, several indigenous plant varieties are under threat including popular crops that provide food security for millions of people cross the country.", "authors": [], "refs": [{"url": "https://www.thegef.org/sites/default/files/publications/SGP-Agroecology%20Publication-Digital.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Governance for ecosystem-based adaptation project in the Sixaola River basin", "db": "NbSI", "id": "359", "country": "Costa Rica", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=359", "description": "The Governance for Ecosystem-based Adaptation project, or Go4EbA project, aims to address food and water security through the restoration of riparian forests, soil conservation techniques, agroforestry and agroecological diversification. Nature-based Intervention: Initiated by the IUCN along with partners, the Go4EbA project has been implemented in several countries, of which the Sixaola river basin is one case site. With a focus on climate adaptation, food security and water security, a strategic watershed development plan has been drawn up for the Sixaola River basin. The project activities include the restoration and reforestation of key riparian and watershed areas with both native and exotic timber trees, agroforestry with fruit trees, and supporting local agrobiodiversity through seed fairs. The project also supports traditional indigenous agricultural practices, as well as provides education on new practices such as tree grafting. These activities aim to enhance the resilience of the ecosystem to the effects of climate change, in addition to also enhancing the resilience of the local communities through capacity building and income stabilization through agricultural diversification. Overview of context and outcomes: Climate change has been altering rainfall patterns in this region on the border of Costa Rica and Panama, resulting in droughts, irregular and more intense rainfall, and unpredictable shifts in seasons, which, in turn, have led to flooding, mudslides and loss of agricultural production. In addition to experiencing these climatic challenges, the Sixaola river basin experiences challenges of bi-national governance due to its location on the border of two nations, and falls under the traditional lands the Bribri indigenous peoples, where many Bribri indigenous communities exist today.", "authors": [], "refs": [{"url": "https://pubs.iied.org/pdfs/17627IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Grassland management and wetland conservation in the Nor Yauyos-Cochas Landscape Reserve", "db": "NbSI", "id": "286", "country": "Peru", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=286", "description": "Local communities in the Nor Yauyos-Cochas Landscape Reserve who maintain traditional ways of living in harmony with nature, have engaged with the Mountain Ecosystems-based Adaptation program implemented by the UNDP and IUCN to better manage grasslands and local watersheds. Nature-based Intervention: The Mountain Ecosystem-based Adaptation program (EbA) is an initiative led by the United Nations Development Programme and the International Union for Conservation of Nature. The objective of the project is to reduce the vulnerability of mountain ecosystems in the Nor Yauyos-Cochas Landscape Reserve to climate change. The EbA program focused on three communities in particular: Canchayllo (900 inhabitants; 7,650 hectares), Miraflores (250 inhabitants; 13,031 hectares), and Tanta (600 inhabitants). As part of the EbA program, community members have introduced approaches to communal management of native grasslands, with a particular emphasis on the management of vicuñas, a wild relative of the llama. The expansion and conservation of wetlands and restoration of water channels and reservoirs to support micro-watersheds was another major tenet of the project. For example, a natural water reservoir dam was restored to reduce water filtration and ensure adequate water supply during the dry season. Furthermore, in Miraflores, a 5-hectare protection zone was enlarged encircling an upper micro-watershed, limiting cattle entry into the area. Overview of context and outcomes: The Nor Yauyos-Cochas Landscape Reserve is an area of extremely high conservation value in the high Andean region. The main livelihood for all communities is either livestock or cattle farming although they also practice small-scale cultivated agriculture. Local communities maintain ancestral ways of living in harmony with nature. The interventions have all focused on participatory and community-based management which has improved social cohesion and reduced conflict over resources among community members.", "authors": [], "refs": [{"url": "https://www.weadapt.org/sites/weadapt.org/files/eba_from_mountains_to_oceans_0.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.globalsupportprogramme.org/projects/mountain-eba-peru", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Green belt serves as buffer against wildfires and community forest", "db": "NbSI", "id": "162", "country": "Togo", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=162", "description": "In the early 1970s, elders in the town of Ando Kpomey proposed creating a \"green belt\" or forest buffer around the town to mitigate the impacts of bushfires that frequently devastated the community. By 2013, as a result of annual planting efforts, this green belt had expanded into a 350-380 meter wide community forest ring. Nature-based Intervention: Community members of the town of Ando Kpomey in southwestern Togo decided to create a forest buffer or \" green belt \" around the village boundaries to protect against bush fires. The elders who proposed the solution also saw the green belt as a way of protecting biodiversity and mitigating the dire economic and social costs of fires. Practically, the green belt was established 14 meters away from the town itself and started as a 10-meter strip of trees around this perimeter. Each year since the initial planting, an additional 10-meter strip of trees was planted. In 2013, the green belt had become a community forest with a depth of 350 to 380 meters. Management and watchdog committees were created to manage the use of non-timber forest products, charge and distribute revenue from forest visitors, and ensure proper forest maintenance and monitoring. Local women have special permission to access the forest to collect firewood which has greatly reduced the time and labor burden of collecting this basic need. Additionally, various crops and medicinal plants are grown in the forest. Overview of context and outcomes: Active deforestation, bushfires, hunting, and poor resource governance have historically contributed to severe deforestation in Togo. In 2013, Togo had a significantly high annual deforestation rate of 5.75%. Deforestation has led to land degradation and leaves local communities vulnerable to flooding, bush fires, and other extreme weather events. The town of Ando Kpomey, for example, had suffered severe bushfires including two that burned the village to the ground.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1_1371659728.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Harvest and trade of wild vicuña fibre", "db": "NbSI", "id": "487", "country": "Bolivia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=487", "description": "In high-altitude regions of Bolivia, local communities communally manage, harvest and sell wild vicuña ( Vicugna vicugna ) fibre, contributing to species and habitat protection. Nature-based Intervention: In Bolivia, all vicuña fibre is harvested from the wild animals by local communities which have been granted the legal right to capture, shear and release the wild vicuña on their communal lands. Organized into registered Vicuna Manager Communities (CMVs) and grouped into Regional Associations of Managers of Vicuña (ARMV), including indigenous groupings such as Quechua and Aymara, the communities use a modified traditional practice from Incan times with religious and ceremonial aspects called the chaku to herd the animals between September and November. There is great potential to expand this initiative, as only around 6% of vicuña fibre is harvested in Bolivia and many communities do not yet participate in the system, due to barriers such as lack of knowledge, lack of tools and materials, and organizational issues, as well as broader challenges such as bureaucratic regulatory environments, traceability requirements, slow issuing of permits and long delays in receiving payments. Overview of context and outcomes: Vicuña are wild animals in the camelid family, closely related to alpacas and llamas, native to high-altitude areas of South America, including Bolivia. The vicuña fibre is used like wool to make clothing for high-end luxury markets, usually to end customers in Italy. Highly sought-after for their soft and lightweight wool, by the mid-twentieth century vicuña populations had been decimated as there were no clear user rights to this open access resource. After a ban on the hunting and sale of vicuña was implemented and the Convention for the Conservation and Management of Vicuna was agreed upon by Andean states in the 1970s, vicuña populations began to steadily increase again. Following the success in population restoration, the sustainable use and trade of vicuña fibre has subsequently been allowed, however challenges remain with the threat of poaching, disease and rangeland degradation. One third of the global population of vicuña lives in Bolivia, where the vicuña are officially property of the government. As the communities who manage the vicuña are some of the poorest and most isolated in Bolivia, living in inhospitable climates and unproductive land with little income-generating opportunities, the supplemental source of income from the vicuña fibre can have a significant positive impact, complimenting other activities such as raising of domestic camelids like alpaca or llamas, as well as other livestock. The continuation of international trade, which underpins this conservation model, is crucial to the long term sustainability of the program, as well as the ongoing support from the national government and guidance and financing from NGOs and the international community.", "authors": [], "refs": [{"url": "https://cites.org/sites/default/files/eng/prog/Livelihoods/case_studies/2.%20Bolivia_vicuna_long_Aug2.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Howler monkey community conservation sanctuary led by women&#8217;s group", "db": "NbSI", "id": "150", "country": "Belize", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=150", "description": "A women-led community conservation group manages a howler monkey sanctuary to promote biodiversity conservation and help improve local livelihoods. Nature-based Intervention: First established in 1985 and subsequently taken over by a women-led conservation group in 1998, the Community Baboon Sanctuary Women’s Conservation Group (CBSWCG) supports the conservation of the black howler monkey, locally referred to as baboon, in the Community Baboon Sanctuary (CBS) covering 3,315 hectares of the Belize River Valley. The primary objectives of the group include the protection of howler monkey populations, the maintenance of biological corridor integrity and the sustainable use of wildlife resources in the region. Reduction of deforestation has reportedly resulted in positive climate change mitigation outcomes as well as disaster risk reductions, contributed to the recovery of other wildlife species populations, and provided numerous socioeconomic benefits. Overview of context and outcomes: The sanctuary is largely made up of private land and the initiative depends on the participation of landowners making voluntary conservation pledges and following community-designed adaptive management plans.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2019/02/Community-Baboon-Sanctuary-Belize.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Indigenous community-led reforestation and agroforestry countering Amazonian deforestation", "db": "NbSI", "id": "148", "country": "Brazil", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=148", "description": "The Kayapó indigenous peoples are consistently fighting to defend their ancestral land from the deforestation pressures facing the Amazon. These defensive actions to preserve the integrity of their land are further supported by investments in sustainable farming and agroforestry to reduce community impacts on the ecosystems they aim to protect. Nature-based Intervention: The Instituto Raoni protects and surveils over two million hectares of indigenous land, including the largest remaining contiguous segment of the Amazon rainforest. Perhaps most famously, Instituto Raoni, after discovering the importance of images in their first contact with mass communication media, encourage young Kayapó community members to act as \"video warriors\" documenting illegal logging and other activities that risk the integrity of their land. Furthermore, Instituto Raoni works to enable and teach sustainable agriculture and agroforestry methods to support the conservation of their land. In particular, Kayapó women play a key role in their communities as the sole custodians of agriculture and work to recover degraded land and implement agroforestry principles. One of the main interventions has been the reduction in the use of fire to prepare land for agriculture to both reduce the communities' carbon emissions and the impact of forest fires. Partnerships with NGOs have allowed for the expansion of sustainable agricultural practices, community farms, and the conservation of traditional crop varieties to further bring community needs into harmony with the surrounding landscape and ecosystem. Efforts to strengthen sustainable production chains have allowed the selling of handicrafts and non-timber forest products. Overview of context and outcomes: The Kayapó indigenous peoples' land is located in the so-called \"Deforestation Ring\" of the Amazon where deforestation pressures are most severe. Their territory is also part of the South Amazon Ecotones Ecological Corridor which is remarkably rich in biodiversity. The Kayapó have therefore long fought to defend the land from deforestation and have come to form the Instituto Raoni as the unifying authority of this campaign.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/Instituto-Raoni-Brazil.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Indigenous knowledge for climate disaster mitigation", "db": "NbSI", "id": "539", "country": "Zimbabwe", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=539", "description": "Indigenous knowledge that has been developed and used over centuries in Zimbabwe holds solutions to disaster risk reduction and adaptation to climate change in vulnerable communities. Nature-based Intervention: Across four districts in Zimbabwe, researchers have documented indigenous knowledge, methods and technologies that have enhanced vulnerable communities' ability to reduce disaster risk, while supporting food security and positive health outcomes. Overview of context and outcomes: The indigenous knowledge documented relates largely to natural resource management, as well as using traditional knowledge for weather forecasting and subsequent mitigation measures for reducing the impacts of floods and droughts. For example, when changing winds indicated that a prolonged rainfall was likely, planting and other activities that were well suited to rainy conditions were initiated. Most notably, when community members discovered exceptionally well developed wild fruit such as Wild Loquat and Sweet Monkey oranges, this indicated that was poor rainy season was to be expected, which led people to grow drought resistant crops, harvest and store fruits for future use, and develop additional sources of drinking water. Cultural taboos developed over time to guide the management of natural resources. For instance, one taboo forbids people from overharvesting and commercializing certain medicinal plants by having people believe that some herbs cure only when consumed at the point of location and not when carried home. Another common taboo prohibits the cutting down of wild fruit trees and trading in wild fruit, as wild fruits growing near communities act as a reserve granary for the community during times of distress, particularly droughts, ensuring people's food security. Moreover, beekeeping has been a customary practice in these districts for generations, and cultural taboos around beekeeping have reportedly prevented deforestation, as the forest forage for bees is respected.", "authors": [], "refs": [{"url": "https://www.researchgate.net/publication/288824194_Exploiting_indigenous_knowledge_commonwealth_to_mitigate_disasters_From_the_archives_of_vulnerable_communities_in_Zimbabwe", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Indigenous land rights claim expels drug trafficking and improves local livelihoods through sustainable agriculture", "db": "NbSI", "id": "147", "country": "Colombia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=147", "description": "The Inga indigenous people drove the Wausikamas Movement to create an alliance with the Colombian government to reclaim rights to tens of thousands of hectares of ancestral land through the expulsion of drug-related activity in the area. The Inga reforested and regenerated land that had been degraded as a result of poppy cultivation and established various livelihood options from organic crop cultivation. Nature-based Intervention: In the midst of armed conflict, the indigenous Inga people in the village of Aponte successfully regained their rights to 22,283 hectares of their ancestral land. Practically, this was achieved through their Wausikamas Movement which created an unprecedented alliance with the Colombian government to compensate the Inga people for removing drug plantations from their land. The Movement has created a Tribunal to support other indigenous communities in the area claim their rights to ancestral land and expel the conflict-laden and violent intrusion of the drug industry. The Wausikamas Movement expelled guerilla groups, paramilitaries, and armed drug trafficking groups before designating 17,500 hectares as sacred area. Overview of context and outcomes: On their reclaimed land the community cultivates organic food using organic fertilisers and regenerate and reforest areas that had previously been affected by poppy plantations. They focus on cultivating coffee, banana, sugarcane, fruit trees such as orange, avocado, tomato, lulo, lemon and soursop, and timber such as myrtle, oak, Colombian pine and guayacán.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2019/02/Wuasikamas-Colombia.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Integrated water management and reforestation in a harsh dry climate", "db": "NbSI", "id": "168", "country": "Morocco", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=168", "description": "The Amsing Association is an important governing body in the village of Douar Elmoudaa that was created to respond to land and water management issues, as well as harsh climatic conditions and the effects of climate change. Nature-based Intervention: The Amsing Association has supported the reintroduction of a locally regulated land management practice that bans herders from grazing livestock on protected land to allow passive revegetation, which in turn reduces erosion and flooding. The community and its Association also planted cypress, apple and walnut trees on the hills surrounding the village, conducting this reforestation within the framework of their Community Based Adaptation (CBA) program. Combined with grey infrastructure such as water towers and rock dams to improve integrated water management, the initiatives carried out by the Association have reportedly benefited biodiversity and the resilience of the Douar Elmoudaa community to increasing climate variability. Overview of context and outcomes: The community of Douar Elmoudaa has always faced intense water scarcity and conflicts with neighboring villages over water. These challenges have been exacerbated by seasonal pattern changes and more severe storms caused by climate change on top of the frequent threat of devastating flash floods.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1370356040.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Integrated water resource management to preserve water quality and prevent sedimentation", "db": "NbSI", "id": "1238", "country": "Congo Democratic Republic of the Congo", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1238", "description": "The Lukaya River Basin is an important source of drinking water for the Democratic Republic of the Congo (DRC), but heavy sedimentation has jeopardized its flows leading to community-led forestry programs to reduce erosion. Nature-based Intervention: Large scale deforestation had left the Lukaya River Basin vulnerable to flooding and erosion. In order to counteract this trend 4 tree nurseries were established which are capable of producing 42,000 seedlings each year. A community agroforestry system was created covering 15 ha( 7 ha of which reforested slopes) and benefitting 20 local families. Green buffer zones were established along the riverbank in order to reduce sedimentation and erosion. Bioengineering utilizing the plant vetiver( Chrysopogon zizanioides ) was implemented in order to to reduce the rates of erosion in gully's and riverbanks. Four nurseries were created with the ability to produce 32,000 vetiver plants per year. Workshops were held to teach the community about ecosystem based disaster risk reduction (Eco-DRR) and how to implement it. Overview of context and outcomes: The Lukaya river basin is an important water source for the country's capital Kinshasa. The erosion in the river causes sedimentation which in turn reduces reduces water quality, blocks the flow of the river, decreases the quality of local fisheries and increases the cost of water treatment.", "authors": [], "refs": [{"url": "https://data.jncc.gov.uk/data/376d989f-0563-4e7f-b034-c79108f63758/nbs-triple-win-toolkit.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.unep.org/news-and-stories/story/river-basin-management-improves-access-drinking-water-dr-congo-0", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Jurisdictional REDD+ project tackles national deforestation levels", "db": "NbSI", "id": "1253", "country": "Guyana", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1253", "description": "Guyana's jurisdictional REDD+ project has helped keep the annual national deforestation rate to 0.1 percent while providing finance mechanisms for a national carbon credit strategy. Nature-based Intervention: The project is a REDD+ partnership with the government of Guyana which aims to support low-carbon development strategies through carbon crediting aimed at limiting national deforestation rates. This project covers all 18 million hectares of forest found within Guyana, which covers about 85% of the entire country. This has allowed the country to issue 33.47 million ART-TREES credits between 2016 and 2020, which has allowed for large scale financing of activities across this country. Overview of context and outcomes: Guyana is one of the South American countries which lies within the amazon basin making it a critically important watershed and hotspot of biodiversity. The country has had a historically low deforestation rate which this program can help the community benefit from.", "authors": [], "refs": [{"url": "https://www.wbcsd.org/download/file/16132", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://winrock.org/art-issues-worlds-first-jurisdictional-forestry-carbon-credits-to-guyana/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Lamlash Bay No-Take Zone", "db": "HUB", "id": "2013", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=2013", "description": "The Lamlash Bay No-Take Zone was established due to 13 years of community campaigns, and aims to protect maerl beds, seagrass beds, and kelp forest ecosystems through fishing or extraction bans. Nature-based intervention: Fish stocks in the Clyde Sea collapsed following the repeal of a trawling ban in 1962 (1) (2). Yet the continued presence of juvenile fish and their habitats, and a large and healthy population of the Norway lobster, indicated that recovery could be possible if a ban on trawling and dredging was reinstated (3) (4). In 2008, following a long campaign by the Community of Arran Seabed Trust (COAST), a 2.67 km 2 No-Take Zone was established in Lamlash Bay where no fishing or extraction is permitted from the water, seabed, or shore. Lamlash Bay was chosen because it hosts large beds of maerl (an unattached calcareous red alga), seagrass beds, kelp forests, and boulders that provide habitat for sea life (5). In addition, the boundaries of the zone provide a clear entrance from the southern and northern side of the bay, making it easy to view, monitor and police fishing boats that enter the area from the shore (6). In 2016, a wider 282 km 2 area encapsulating the No-Take Zone was established as the South Arran Marine Protected Area, resulting in the exclusion of scallop dredging and limitations on prawn trawling activity, although more sustainable forms of fishing were allowed to continue (7). Overall, the work of COAST and the Lamlash Bay project resulted in the recovery of damaged seabed and was instrumental in paving the way for national and international marine protection (8). Overview of context: Motivated by the demise of demersal fish landings in the Clyde due to bottom trawling and the lack of response from the Scottish Government, two Arran divers set up COAST in 1995 to protect marine habitats in Arran’s seas. Inspired by marine reserves in New Zealand and their benefits to fisheries and the marine environment, COAST campaigned for 13 years for the government to establish a No-Take Zone in Lamlash Bay (5). Community support on Arran and beyond was instrumental to the successful establishment of the No-Take Zone, giving coastal communities a voice in decisions affecting their seas (6). In 2012, COAST proposed the establishment of the South Arran Marine Protected Area, which was designated in 2016 (7). To deliver education and outreach objectives, COAST also launched the COAST Discovery Centre in 2018, a site for community education, citizen-science, and activities relating to the Marine Protected Area (7).", "authors": ["Thurstan", "Heath", "Speirs", "McIntyre", "Fernandes", "Turrell", "Ryan", "Bailey"], "refs": [{"url": "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0011767", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2019/02/Heath-Speirs-2011-Changers-in-species-diversity-Clyde.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.gov.scot/binaries/content/documents/govscot/publications/progress-report/2012/06/scottish-marine-freshwater-science-volume-3-number-3-clyde-ecosystem/documents/00395239-pdf/00395239-pdf/govscot%3Adocument/00395239.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2019/02/Ryan-Bailey-2012-Trawling-and-Dredging-in-the-Clyde-Sea-Area.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/no-take-zone/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://ffi.maps.arcgis.com/apps/Cascade/index.html?appid=70448e12ec3c45139beca33dfc990b7a", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.rewildingbritain.org.uk/rewilding-projects/coast", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2020/02/Arran-Success-Paper-February-2020.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/blue-carbon/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/extraordinary-flame-shell-discovery-in-south-arran-mpa/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/seashore-and-coastal-habitats/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/recovery-of-lamlash-bay-ntz/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2018/10/2011-Howarth-et-al-1.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://link.springer.com/article/10.1007/s00227-015-2627-7", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2019/09/2018-Crimmins-Crustacean-survey-report.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2020/11/2019-James-recovery-of-commercially-valuable-scallop-species-around-Isle-of-Arran-MSc-dissertation.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2020/11/2019-Notley-Recovery-of-biodiversity-habitats-Lamlash-NTZ-and-South-Arran-MPA-Msc-thesis.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2018/10/2015-Rodriguez-A-Feasibility-MIC-Arran-1.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2018/10/2015-Cairney-COAST_volunteer_motivations-1.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/working-with-arrans-community/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/about-the-discovery-centre/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/save-the-arran-outdoor-education-centre/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2018/10/2011-Bower-R-Awareness_of_and_attitudes_towards_the_Lamlash_Bay_no_take_zone_Jan19_201_MSc-1.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2020/11/Marine-Social-Attitudes-Arran-Howarth-Forster-2020.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/now-you-sea-it-project-gains-vital-funding/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/funders/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.sciencedirect.com/science/article/abs/pii/B9780444627100000183", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2018/07/Summary_of_York_University_research_within_Lamlash_Bay_No_Take_Zone_2013-1.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.arrancoast.com/wp-content/uploads/2018/10/2008-SNH-report-346-mapping-Habitats-Species-Lamlash-CMCA-1.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.nature.scot/sites/default/files/Publication%202017%20-%20SNH%20Commissioned%20Report%20957%20-%20Assessment%20of%20Blue%20Carbon%20Resources%20in%20Scotland%27s%20Inshore%20Marine%20Protected%20Area%20Network.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.arrancoast.com/", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 31}, "base": {"peer": 3, "grey": 28}}, {"title": "Landscape restoration, sustainable agriculture, and water and soil conservation in a montane landscape", "db": "NbSI", "id": "355", "country": "Uganda", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=355", "description": "Populations in the Mount Elgon region of Uganda face imminent challenges as a result of climate change including increasingly erratic rainfall and the melting of snow and glaciers resulting in flooding and subsequent drought. Ecosystem-based adaptation approaches were implemented to restore degraded landscapes, encourage more sustainable agricultural methods, and conserve water and soil resources. Nature-based Intervention: Therefore, under the auspices of a multi-country effort led by the International Institute for Environment and Development, the International Union for Conservation of Nature, and the UN Environment World Conservation Monitoring Centre, local communities have participated in the implementation of various measures as part of an ecosystem-based adaptation scheme. First, more sustainable farming and irrigation practices have been encouraged to conserve water and soil including terracing, grass bunds and banks, hedgerows, agroforestry, mulching, the use of bio-fertilizer, farming along contour lines. Furthermore, reforestation, agroforestry, and riverbank restoration efforts aimed to restore ecosystem health. The introduction of fuel-efficient stoves have also reduced deforestation impacts as demand for firewood has decreased. Overview of context and outcomes: The districts of Kween, Kapchorwa, Sironko and Bulambuli in the Mount Elgon region are already facing significant climate change-induced challenges. Rising temperatures are predicted to melt glaciers and snow inducing flooding followed by drought. Rainfall is also expected to be delivered in extremes, with more intense rain in the wet season and less rain in the dry season. These changes have already greatly affected agricultural productivity and provoked more flooding, dry spells, landslides, and soil erosion. Efforts to recover agricultural yields have led to the overexploitation of ecologically sensitive areas and encroachment upon river banks compromising water availability and quality. Deforestation, poor land management, and unsustainable farming practices compound these issues by causing soil degradation and erosion.", "authors": [], "refs": [{"url": "https://pubs.iied.org/pdfs/17623IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.iucn.org/sites/dev/files/feba_eba_qualification_and_quality_criteria_final_en.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Largescale prairie-wetland restoration", "db": "NbSI", "id": "666", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=666", "description": "The Glacial Ridge Project is one of the largest prairie-wetland restoration initiatives in the United States. Nature-based Intervention: Initiated by The Nature Conservancy in 2000 after purchasing the tract of land, the core of the Glacial Ridge Project spans 9,000 hectares of land, 90% of which has been degraded by wetland drainage, excessive grazing, mining and conventional agriculture. The project's primary objective was to reconnect a cluster of 14 fragmented prairie-wetland remnants, totaling 5,200 hectares in size, by restoring the habitat and hydrology of the 9,000 hectare core area, reportedly resulting in a three-fold increase of contiguous prairie-wetland habitat to a total of 15,200 hectares. This was accomplished through actions such as filling and plugging drainage ditches, re-grading previously excavated soil, reintroducing native plants, seeding of native grass species, and invasive weed management. Overview of context and outcomes: The restoration of this Northern Tallgrass Prairie has reportedly had positive outcomes for ecosystem integrity and biodiversity conservation, as well as for ensuring the continued provisioning and quality of drinking water for local communities, while also mitiga
