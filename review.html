hed. Overview of context and outcomes: Predating the Inca empire, the Tacana people have resided on this land. The region contains 11 different forest and savanna ecosystems not yet represented in other areas protected by the government. Therefore, proper management of these areas is vital for the survival of these ecosystems, in particular the embedded wildlife that includes 51 endangered plant and animal species. The Tacana territory encompassed by this land title is a well-known hotspot for biodiversity and connects several habitats with the protected area of Madidi. Therefore, CIPTA’s work to maintain and increase the connectivity of the habitats under its land title with surrounding areas upholds the biodiversity present and focuses on its preservation and improved health.", "authors": ["Salinas", "Wallace", "Painter", "Wentzel", "Duran", "Miro"], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/CIPTA-Bolivia.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://bolivia.wcs.org/en-us/Global-Initiatives/Territorial-management/Tacana-Indigenous-People.aspx", "detail": "🔎 Adds [🟡corroborates]: WCS Tacana (CIPTA) territorial-management page\nWCS has partnered with CIPTA for two decades — documents the 389,303 ha titled territory and the deforestation rate four times lower than surrounding areas. (Proposed by Claude Opus 4.8 enrichment pass, 2026-0", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Limited info and broken NBSI link"}, {"kind": "resource", "label": "Add source", "url": "https://news.mongabay.com/2025/11/despite-new-land-title-bolivias-indigenous-tacana-ii-still-face-invaders/", "detail": "🔎 Adds [🟡corroborates]: 2025 news on Tacana land-title challenges\nRecent reporting on the Tacana II title (completed July 2025) and ongoing pressures — brings a case last updated years ago up to the present. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "good info and broken NBSI link"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Indigenous joint management of the Pilón Lajas Biosphere Reserve forest and watershed", "db": "NbSI", "id": "185", "country": "Bolivia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=185", "description": "In response to threats to local ecosystems, forest resources, and watersheds, the Tsimané Mosetene Regional Council was created to protect the rights of local indigenous communities and advance conservation and sustainable agriculture and forestry plans. Nature-based Intervention: Tsimané Mosetene Regional Council (CRTM) promotes the sustainable joint management of resources in the reserve including through the advancement of projects aimed to conserve and safeguard wildlife and promote sustainable agricultural methods. Sustainable agricultural methods have created alternative livelihood options including organic honey, coffee, and cocoa production managed by local associations. Furthermore, a sustainable forestry joint management plan and various methods for protecting water basins that supply water to thousands of people in the Reserve have been implemented. This same forest management mandate led to the expulsion of the logging industry in the Reserve serving to protect wildlife in the area. Overview of context and outcomes: The CRTM works in the Pilón Lajas Biosphere Reserve to conserve biodiversity and protect the rights of 22 indigenous communities inside the reserve. CRTM has consolidated the indigenous property rights over nearly 1,500 square miles of land. The Council has also constructed schools across 14 communities in the Reserve.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1_1361401648.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "literature", "label": "Add source", "url": "https://www.iccaconsortium.org/wp-content/uploads/2015/08/grassroot-bolivia-pilon-lajas-2008-en.pdf", "detail": "🔎 Adds [🟢new]: report on Pilon Lajas / CRTM co-management (PDF)\nICCA Consortium report on Pilón Lajas governance — documents the Tsimane-Mosetén Regional Council's joint management arrangement at the heart of this case. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "good info and broken NBSI link"}, {"kind": "resource", "label": "Add source", "url": "https://www.unesco.org/en/amazon-biosphere-reserves-project/pilon-lajas", "detail": "🔎 Adds [🟡corroborates]: UNESCO Pilon Lajas Biosphere Reserve page\nUNESCO's page for the biosphere reserve — official designation context and current initiatives in the reserve. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Limited info and broken NBSI link"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Large community-managed forest established by a community of monks", "db": "NbSI", "id": "166", "country": "Cambodia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=166", "description": "Monks Community Forest is an 18,261-hectare evergreen forest in northwest Cambodia in which a unique approach to law enforcement based on Buddhist principles demonstrates the power of linking conservation with traditional customs and beliefs. Nature-based Intervention: In response to widespread deforestation, the monks of Samraong Pagoda acquired the legal right to protect the surrounding forest, established patrol teams, demarcated the forest’s boundaries, and raised environmental awareness among local communities. Now Cambodia’s largest community forest, it is co-managed by a committee of diverse stakeholders and, while logging and hunting are prohibited, villagers may use traditional fishing methods, collect fallen timber for construction, and harvest non-timber forest products (NTFPs). Moreover, villagers are encouraged to fish, collect materials for their shelters, and harvest non-timber forest products such as bamboo, wild ginger, fruit and mushrooms for subsistence use and for traditional medicines, as well as to sell in local markets. Overview of context and outcomes: Because of their role in Khmer society as moral and spiritual leaders, the involvement of monks in the management and patrolling of the Monks Community Forest brings legitimacy to forest protection efforts and has reportedly served as a powerful deterrent to forest crimes including illegal logging and hunting. The monks have been able to cultivate a conservation ethic among villagers living near the MCF by explicitly linking nature conservation to the life of the Buddha, and to Buddhist principles such as karma and living a moral life. As a result of awareness-raising efforts, the mostly Buddhist villagers see forest protection as benefiting them spiritually.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1348163303.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://www.peoplenotpoaching.org/monks-community-forest", "detail": "🔎 Adds [🟡corroborates]: People-not-Poaching case study — patrol/tree-ordination tactics\nIndependent case write-up of the 18,261 ha Monks Community Forest — patrol model, Buddhist-principle enforcement, and community NTFP rights. (Proposed by Claude Opus 4.8 enrichment pass, 2026-", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "good info and broken NBSI link"}, {"kind": "resource", "label": "Add source", "url": "https://climateheroes.org/bun-saluth-guardian-of-a-cambodian-forest/", "detail": "🔎 Adds [🟡corroborates]: profile of founder monk Bun Saluth\nProfile of Venerable Bun Saluth and the protection model — substitute for a dead Cambodia Daily feature, covering the same history. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "good info and broken NBSI link"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Makoni Organic Farmers Associations focuses on capacity building and certification in organic farming", "db": "NbSI", "id": "125", "country": "Zimbabwe", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=125", "description": "Aiming to counter the effects of deforestation by tobacco farming and soil degradation by chemical inputs, the Makoni Organic Farmers Association promotes capacity building, the scale-up of organic farming methods, and support for farmers to obtain organic certifications to access more lucrative markets. Nature-based Intervention: The Makoni Organic Farmers Association was formed with the aim of expanding the use of organic agriculture techniques. The Association, now comprised of 450 local farmers, reports implementing a three-pronged approach in its actions. First, capacity building involves the training of farmers in organic farming standards and techniques. Second, the Association works to scale good farming practices including aquaculture, apiculture, mushroom cultivation, poultry rearing, and tree nurseries. The association has created seven one-hectare organic farming gardens for demonstration purposes. They also support a living gene bank on a ten-hetare area that supports locally adapted, open pollinated varieties of maize and legumes. Farmers are also encouraged to maximise the use of agroforestry to restore plant diversity. Third, they promote and support organic certification for participating farmers so that they can gain access to more lucrative markets. Overview of context and outcomes: Farmers in the Makoni district area of Zimbabwe struggled to cultivate crops on land that had been rendered infertile as a result of pesticide use and deforestation resulting from tobacco curing processes.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1466191274.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://www.undp.org/zimbabwe/publications/equator-initiative-case-study-makoni-organic-famers-association", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nUNDP's case study of the Makoni association — 450 farmers, 450 ha under organic management, half the members certified, IFOAM/ISO65-track accreditation. (Proposed by Claude Opus 4.8 enrichment ", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": "ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}, {"kind": "literature", "label": "Add source", "url": "https://www.tandfonline.com/doi/full/10.1080/09064710.2022.2142657", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nReview of smallholder organic agriculture in Zimbabwe and sub-Saharan Africa — the challenges/opportunities frame around certification-led models like Makoni's. (Proposed by Claude Opus 4.8 enr", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": "ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Mangrove afforestation on reclaimed land in the Yucatán Peninsula", "db": "NbSI", "id": "181", "country": "Mexico", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=181", "description": "The San Crisanto Foundation manages the conservation work of the San Crisanto community which includes mangrove afforestation, watershed rehabilitation, and fishing and hunting restrictions. This work also supports flood prevention needs in the area. Nature-based Intervention: The San Crisanto Foundation, which was established in 2001 to support the management and conservation of the ejido, currently focuses on restoring biodiversity and reducing local flood risk through mangrove afforestation and active conservation efforts. The conservation area covers 1,020 hectares of the total 1,500-hectare area. This conservation area includes 110 hectares of tropical deciduous forest, 850 hectares of mangrove forests, and 60 hectares of grassland and wetland. Conservation efforts include mangrove afforestation and restoration of canals and cenotes that allow floodwaters to drain more easily and provide habitat for local wildlife. A ban on hunting and restrictions on fishing are also enforced to support conservation imperatives. The Foundation prides itself on its community outreach and education programs that promote and raise awareness about the value of wetland and mangrove ecosystems for biodiversity and climate resilience. Overview of context and outcomes: The San Crisanto Foundation was established in San Crisanto, a small fishing community of approximately 150 Mayan families on the Yucatán peninsula of Mexico. The Foundation was established in response to increasing exploitation of local natural resources by large farm owners in the area. The Foundation's work began by staking a land claim under the ' ejido ' system, a form of land tenure designation dating back to pre-Columbian Mexico, which was approved by the federal government in 1980. The ejido designation requires a land use plan be put in place, designating a part of the community territory to conservation, productive activities, and land for human settlements.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1_1360170944.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://www.iccaregistry.org/en/explore/Mexico/san-crisanto", "detail": "🔎 Adds [🟡corroborates]: ICCA Registry profile — ejido/UMA governance context\nSan Crisanto's entry in the international ICCA registry — documents the ejido's communal governance, 800 ha mangrove and 45 rehabilitated cenotes. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": ""}, {"kind": "resource", "label": "Add source", "url": "https://earthjournalism.net/stories/mexicos-blue-carbon-pioneers-progress-despite-lack-of-state-support", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nEJN reporting on San Crisanto as Mexico's blue-carbon pioneer — recent independent coverage including the finance angle. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": "ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Mangrove protection in the Indus Delta", "db": "NbSI", "id": "752", "country": "Pakistan", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=752", "description": "Community-led mangrove restoration and sustainable seafood harvesting are helping counter climate change pressures on coastal communities and rebalance the complex dynamics of the Indus Delta. Nature-based Intervention: The WFF (World Wildlife Fund)-Pakistan worked with community members to develop sustainable resource management strategies and encourage mangrove restoration and protection. The techniques implemented included fattening and sustainable harvesting of crabs and the replanting of ten hectares of mangroves per household across five participating villages. Overview of context and outcomes: Climate change pressures on inland and coastal ecosystems are jeopardising the stability of the Indus Delta. Erratic rainfall and severe drought have reduced freshwater inflows while sea-level rise and the increased incidence of cyclones and storms have led to higher rates of erosion. These pressures have resulted in the reduced fertility of land in and around the delta and a high degree of waterlogged and hyper-saline soil. These challenges have not only reduced water availability for coastal communities, but also compound the climate change pressures they face as coastal residents. Mangrove forests in the area provide critical protection from coastal pressures but have unfortunately been significantly degraded and deforested. Prior to the start of the project, approximately 60% of the mangrove cover had been lost over the course of a few decades and half of mangrove species had disappeared.", "authors": [], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "literature", "label": "Add source", "url": "https://www.sciencedirect.com/science/article/pii/S1470160X25007678", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\n33-year remote-sensing review of Indus Delta mangrove rehabilitation — cover grew from \\~86,000 to \\~139,000 ha; the quantitative backbone for this case. (Proposed by Claude Opus 4.8 enrichment", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": "ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}, {"kind": "resource", "label": "Add source", "url": "https://news.mongabay.com/2024/02/pakistan-bucks-global-trend-with-30-year-mangrove-expansion/", "detail": "🔎 Adds [🟡corroborates]: 2024 feature on Pakistan's 30-yr mangrove expansion\nMongabay on Pakistan's 30-year mangrove expansion against the global trend — accessible independent verification including the community stewardship agreements. (Proposed by Claude Opus 4.8 enrichment pas", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": ""}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Wild Ingleborough: Multi-partnership, landscape-scale habitat restoration", "db": "HUB", "id": "1911", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1911", "description": "Organisations, charities and local communities have partnered to restore ancient woodland, peatland, hay meadows and facilitate low-intensity farming with objectives to improve biodiversity, increase carbon capture, and improve access for people. Nature-based intervention: The Wild Ingleborough project covers 1,200 hectares of land across the Ingleborough National Nature Reserve (1). Nature-based initiatives include blocking blanket bog drainage and planting new woodland areas to increase carbon sequestration, improve water quality and reduce downstream flooding. Farming strategies have been modified to improve ecosystem health, such as by reducing sheep numbers to facilitate habitat diversity. These interventions are shaped in consultation with local community and business partners. In addition, Wild Ingleborough encourages access to nature areas for refugees, people with disabilities and other groups through the ‘Experience Wild Ingleborough’ fund. Overview of context: Sheep farming is a longstanding tradition in the Dales. However, the post-Second World War surge in sheep numbers led to habitat degradation and fragmentation (2). Since its launch in 2021, the project seeks to balance traditional commons grazing rights with initiatives to promote nature recovery and tourism. &nbsp;", "authors": [], "refs": [{"url": "https://onlinelibrary.wiley.com/doi/10.1002/hyp.14453", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.wildingleborough.com/", "status": "BROKEN", "code": "0", "field": "literature"}, {"url": "https://www.wildingleborough.com/", "status": "BROKEN", "code": "0", "field": "resource"}, {"url": "https://www.wwf.org.uk/sites/default/files/2022-08/Wild%20Ingleborough%20Community%20Conversations%20.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://spotlight.leeds.ac.uk/wild-ingleborough/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://pureadmin.uhi.ac.uk/ws/portalfiles/portal/1587027/562.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.inaturalist.org/projects/a-year-in-the-life-of-ingleborough-2023?tab=about", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.inaturalist.org/projects/a-year-in-the-life-of-ingleborough-2022/journal", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.ouringleborough.com/", "status": "BROKEN", "code": "0", "field": "literature"}, {"url": "https://www.uboc.co.uk/portfolio/wild-ingleborough-project/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://leaf.leeds.ac.uk/projects/wild-ingleborough/", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.wildingleborough.com/", "detail": "SSL error: [SSL: CERTIFICATE_VERIFY_FAILED] certificate verify failed: Hostname mismatch, certificate is not valid for 'www.wilding", "extra": "", "via": "link check"}, {"kind": "link", "label": "Remove dead link", "url": "https://www.ouringleborough.com/", "detail": "DNS failure (domain does not resolve)", "extra": "", "via": "link check"}], "health": {"ok": 8, "broken": 3}, "base": {"peer": 1, "grey": 10}}, {"title": "Applying ecosystem-based disaster risk reduction through a ridge-to-reef approach", "db": "NbSI", "id": "398", "country": "Haiti", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=398", "description": "An ecosystem-based disaster risk reduction approach was implemented in Port Salut using a ridge-to-reef approach that included inland and coastal revegetation and improving the sustainability of local fisheries. Nature-based Intervention: In an effort to bolster community and ecosystem resilience, the Côte Sud Initiative (CSI) together with the UN Environment Programme worked together to implement an ecosystem-based disaster risk reduction (Eco-DRR) initiative using a ridge-to-reef approach. The ridge-to-reef approach constitutes a portfolio of interventions that cover the entire landscape from hills to sea in an effort to boost overall ecosystem resilience. More specifically, the project implemented three specific actions. First, re-vegetation and more sustainable vetiver farming was introduced and expanded to reduce the risk of upland erosion and inland flooding. Second, coastal areas underwent significant revegetation in order to strengthen the area's biological buffer against storm surges and flooding. In practical support of these first two interventions, a tree nursery was established producing 137,000 seedlings of coastal and riparian species and fruit trees. As a result, 141 hectares were reforested with 54,065 fruit and forestry trees planted on and around riverbanks to reduce soil and riverbank erosion and 36,300 mangroves and sea grape trees planted on the shoreline and river mouths to mitigate storm surge and flood risk. Lastly, more sustainable fisheries management has been implemented including the reparation of fishing boats to allow fishers to fish in deeper waters and, as a result, reduce pressure on near-shore ecosystems. Overview of context and outcomes: The Port Salut municipality in Haiti is becoming increasingly vulnerable to more frequent and extreme coastal risks including sea level rise and storm surges. Port Salut has also been designated as one of Haiti's first marine protected areas. These actions have all been supported by larger-scale capacity building and advocacy efforts across the country promoting Eco-DRR and marine protected area management.", "authors": [], "refs": [{"url": "https://postconflict.unep.ch/publications/Haiti/Haiti_Eco_DRR_case_study_2016.pdf", "status": "BROKEN", "code": "0", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://postconflict.unep.ch/publications/Haiti/Haiti_Eco_DRR_case_study_2016.pdf", "detail": "DNS failure (domain does not resolve)", "extra": "", "via": "link check"}], "health": {"broken": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Assisted natural forest regeneration on degraded lands", "db": "NbSI", "id": "1161", "country": "Albania", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1161", "description": "This program run by the Ministry of Agriculture and Food focuses on the assisted regeneration of degraded landscapes in mainly poor regions of the country to increase biomass and combat erosion. Nature-based Intervention: In order to counteract the land degradation and erosion harming the area, a multifaceted regeneration approach was implemented. The intervention included adding protections from grazing to promote natural regeneration on the landscape. This was combined with supplemental planting to enrich species diversity and to more swiftly stabilize the soil in highly eroded areas. Lastly, active silvicultural management measures were implemented to enhance biomass density in the restored area. Overview of context and outcomes: Land degradation is a major issue in Albania due to overgrazing and the clearing of woodlands for firewood. These maintained pressures had prevented the natural regeneration of the landscape which had in turn led to an increase in erosion. Many of these barren and unproductive lands were simply left behind by communities.", "authors": [], "refs": [{"url": "https://www.biocarbonfund.org/node/52", "status": "BROKEN", "code": "0", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.biocarbonfund.org/node/52", "detail": "DNS failure (domain does not resolve)", "extra": "", "via": "link check"}], "health": {"broken": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Bunloit Estate Rewilding Project (Highlands Rewilding)", "db": "HUB", "id": "1937", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1937", "description": "Through the restoration of woodlands and peatlands and the managed grazing of grasslands, Highlands Rewilding aims to increase carbon sequestration and biodiversity while delivering local community benefits at Bunloit. Nature-based intervention: Since 2020, Highlands Rewilding has managed the 511 hectare Bunloit Estate to achieve four goals through rewilding efforts: increasing carbon sequestration, enhancing biodiversity, community prosperity, and developing sustainable income streams (1). Rewilding efforts are conducted across peatland, woodland, and grassland habitat types. Peatland restoration is undertaken by removing non-native conifer plantations and controlling drainage to reduce water loss (2). Woodland restoration is facilitated through the supplementary planting of mixed-species native trees of local stock and natural regeneration accompanied with the control of deer populations. Low-intensity grazing by Highland cattle is used to maintain species-rich grasslands. The management of the project involves a consultative process with scientists, local community members and environmental experts. Overview of context: The Bunloit Estate has been inhabited since the 1500s, with historical land uses including crofts, game shooting, plantations, and grazing. The landscape is a mosaic of broadleaf woodland, conifer plantations, peatlands, heathland, scrub and grassland. A 2021 baseline analysis of natural capital found that the site was a net emitter of carbon (from degraded peat soils), averaging a net loss of 240 tonnes of carbon dioxide equivalent (tCO2e) per year (1). The site hosts threatened fungi and bird species, rare dragonfly species, and internationally significant lichens. The project seeks to support Scottish Government goals to achieve net-zero carbon targets by 2045 and reverse nature loss by 2030 (3). The estate is located within the 200,000 hectare ‘Affric Highlands’ initiative for landscape-scale restoration.", "authors": ["Ghazoul", "Schweizer", "Morecroft", "Duffield", "Harley", "Pearce-Higgins", "Stevens", "Watts"], "refs": [{"url": "https://ecosulis.co.uk/wp-content/uploads/Bunloit-Case-Study.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.landcommission.gov.scot/downloads/5dd7d6fd9128e_Investigation-Issues-Large-Scale-and-Concentrated-Landownership-20190320.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.highlandsrewilding.co.uk/blog/the-scotsman-how-a-mass-ownership-company-can-help-communities-prosper-boost-nature-recovery-and-tackle-climate-change", "status": "BROKEN", "code": "404", "field": "literature"}, {"url": "https://www.highlandsrewilding.co.uk/blog/highlands-rewilding-funding-from-the-facility-for-investment-ready-nature-in-scotland-firns", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.highlandsrewilding.co.uk/bunloit-estate", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.highlandsrewilding.co.uk/blog/the-scotsman-how-a-mass-ownership-company-can-help-communities-prosper-boost-nature-recovery-and-tackle-climate-change", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 4, "broken": 1}, "base": {"peer": 0, "grey": 5}}, {"title": "Cairngorms Connect – large-scale forest restoration", "db": "HUB + NbSI", "id": "762", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=762", "description": "An ambitious project with a 200-year vision to manage 600 square kilometers of the Cairngorms National Park in Scotland for biodiversity whilst providing other benefits such as carbon storage and livelihoods for local people, it is the largest habitat restoration project in the UK. Nature-based Intervention: This project is a partnership of neighboring land managers, with guidance from the Cambridge Conservation Initiative, and has an an unparalleled time frame including goals for 2065 and 2216. As the biggest habitat restoration project in Britain, it spans 600 square kilometers of wild land, 9,800 ha of native woodland, 10,000 ha of rich peat bog, and 23,000 ha of montane habitat, with 5000 recorded species. Management involves a diverse suite of actions across the landscape including restoration of watercourses and floodplains by removing drainage modifications and promoting natural processes, enhancing and expanding native woodlands by managing grazers, removing non-native species, and enrichment planting. Pine plantations are also being managed to become better habitats for wildlife by thinning and species diversification. A major source of carbon drawdown will come from restoration of bog woodlands by creating bog pools, and restoring blanket peat bogs by re-profiling peat bog channels and using boulders to slow water flow. Overview of context and outcomes: The Cairngorms are a mountain range in the eastern Highlands of Scotland. They hold some of the last historic woodland fragments within the Scotland and represent a key opportunity for landscape restoration. This project is an inspiring example of implementing nature-based solutions at the landscape scale and with long-term planning. This will help enable benefits for nature and people to be maintained and enhanced into the future, will improve the resilience of habitats, species and ecosystem services to climate change, and will enable interactions between habitats to be nurtured.", "authors": [], "refs": [{"url": "http://cairngormsconnect.org.uk/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "literature", "label": "Add source", "url": "https://conbio.onlinelibrary.wiley.com/doi/10.1111/csp2.70214", "detail": "🔎 Adds [🚫unreachable]: source not auto-fetchable (paywall/block/dead) — check manually\nA framework for monitoring ecosystem restoration at landscape scale' — grounds M\\&E in peer-reviewed methodology.", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Interesting paper with good information, but it uses the case somewhat tangentially ð¤ QA (Claude Opus 4.8): URL blocks automated checks (403) but is a reputable domain — verify it opens in your browser"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Coastal mangrove forest restoration for carbon sequestration", "db": "NbSI", "id": "1258", "country": "Colombia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1258", "description": "The Vida Manglar projects works with local communities to restore and protect 11,000 hectares of mangrove forest along the Caribbean coast and takes into account the carbon sequestered both above and below the water. Nature-based Intervention: This project works alongside local 14 manglero communities to study and protect 11,000 hectares of mangrove forest on Colombia's Caribbean coast. The project uses an innovative carbon financing mechanism and was reportedly the world's first project to simultaneously calculate the carbon credits generated by both above and below water sequestration. The carbon revenues are then reinvested in the community in order to support sustainable livelihood developments and create alternative sources of income. Overview of context and outcomes: Mangrove forests are highly important for local communities, but farming, aquaculture, wood harvesting and urban development have all caused a decrease in mangrove forest cover. In Colombia specifically, hotel development and cattle ranching have been the largest factors driving the draining of mangrove forests. Th government had declared the Cispata’ Bay a marine protected area in 2006, but mangrove deforestation had continued in the area. Apple supported scientists in developing a simple, but effective methodology for calculating the amount of carbon stored in the soil caught by mangrove root systems.", "authors": [], "refs": [{"url": "https://www.conservation.org/docs/default-source/publication-pdfs/cispata-bay-mangroves-2022-impact-report.pdf?sfvrsn=2b5b6f4d_3", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://www.wbcsd.org/download/file/16129", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.conservation.org/docs/default-source/publication-pdfs/cispata-bay-mangroves-2022-impact-report.pdf?sfvrsn=2b5b6f4d_3", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 1, "ok": 1}, "base": {"peer": 0, "grey": 2}}, {"title": "Coastal mangrove restoration using a community ecosystem-based adaptation approach", "db": "NbSI", "id": "540", "country": "Bangladesh", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=540", "description": "Coastal mangrove restoration is practiced as a community-based climate change adaptation initiative in Bangladesh. Nature-based Intervention: The Community Based Adaptation to Climate Change through Coastal Afforestation (CBACC-CF) program is the first Bangladesh National Adaptation Programme of Action (NAPA) project under the GEF-UNDP portfolio, implemented by the Government of Bangladesh in four coastal districts. The initiative primarily consists of reforesting the coastline with various species of mangroves, interspersed with timber and fruit trees, following the ‘Forest, Fish, Fruit’ (FFF) model, which also integrates fish nursery ponds between the trees in the area. This was done with the involvement and employment of community members in the nursery bed preparation, seedling raising, planting and maintenance. 9,650 hectares of new mangrove plantations made up of 10 key mangrove species were established to reduce the impact of cyclones, flooding, coastal erosion, saline intrusion and sea-level rise, while the project also supported innovative land management and livelihood diversification strategies for local stakeholders. Furthermore, mound and dyke plantations were also reclaimed for innovative use of unused coastal lands to accommodate non-mangrove species in salinity-dominated coastal belts by involving local communities. Overview of context and outcomes: Bangladesh is located on the deltaic plain of the Ganges-Brahmaputra-Meghna (GBM) river networks which is low lying and places the country at high risk of climate variability. As the risks for tropical storms and storm surge increase it creates additional issues such as coastal inundation, high salinity contents in soils and surface waters, and drainage limitations. This in turn puts pressure on local food systems with 50% of coastal arable land being impacted in some form by salinity.", "authors": ["Ahammad", "Nandy", "Husnain", "Alam", "Islam"], "refs": [{"url": "https://doi.org/10.1007/s11852-013-0284-x", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.weadapt.org/placemarks/maps/view/138", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://unfccc.int/climate-action/momentum-for-change/activity-database/community-based-adaptation-to-climate-change-through-coastal-afforestation-cbacc-cf-project-in-bangladesh", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.weadapt.org/sites/weadapt.org/files/legacy-new/placemarks/files/53022a4989f5fbangladesh-coastal-afforestation-november-2011.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.weadapt.org/placemarks/maps/view/138", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 3, "broken": 1}, "base": {"peer": 1, "grey": 3}}, {"title": "Community-based dryland restoration", "db": "NbSI", "id": "728", "country": "Mali", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=728", "description": "Farmer-managed natural regeneration (FMNR) and improved forest management have provided adaptation benefits to an area particularly vulnerable to rising temperatures and other climate-related risks. Nature-based Intervention: Tree Aid, an international NGO, supported local communities in carrying out tree planting and restorative care and trained community members in agroforestry and farmer-managed natural regeneration (FMNR), a method that promotes the regrowth of previously cut or burnt down trees. Trees are pruned to stimulate growth as well as provide leaf litter to nourish soils. The restored and better managed forests are now yielding fruits, nuts, oils, butters, traditional medicines, and nutritious foods to both improve food security of local communities as well as diversify incomes. Overview of context and outcomes: The population surrounding the Duwa and Sutebwo forests of the Segou region is dependent on rainfed agriculture in an area south of the Sahara desert that faces increasingly frequent and severe climate change hazards including rising temperatures, droughts, and floods. These impacts lead to crop losses and high food prices. Forest degradation, agricultural expansion, prolonged drought, and biodiversity loss from poaching have already weakened the ecosystem of the surrounding landscape. Between 2000 and 2015, the two forests had lost a total of 3,300 hectares of forest replaced by open savannah woodland. Most of this savannah woodland has been further degraded compromising the quality of agricultural land.", "authors": [], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://regreeningafrica.org/where-we-work/mali/", "detail": "🔎 Adds [🟡corroborates]: Regreening Africa Mali FMNR context, scale figures (check same project)\nRegreening Africa's Mali country page — current FMNR scaling work and evidence in the same dryland systems. (Proposed by Claude Opus 4.8 enrichment pass, 2026-06-11.)", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Interesting and good resource, but it is not clear how much they spatially correspond, there is some overlap but I don't know nearly enough Malian geography to say much more"}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Community-based mangrove restoration", "db": "NbSI", "id": "475", "country": "India", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=475", "description": "Community-based mangrove restoration across several villages contributed to disaster risk reduction and protected key habitats for aquatic and terrestrial species. Nature-based Intervention: Facilitated by the Gujarat State Forest Department and Gujarat Ecology Commission, community-based mangrove restoration was adopted across several villages along the Gulf of Kutch region in Gujarat. The project promoted a multi-stakeholder model involving private and public sector partners and placed a particular emphasis on community-based implementation. Overview of context and outcomes: Gujarat state boasts the largest mangrove habitat on the western coast of India. However, it has been severely diminished and degraded by human and natural causes. A weakened mangrove ecosystem not only threatens biodiversity but reduces natural protection against cyclones and storm surges, whose impacts are expected to worsen as a result of climate change.", "authors": [], "refs": [{"url": "https://openknowledge.worldbank.org/bitstream/handle/10986/23775/Managing0coast0oves0and0coral0reefs.pdf?sequence=1&isAllowed=y", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "http://dx.doi.org/10.1007/978-4-431-54255-1_16", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.amrita.edu/publication/conservation-restoration-and-management-mangrove-wetlands-against-risks-climate-change-0", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.amrita.edu/publication/conservation-restoration-and-management-mangrove-wetlands-against-risks-climate-change-0", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 2, "broken": 1}, "base": {"peer": 1, "grey": 2}}, {"title": "Ecosystem-based erosion control in the South Caucasus region", "db": "NbSI", "id": "1189", "country": "Azerbaijan", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1189", "description": "The German Agency for International Cooperation (GIZ) initiated a program in collaboration with the Azerbaijan Ministry of Agriculture to combat the effects of pasture degradation on hillsides through improved management practices. Nature-based Intervention: This project blends the implementation of grey measures to tackle erosion(such as terraces and fences) with green measures (such as afforestation and orchard management). Combined they help stabilize the hillside and also provide alternative means for income generation. the project managers also helped to support alternative livelihoods by creating tree nurseries and supporting beekeeping in the area. Local experts were brought in to train the villagers on these practices. The steepest hills were stabilized with terraces and fruit tree orchards. In the eroded river beds they built several several check-dams in order to slow water flow and erosion rates. The eroded gullies were fenced for safety and then replanted with trees to stabilize the soil in the area. They also transitioned grazing pastures which had experienced heavy erosion into hay meadows. Overview of context and outcomes: In the mountain areas of Azerbaijan there are many heavily degraded pastures. This is mainly due to high intensity livestock grazing and poor management practices which lead to soil erosion and vegetation loss. These degraded pasture landscapes then lead to an elevated risk of landslides as well as decreased biodiversity and productivity. Predicted temperature increases and elevated risk of extreme weather events are likely to further exacerbate this degradation.", "authors": [], "refs": [{"url": "https://biodivers-southcaucasus.org/countries/azerbaijan", "status": "BROKEN", "code": "0", "field": "resource"}, {"url": "https://panorama.solutions/en/solution/ecosystem-based-erosion-control-azerbaijan", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://biodivers-southcaucasus.org/countries/azerbaijan", "detail": "connection timed out", "extra": "", "via": "link check"}], "health": {"broken": 1, "ok": 1}, "base": {"peer": 0, "grey": 2}}, {"title": "Farmer-managed and community-based dryland and tree restoration", "db": "NbSI", "id": "658", "country": "Ghana", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=658", "description": "Farmer Managed Natural Regeneration (FMNR) in dryland area of Eastern Ghana restores hundreds of hectares of degraded land, countering the challenges of soil erosion and water retention. Nature-based Intervention: To increase soil fertility and counter land and resource degradation, communities in Talensi are engaging in Farmer Managed Natural Regeneration (FMNR), a practice that restores and generates trees from formerly cut or burned down stumps. This practice allows for faster regrowth than sapling planting and the resulting leaf litter helps improve soil quality. Farmers are using FMNR on their agricultural land and pastoral fields as well as in shared community managed forests. In addition to this main intervention, farmers have also adopted bulk composting, field mulching, and ox ploughing to aid in soil quality regeneration. Fruit tree and honey production have also been embraced as a way of diversifying income sources. The project is committed to farmer management of implemented techniques and community engagement in the collective management of the landscape through signed agreements, the establishment of community by-laws, and volunteer fire brigades to manage bushfires. Overview of context and outcomes: This dryland area of Eastern Ghana faces increasingly unpredictable rainfall patterns, land degradation, forest cover and biodiversity loss caused by climate change, bushfires, and over-exploitation of the landscape. These challenges contribute to reduced soil quality and poor water retention in an otherwise arable landscape.", "authors": [], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://fmnrhub.com.au/wp-content/uploads/2019/11/Ghana-2018-Talensi-FMNR-Evaluation-Brief.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://fmnrhub.com.au/wp-content/uploads/2019/11/Ghana-2018-Talensi-FMNR-Evaluation-Brief.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 1, "broken": 1}, "base": {"peer": 0, "grey": 2}}, {"title": "Fire Risk Reduction in the San Carlos Apache Reservation", "db": "NbSI", "id": "1158", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1158", "description": "The U.S. Geological Survey (USGS) partnered with the San Carlos Apache Tribe in order to implement improved fire mitigation strategies combining indigenous management and satellite imagery. Nature-based Intervention: Satellite imagery was implemented alongside indigenous fire management techniques to compliment the Tribe's implementation of techniques to reduce fire intensity. The satellite images were able to highlight the best places within the reservation for the construction of firebreaks and the ideal locations on rivers to construct water detention installations. These implementations work together with the tribe's forestry interventions, such as tree thinning to return the tree densities to their pre-colonial baselines. Overview of context and outcomes: The San Carlos Apache Reservation lies in an area which is extremely prone to fires due to the combination of arid landscapes and dense woodlands. Historic fire management practices from the US government have allowed the buildup of fuel loads within the forest and climate change has lead to an increase of the fire risk to the area. Many of Arizona's largest fires on record have happened in or near the San Carlos Apache Reservation, including the 2011 Wallow Fire, which was the states most destructive. However, the San Carlos Apache Reservation faced less damage than the surrounding forest service managed lands due to the tribe's fire reduction strategies.", "authors": [], "refs": [{"url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Forage and land conservation through Ngitili silvo-pastoral system", "db": "NbSI", "id": "584", "country": "Tanzania, United Republic of", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=584", "description": "Use of Ngitili, a traditional silvo-pastoral system that maintains standing vegetation for use during peak dry season, reduces feed stock shortages, combats parasite infestations affecting humans and cattle, and contributes to the restoration of degraded lands and soil. Nature-based Intervention: Ngitili is a silvo-pastoral system that requires maintaining, and often closing off from livestock, centered around an area of standing vegetation at the end of the rainy season. Thus, during the peak of the dry season, when feed stocks are low, these areas are opened back up for use when necessary. Five villages currently use 2.2 out of 12 hectares for Ngitili, and participated in interviews and studies about the benefits of the practice. Overview of context and outcomes: Ngitili is a farmer-led and farmer-managed vegetation restoration practice that has evolved after years of traditional grazing management in Tanzania. Despite Ngitili being a small proportion of total land, the cumulative effect of these restored standing vegetation patches was found to have sustained the otherwise degrading landscapes. The practice has been reported by farmers themselves to restore degraded lands, reduce the risk of feed stock shortages, and improve soil quality and land productivity.", "authors": ["Osei", "Kimaro", "Peak", "Gillespie", "Rees", "Safari", "Singu", "Masanyiwa"], "refs": [{"url": "https://doi.org/10.1016/j.jenvman.2019.109498", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "http://www.asb.cgiar.org/climate-smart-landscapes/chapters/chapter5.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "http://www.asb.cgiar.org/climate-smart-landscapes/chapters/chapter5.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 1, "broken": 1}, "base": {"peer": 1, "grey": 1}}, {"title": "Glacial mountain watershed management", "db": "NbSI", "id": "731", "country": "Peru", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=731", "description": "Ecosystem restoration and protection combined with communal grazing and water use plans aim to reduce vulnerability to the effects of glacial retreat caused by climate change. Nature-based Intervention: Proyecto Glaciares in Peru promotes a community-led initiative advised by scientists and public and private sector actors to develop a sustainable watershed management plan in relation to tropical glacier water systems. The initiative manages 200 new lakes, protects and restores wetland by replanting native species, fencing tributaries to restore vegetation, and has established a communal grazing plan to prevent overgrazing. Farmers in the area have also been encouraged to make more sustainable use of water resources. Overview of context and outcomes: The highland glacial mountain ecosystems in Peru are complex constellations of glacier-fed lagoons, lakes, rivers, and grassland. As the steward of the majority of the world’s tropical glaciers, Peru will be disproportionately affected by the climate change hazards facing glacier stability. Due to large-scale glacial retreat, lagoons become unstable and increase the risk of landslides and flash floods. The disruption of highland glacial ecosystems further risks the well-being of flora, fauna, humans, and entire ecosystems dependent on them. This project also combined the implementation of gray and green infrastructure, with hydropower dams being integrated into the project to generate clean energy for the local community.", "authors": ["Holland", "Demerritt", "Colonia", "Torres", "Haeberli", "Schauwecker", "Braendle", "Giraldez"], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://careclimatechange.org/wp-content/uploads/2020/12/Caring-for-our-Mountains_English-V2.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.proyectoglaciares.pe/wp-content/uploads/2018/06/Brief-Modelling-future-lakes-in-glacier-beds.pdf", "status": "BROKEN", "code": "0", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.proyectoglaciares.pe/wp-content/uploads/2018/06/Brief-Modelling-future-lakes-in-glacier-beds.pdf", "detail": "DNS failure (domain does not resolve)", "extra": "", "via": "link check"}], "health": {"ok": 2, "broken": 1}, "base": {"peer": 0, "grey": 3}}, {"title": "Greener Grangetown SuDS project", "db": "HUB", "id": "2011", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=2011", "description": "Working with local communities to retrofit a sustainable drainage system into existing urban streets, creating over 100 raingardens while leaving space for parking and other needs. Nature-based intervention: Sustainable Drainage Systems (SuDS) projects mimic natural drainage to reduce the volume and flow rates of run-off in built-up areas (1). In Wales, Dŵr Cymru (Welsh Water) is implementing SuDS through their RainScape programme, creating features such as rainwater retention basins, planters, swales (long shallow landscaped channels), porous paving, filter strips, and geocellular storage (3).The SuDS project at Grangetown was initiated to decrease the volume of rainwater entering the overloaded sewage system and provide attractive green space for residents and commuters (2). To achieve this, over 100 raingardens featuring a diverse mix of native trees, shrubs and grasses were created on the streets of Grangetown to catch and filter rainwater. Pipes at the base of the raingardens collect water during heavy storms and channel the cleaned water into the River Taff. Local communities were involved from the start, to retrofit the SuDS into existing streets while minimising adverse impacts such as loss of parking spaces, and delivering extra benefits including a community garden, bike lanes, and improved safety for pedestrians and motorists. The project was the first in the UK to use these techniques at this scale, covering an area of 12 hectares that included 500 properties in 12 streets with approximately 1,150 residents (2) (4). Overview of context: In common with most of the UK, the area faces problems caused by an ageing combined sewer system that could not cope with heavy rainfall, leading to flood risk, water pollution and sewer discharges. Together with habitat degradation and biodiversity loss, these problems are exacerbated by increased urbanisation, population growth, and climate change (1). Prior to the implementation of the SuDS project, rainwater run-off that entered the sewage system was pumped 8 miles for treatment in the Vale of Glamorgan before being discharged into the sea (2), and so the installation of SuDS saves considerable energy and water treatment costs. The project, which was initiated in November 2016 and completed in 2018, has been highlighted as one of the best examples of Nature-based Solutions in the UK by the UK Inter-Agency Climate Change Group (IACCG) (5).", "authors": [], "refs": [{"url": "https://cdn.naturalresources.wales/media/687377/greener-grangetown-2018.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://jncc.gov.uk/our-work/greener-grangetown/", "status": "BROKEN", "code": "404", "field": "literature"}, {"url": "https://corporate.dwrcymru.com/en/community/environment/our-projects/rainscape", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://greenergrangetown.wordpress.com/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://greenergrangetown.wordpress.com/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://greenergrangetown.wordpress.com/about/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://openresearch.ocadu.ca/id/eprint/3707/1/Wang_UrbanConnectivity_2020.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.susdrain.org/case-studies/pdfs/greener_grangetown_case_study_lightv2.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://uk.thegreencities.eu/best_practices/greener-grangetown/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://greenergrangetown.wordpress.com/designs/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cardiff.ac.uk/news/view/221759-greener-grangetown-research-study-underway", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://link.springer.com/article/10.1007/s40899-022-00723-z#citeas", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://greenergrangetown.wordpress.com/frequently-asked-questions-cwestiynau-cyffredin/", "status": "LIVE", "code": "200", "field": "literature"}], "actions": [{"kind": "link", "label": "Replace with Wayback archive", "url": "https://jncc.gov.uk/our-work/greener-grangetown/", "detail": "HTTP 404", "extra": "https://web.archive.org/web/20240719061029/https://jncc.gov.uk/our-work/greener-grangetown/", "via": "link check"}], "health": {"ok": 12, "broken": 1}, "base": {"peer": 2, "grey": 11}}, {"title": "Hogacre Common Community Eco Park", "db": "HUB", "id": "1931", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1931", "description": "Established on a former sports ground, Hogacre Common Eco Park is now a thriving community hub focused on improving biodiversity, climate action, local food production, education and access to nature. Nature-based intervention: Starting as a sports ground with tennis courts and a pavilion, the site now supports a variety of different habitats and activities, delivering multiple benefits for people and nature from a small plot of urban land. Projects to improve biodiversity on the site include the conversion of tennis courts into an edible food garden in 2011, the restoration of a wildflower meadow, bee colonies, and planting a lowland woodland, hedgerow and orchard (1). The food garden also serves as a community space to learn sustainable food-growing techniques (2). Following a sustainability report in 2021 (3), each year the project adopts one theme (e.g. water, biodiversity) and implements initiatives to address issues. The water topic in 2021 encouraged the collection of more rainwater to water trees and the food garden. In 2022, the biodiversity theme led to the implementation of a project to monitor biodiversity of plants, invertebrates and vertebrates, soil health, and carbon sequestration in partnership with the University of Oxford. Overview of context and outcomes: Once used as a sports field for Corpus Christi College, the 14 acre site was leased to a community group in 2010 for a jar of honey each year. This led to the establishment of Hogacre Common Eco Park Community Interest Company, to develop an Eco Park on the site. There is a strong focus on community participation and education, including through working with local schools and disadvantaged groups.", "authors": [], "refs": [{"url": "https://www.hogacrecommon.org.uk/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.hogacrecommon.org.uk/", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://oxgrow.org/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.hogacrecommon.org.uk/wp-content/uploads/2022/11/SustainabilityReportPart12-1.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://consult.environment-agency.gov.uk/thames/ofas-updates/user_uploads/es-app-b-1-environmental-scoping-update.pdf", "status": "BROKEN", "code": "404", "field": "literature"}], "actions": [{"kind": "link", "label": "Replace with Wayback archive", "url": "https://consult.environment-agency.gov.uk/thames/ofas-updates/user_uploads/es-app-b-1-environmental-scoping-update.pdf", "detail": "HTTP 404", "extra": "https://web.archive.org/web/20240524165605/https://consult.environment-agency.gov.uk/thames/ofas-updates/user_uploads/es-app-b-1-environmental-scoping-update.pdf", "via": "link check"}], "health": {"ok": 4, "broken": 1}, "base": {"peer": 0, "grey": 5}}, {"title": "Indigenous traditional use of fire for conservation and adaptation", "db": "NbSI", "id": "562", "country": "Venezuela, Bolivarian Republic of", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=562", "description": "Researchers empirically tested the potential for traditional indigenous fire management methods to aid in conservation and adaptation of the Canaima National Park. The Pemón people have used a method of fire management that creates a mosaic of patches of land at various stages of re-growth that serve as fire breaks for other areas. Nature-based Intervention: Researchers assessed the potential for a modified yet maintained version of the traditional fire management scheme in the Canaima National Park. Researchers simulated traditional Pemón fire management methods by burning a series of plots of savanna at different intervals over a seven-year period to observe the firebreak and conservation potential of this practice. The researchers indeed found that the use of the traditional strategy of fire management could assist in the conservation of local forests, as burning in savannas near forest borders could help avoid devastating wildfires. Overview of context and outcomes: The Pemón Amerindians are the traditional inhabitants of the territory within the Canaima National Park. They have historically used fire to clear forest for cultivation, cleaning and removal of vegetation, visual communication, keeping dangerous animals away, hunting, and fishing. Research in other tropical savannas has shown that fire exclusion can lead to the proliferation of forests. However, without fire these forests become prone to even more devastating fires, thus evoking the merit of fire management practices. Over generations, the Pemón people have developed a complex system of burning in a mosaic pattern that maintains different patches of land in different states of re-growth. The savanna patches burnt more recently serve as firebreaks for other areas. However, the more concentrated settlement patterns of the Pemón in recent decades, combined with an increased forest vulnerability to climate change, has disrupted this method of fire management leading to the over-use of fire. Ultimately, researchers found that linking traditional and scientific knowledge was a credible way forward for the formulation of effective fire management.", "authors": [], "refs": [{"url": "https://doi.org/10.1007/s10745-010-9344-0", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://www.unesco.org/en/articles/fighting-fire-fire", "detail": "🔎 Adds [🟡corroborates]: UNESCO story on indigenous fire management\nUNESCO on Venezuela's intercultural fire-management model — the 2015 lifting of the burning ban after the 11-year study, integrating Pemón knowledge with firefighting practice. (Proposed by Claude Opus 4.8 enrichm", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "Credible and good overall idea, but liimited specific info to the case"}], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Lamb Drove SuDS", "db": "HUB", "id": "1389", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1389", "description": "The sustainable drainage system (SuDS) in Lamb Drove, Cambridge is an award-winning project which has successfully reduced flooding risk. Nature-based intervention: Lamb Drove, owned by the Cambridge Housing Society, is a residential development comprising 35 affordable houses. In January 2004, it was chosen to become a showcase for innovative water management techniques known as SuDS (sustainable drainage systems) as part of a broader European-funded initiative encompassing 40 projects across Germany, Norway, Sweden, and the UK. Over the course of 2 years, designers and engineers collaborated to plan and retrofit an integrated drainage system, with the primary goal of reducing flooding risk. This system comprises a management train of components arranged in series, which incrementally reduces pollution, flow rates, and the volume of the water passing through. A combination of measures were implemented including the use of water butts, permeable paving, green roofs, and grass swales, among others. To complete the system, detention basins and retention ponds were incorporated to store surplus water, ensuring the ability to handle a 1 in 100-year flood with an extra 20% allowance for potential climate change. These strategies work together to closely emulate natural drainage systems, whilst also enhancing the site's value by creating biodiversity-rich and recreational areas. Cambridge County Council obtained funding to closely monitor the system for three years after its implementation (2008-2011). This monitoring aimed to showcase the long-term impact of SuDS on water quality and quantity leaving the site, as well as its environmental and socioeconomic outcomes. Overview of context: The driving force behind the initiative is the growing pressure for more housing in the UK. Alongside this, there is a call for the implementation of more sustainable drainage systems which can cope with the increased rainfall and flooding predicted under climate change. Cambridge holds particular significance for several reasons. Firstly, it has been identified as a key area for growth under the government's housing strategy and promises were made to build 50,000 new houses in the area by 2016. Furthermore, being a low-lying county, Cambridge faces significant threats from flooding by rivers and urban watercourses. Given these factors, it is not surprising that Lamb Drove was chosen as a model for SuDS. The project received a commendation award at the Royal Town Planning Institute awards in 2006, and has been cited in the government’s planning policy statement. This project has also been useful from an educational perspective, featuring as a common case study in schools around the UK.", "authors": [], "refs": [{"url": "https://www.susdrain.org/case-studies/case_studies/lamb_drove_residential_suds_scheme_cambourne.html", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.susdrain.org/case-studies/case_studies/lamb_drove_residential_suds_scheme_cambourne.html", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://www.paving.org.uk/permeable-paving-and-suds-monitoring-project/", "detail": "🔎 Adds [🟢new]: Interpave 13-yr cost/performance monitoring — SuDS cost less\nThird-party validation of the 10% cost-saving claim cited in the case.", "extra": "", "via": "web search", "flag": "Needs discussion", "by": "Joe", "fnote": "not sure about it as a resource, seems credible if a bit commercial, limited detail on the case but some proof of concept to a certain audience"}], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Locally-managed Marine Protected Areas and artificial coral reefs in Bali", "db": "NbSI", "id": "175", "country": "Indonesia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=175", "description": "The Pemuteran Bay Coral Protection Foundation aims to address the collapse of local fish stocks by implementing artificial coral reefs and creating a locally-managed Marine Protected Area (MPA) to restore marine biodiversity. Nature-based Intervention: In the face of devastating fish stock collapse and loss of coral reefs due in part to destructive fishing techniques such as reef bombing, the village of Pemuteran on the Indonesian island of Bali has engaged in a combination of approaches which have reportedly resulted in positive ecological and socioeconomic outcomes. Firstly, the foundation has overseen the installation of 70 'Biorock' technology artificial reefs, consisting of steel-frame structures through which a low voltage electric current is passed, attracting calcium carbonate buildup and becoming an effective substrate for the establishment and rapid growth of coral. Secondly, the foundation, working closely with the national enforcement agencies to ensure compliance, has supported the reintroduction and enforcement of locally-managed Marine Protected Areas (MPAs) which strictly forbid unsustainable fishing practices. Lastly, other activities organized by the foundation have contributed to the regeneration of the coral reefs and fish stocks, such as the planting of vetiver grass on shorelines to reduce erosion and excessive run-off, as well as waste and sewage management. According to project reports, the 70 structures span two hectares, reportedly making this the largest coral reef nursery restoration project globally. Overview of context and outcomes: Biorock corals have been shown to grow three to five times more quickly than natural coral, and are also more resilient to the effects of temperature fluctuations, with coral survival rates between 16-50 times higher.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1370356507.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "resource", "label": "Add source", "url": "https://sdgs.un.org/partnerships/community-based-coral-reef-restoration-pemuteran-buleleng-bali", "detail": "🔎 Adds [🟡corroborates]: UN DESA good-practice profile of Pemuteran coral restoration\nUN registry entry for the Pemuteran community-based coral restoration — independent documentation of the world's largest Biorock installation (300 m across 2 ha) and its bottom-up governance. (Pr", "extra": "", "via": "web search", "flag": "", "by": "", "fnote": ""}], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Nile River Basin Transboundary Wetlands Conservation", "db": "NbSI", "id": "284", "country": "Uganda", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=284", "description": "The initiative aims to strengthen the technical and institutional capabilities needed to sustainably manage the Nile Basin transboundary wetlands through participatory assessment and integrated planning. Nature-based Intervention: Initiated in 2015, the Nile River Basin Transboundary Wetlands Conservation (NRBTWC) project, funded in part by the GIZ, is one of many NBI projects being implemented along the Nile River. The Nile River Basin is experiencing the compounded impacts of climate change, particularly erratic rainfall, floods, drought and reduced water supply from glacial retreat, combined with other human drivers such as resource extraction and land degradation from unsustainable land uses. Moreover, due to the transboundary nature of the river basin, the difficulties related to governance across borders adds a further challenge. The NRBTWC project aims to use a landscape and nature-based approach for catchment-based water resources management, involving participatory wetlands assessment, wetlands zoning and restoration, a transboundary stakeholders’ forum, modelling and climate vulnerability appraisals. The project has three components. The first is to build a knowledge base on transboundary wetlands for informed sectoral planning and mainstreaming. The second is to design transboundary integrated wetland plans for strategic interventions and stakeholders involvement. The third is to engage in capacity building and networking for empowered personnel and multiple stakeholders collaboration in transboundary wetlands conservation. Together, the three building blocks of this project contribute to restoring wetlands for biodiversity conservation, enhanced climate mitigation capacity, and increased resilience to climate impacts, while improving the livelihoods of local people and encouraging stakeholder engagement and capacity building. Overview of context and outcomes: The Nile Basin Initiative (NBI), an intergovernmental partnership of 10 Nile Basin countries, namely Burundi, DR Congo, Egypt, Ethiopia, Kenya, Rwanda, South Sudan, Sudan, Tanzania and Uganda, has been active for more than 20 years, with the goal facilitating the sustainable and equitable use of the Nile Basin water resources.", "authors": [], "refs": [{"url": "https://www.weadapt.org/sites/weadapt.org/files/eba_from_mountains_to_oceans_0.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://panorama.solutions/en/solution/nile-river-basin-transboundary-wetlands-conservation", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.giz.de/en/worldwide/43317.html", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://nilebasin.org/~nileba5/new-and-events/84-nbi-launches-wetlands-project-and-forum-to-protect-wetlands-in-the-nile-basin", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://nilebasin.org/~nileba5/new-and-events/84-nbi-launches-wetlands-project-and-forum-to-protect-wetlands-in-the-nile-basin", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 3, "broken": 1}, "base": {"peer": 0, "grey": 4}}, {"title": "Organic silvo-arable agroforestry on Wakelyns Farm", "db": "HUB + NbSI", "id": "784", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=784", "description": "Silvo-arable agroforestry, the practice of planting trees among crops, has reportedly boosted Wakelyns Farm's resilience to pests, built up soil fertility, and provided wildlife habitats for various species. The farm emphasises self-sufficiency by deriving energy from solar panels and woodchip boilers and minimising reliance on chemical inputs. Nature-based Intervention: Silvo-arable agroforestry is the practice of growing trees amongst crops on a farm. Wakelyns Farm in particular, has planted fruit, nut, willow coppice, and timber trees in 56 rows with arable or horticulture crops in the 10 to 15 meters between them. The trees provide wind shelter for the crops down below, roots and leaf litter to build up soil fertility, and habitats for pollinators, pest predators, and wildlife. Furthermore, the efforts to increase tree cover combined with the improved management of older trees through pollarding, a process by which the top and branches of a tree are pruned to encourage new growth, aim to increase the carbon sequestration potential of the farm's area. Leguminous ground cover crops such as clover also help build up soil fertility. The farm emphasises resilience through the use of local and on-site resources as opposed to external inputs. In the case of Wakelyn's farm, this means deriving energy from solar panels and a woodchip boiler. Overview of context and outcomes: In an otherwise primarily monocropped agricultural landscape, the owners of the 22.5 hectare Wakelyns Farm have embraced silvo-arable agroforestry to boost agrobiodiversity and resilience to pests, diseases and other stresses. The farm's agroforestry practices have provided a mix of habitats for a wide range of wildlife including 43 bird species. For two decades, the farm has been the focus of research into organic production and agroforestry.", "authors": [], "refs": [{"url": "https://www.rspb.org.uk/globalassets/downloads/policy-briefings/nature-based-solutions-adaption-report.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://wakelyns.co.uk/agroforestry/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://wakelyns.co.uk/files/ORC%20booklet%20hi.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://wakelyns.co.uk/files/ORC%20booklet%20hi.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 2, "broken": 1}, "base": {"peer": 0, "grey": 3}}, {"title": "Oyster Reef Shoreline Stabilization Project", "db": "NbSI", "id": "1151", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1151", "description": "Oyster reefs were created off the coastline of the MacDill Air Force Base in Florida in order to counteract rapid erosion occurring due the shore being near an important commercial shipping lane. Nature-based Intervention: In order to reduce coastal erosion at MacDill Air Force Base over 7,500 linear feet of oyster reefs were created off of the shoreline. These reefs were constructed in a multi-phase project which utilized concrete oyster domes and oyster shell in their creation. These oyster domes or \"reef balls\" were strategically placed off the shoreline in order to reduce wave energy. Smaller reef balls were placed in the intertidal zone to facilitate oyster and muscle growth. Overview of context and outcomes: The shoreline of MacDill Air Force Base has been rapidly eroding, with projections suggesting an erosion rate of one foot per year. This bay is subject to heavy boat traffic which likely contributes to this accelerated erosion rate. This erosion has threatened Native American historical sites along the coastline.", "authors": [], "refs": [{"url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Pointe au Chien Indigenous Community Oyster Restoration Project", "db": "NbSI", "id": "1144", "countr
