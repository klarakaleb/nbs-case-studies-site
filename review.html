y": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1144", "description": "The indigenous Pointe-au-Chien tribe used oyster shells to help them create a living shoreline as a defense mechanism against hurricanes wave action to protect culturally significant sites. Nature-based Intervention: The local Pointe-au-Chien tribe has collected over 3.5 million kilograms of oyster shells, which are a by product of the local restaurant industry, and have used them to create artificial oyster reefs to protect the shoreline from coastal erosion. The discarded shells are picked up from local restaurants daily, undergo a 6th month sterilization process, and then are fashioned into artificial reefs along the local shoreline. The sterile shells are ideal habitat for oyster larvae and attract them to establish on the structure and furthering the natural regeneration of the reef. Overview of context and outcomes: Louisiana is a state which experiences frequent hurricanes and is at high risk for coastal erosion and sea level rise. Since the 1930s the state has already lost 4,700 square kilometres of land area and it is expected to loose even more than that over the next half century. This has jeopardized important cultural burial mounds for the Pointe-au-Chien who have lead this intervention to help preserve their heritage.", "authors": [], "refs": [{"url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Program to Restore the Delaware River Basin", "db": "NbSI", "id": "1157", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1157", "description": "The Delaware River Basin Restoration Program is a collaborative network of organizations working to improve the health of the Delaware River basin and improve equal access to nature in surrounding communities. Nature-based Intervention: The Delaware River Basin Restoration Program focuses its interventions on improving wildlife habitat, water quality, reducing flood damage and recreation access. These interventions have taken many forms, such as the removal of the Columbia Dam on Paulins Kill River, a tributary of the Delaware river. This removal was the accompanied by a habitat restoration for the surrounding area. Many of their projects focus on habitat restoration and connectivity at all levels of the river basin. This includes riparian habitats, but also supporting forest restoration and natural floodplain regeneration. At the mouth of the river's tributary projects focus on marshland restoration to prepare for storm surge impacts in the surrounding areas. Interventions also focus on adding equitable recreation sites along the course of the river. Overview of context and outcomes: The Delaware river and its tributaries cover a wide range of habitats, levels of human occupation and 4 states along its course to the sea. This project represents a coordinated network of interventions designed to improve the overall health of the river basin. The project has been widely viewed as a success for its ability to coordinate a complex network of stakeholders, interventions, and organizations in order to facilitate improvements across the range states. In recognition of this success in 2022 they were awarded additional funding to support the expansion of the project into 12 more interventions.", "authors": [], "refs": [{"url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://fws.maps.arcgis.com/apps/Minimalist/index.html?appid=18258caf6a9944b3a74d1ee5755f14a5", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.fws.gov/program/delaware-river-basin-restoration", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 1, "ok": 2}, "base": {"peer": 0, "grey": 3}}, {"title": "Rangeland management for carbon sequestration", "db": "NbSI", "id": "1197", "country": "Kenya", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1197", "description": "The Northern Rangelands Trust is a collaboration between 14 pastoralist communities in order to improve the health of rangelands which in turn helps them adapt to and mitigate the impacts of climate change. Nature-based Intervention: This project encompasses 1.9 million hectares of grasslands and savannah which are communally utilized by local pastoralists. The project works with 14 different pastoral communities in northern Kenya to adapt their grazing strategies in order to address the impacts of climate change and mitigate carbon emissions. Each conservancy implements a strict grazing plan with zones designated for grazing and rotational practices implemented to facilitate grass regeneration. The regenerated and healthier rangelands are able to store higher levels of soil carbon and support healthier livestock. Overview of context and outcomes: The project represents the world's first large-scale grasslands soil carbon removal project that is dependent on changes to livestock grazing practices. This part of Kenya has been affected by droughts which have been exacerbated by climate change and threaten local livelihoods. The region is also home to Samburu, Borana, Turkana, Rendille, and Somali communities which have previously been draw into conflict when they needed to graze their livestock outside their traditional lands due to lack of available grass.", "authors": [], "refs": [{"url": "https://www.wbcsd.org/download/file/15182", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://amp-theguardian-com.cdn.ampproject.org/c/s/amp.theguardian.com/global-development/2022/nov/22/it-all-hinges-on-the-herders-worlds-largest-soil-carbon-removal-project-enlists-kenyan-pastoralists", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.nrt-kenya.org/carbon-project", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.nrt-kenya.org/carbon-project", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 2, "broken": 1}, "base": {"peer": 0, "grey": 3}}, {"title": "Restoration of wet grassland, reedbed, and fen in the Greylake Nature Reserve", "db": "HUB + NbSI", "id": "779", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=779", "description": "Conversion of arable farmland to wet grassland, reedbed, and wet fen aims to restore biodiversity in the Greylake Nature Reserve and increase the area's carbon storage potential and adaptive capacity in the face of flooding. Nature-based Intervention: Starting in 2003, the Royal Society for the Protection of Birds took over what is now called the Greylake Nature Reserve, converting 110 hectares of arable farmland to wet grassland, reedbed, and wet fen. The landscape is managed through tactical cattle grazing in the summer and water level management throughout the year to create the right conditions for wintering and breeding birds. Water level management included the creation of a constellation of 26,000 metres of gutters and ditches. Overview of context and outcomes: This mix of habitats attracts a wide variety of bird, mammal, plant, insect, and reptile species. Several species that rely on the ditch edge habitat have since returned including 137 aquatic invertebrates and 47 wetland insects.", "authors": [], "refs": [{"url": "https://www.rspb.org.uk/globalassets/downloads/policy-briefings/nature-based-solutions-adaption-report.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.rspb.org.uk/reserves-and-events/reserves-a-z/greylake/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "http://ww2.rspb.org.uk/images/reserves1_tcm9-229499.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "http://ww2.rspb.org.uk/images/reserves1_tcm9-229499.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 2, "broken": 1}, "base": {"peer": 0, "grey": 3}}, {"title": "River of Life: wetland restoration along the River Thames", "db": "HUB", "id": "1938", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1938", "description": "As part of the River of Life Project from 2013 to 2022, wetland habitats were created along the River Thames and Thame to improve biodiversity, water quality, flood alleviation and carbon sequestration, with a strong focus on engaging local communities and facilitating public access to nature. Nature-based intervention: The River of Life projects I and II created new ponds, wetlands, meadows and wet woodland next to the River Thames and River Thame, to provide habitat for wetland species, facilitate public access and engagement, alleviate flooding downstream and enhance carbon sequestration and water quality. This involved hard landscaping to create ponds, backwaters, reedbeds and areas of fen, followed by planting reeds, restoring grassland and planting trees (1). Overview of context and outcomes: Sections of the Thames river were declared ‘biologically dead’ in 1950, due to water pollution. Since then, water quality has improved due to sewage treatment and some species have returned (2). However, the long-term decline in fish species has continued and other species that depend on healthy wetlands, such as yellowhammers that feed on the insect life, are still under threat. To support these priority species, the Earth Trust - a local charity - acquired 35 hectares of floodplain land adjacent to the River Thames in 2010 and partnered with the Environment Agency to implement their first wetland restoration project. Following the success of the River of Life I, the River of Life II started in 2020. There is a strong focus on participatory engagement, working closely with local landowners and the local community, and encouraging public access and interaction with nature. As well as supporting threatened species, with thousands of fish fry (young fish) using the new wetlands, the projects have also created extra flood storage capacity and aim to improve water quality and enhance carbon sequestration. Advanced techniques are being applied to monitor biodiversity outcomes and investigate crucial knowledge gaps around the balance between emissions and sequestration of greenhouse gases during construction and restoration of the wetlands. The River of Life was the joint winner of the 2014 Chartered Institute of Ecology and Environmental Management’s Best Practice Award for Practical Nature Conservation, as an example of successful wetland habitat creation.", "authors": ["Ashworth"], "refs": [{"url": "https://earthtrust.org.uk/what_we_do/river-of-life-1/#:~:text=One%20of%20the%20early%20successes,species%20of%20fish%20were%20present", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.nhm.ac.uk/discover/news/2021/november/sharks-seahorses-and-seals-found-in-river-thames-first-health-check.html", "status": "BROKEN", "code": "404", "field": "literature"}, {"url": "https://earthtrust.org.uk/what_we_do/wetlands-soil-carbon-research/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://earthtrust.org.uk/what_we_do/river-of-life-ll/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.peridotpartners.co.uk/wp-content/uploads/2023/10/Earth-Trust-Financial-Statements-2021-22.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://earthtrust.org.uk/what_we_do/river-of-life-2-project-aims/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://earthtrust.org.uk/counting-fish-at-river-of-life-2/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://earthtrust.org.uk/river-of-life-construction-information-faqs/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://earthtrust.org.uk/what_we_do/river-of-life-1/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://earthtrust.org.uk/river-of-life-ll/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://restorerivers.eu/wiki/index.php?title=Case_study%3ARiver_of_Life", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.nhm.ac.uk/discover/news/2021/november/sharks-seahorses-and-seals-found-in-river-thames-first-health-check.html", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 10, "broken": 1}, "base": {"peer": 0, "grey": 11}}, {"title": "River restoration and hillside stabilization near Swindale Beck", "db": "HUB + NbSI", "id": "1218", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1218", "description": "Restoring a historically straightened stream to its natural meandering path to slow the flow of water through the valley, reducing downstream flood risks and improving water quality, habitat creation, and biodiversity. Nature-based Intervention: In 2016, the Royal Society for the Protection of Birds (RSPB) partnered with the landowner, United Utilities, Natural England and the Environment Agency to ‘rewiggle’ the Swindale Beck. This project involved restoring 1,140 metres of heavily human-modified river, 1,000 hectares of bog and 15 hectares of species-rich hay meadow within the Swindale Beck catchment. This involved digging a new, sinuous channel, re-homing resident fish species, planting 40,000 trees within the catchment, and re-filling and re-seeding the old channel with wildflower seed from meadows designated as a Site of Special Scientific Interest and Special Area of Conservation either side of the river. The Swindale Beck restoration is part of a wider set of works within the Swindale Valley that use best-practice land management for flood alleviation. Overview of context and outcomes: Approximately 200 years ago, the community of Swindale undertook a project to straighten a section of the beck running along the valley bottom, with the aim of speeding water flow through the valley and increasing the amount of farmland. This had the consequence of increasing flood risk for people living downstream and scouring away natural gravel banks that are important for wildlife. After the restoration environmental benefits were realised relatively quickly, with salmon spawning on the banks within months and enhanced habitat diversity able to support increased species diversity.", "authors": [], "refs": [{"url": "https://www.therrc.co.uk/sites/default/files/projects/23_swindalevalley.pdf", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://www.rspb.org.uk/globalassets/downloads/documents/reserves/haweswater-management-plan.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://restorerivers.eu/wiki/index.php?title=Case_study%3ASwindale_Beck_Restoration#Project_summary", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.youtube.com/watch?v=cH0l3y44Dww", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.therrc.co.uk/sites/default/files/projects/23_swindalevalley.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 1, "ok": 3}, "base": {"peer": 0, "grey": 4}}, {"title": "Sierra Nevada Recovery and Restoration Project", "db": "NbSI", "id": "1142", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1142", "description": "The Sierra Nevada mountain ecosystem have been ravaged by fires in recent years, so a combination of sustainable forestry to reduce fuel loads and ecosystem restoration have reportedly increased the biodiversity and fire resilience in the area. Nature-based Intervention: The United States Department of Agriculture (USDA) Joint Chiefs’ Landscape Restoration Partnership invested in nature-based fire mitigation strategies to reduce community fire risks in the Sierra Nevada Mountains. These interventions include prescribed burning treatments and targeted and sustainable forestry management to remove hazardous trees which pose direct threats to mountain communities. These interventions are critical for the reduction of the catastrophic wildfire threat posed to local communities and sensitive habitats which has been exacerbated by climate change. These targeted forestry interventions and prescribed fire treatments were implemented on more than 3,100 acres of forests and focused on 4 mountain communities in order to create natural defensible space for fire fighters should another fire threat arise. Overview of context and outcomes: The Southern Sierra Nevada mountains in the Western United States is well known for iconic natural areas such as the Yosemite Valley and the giant sequoia groves. In recent years, wildfires have ravaged the Sierra Nevada mountains leading to the loss of tens of millions of trees. Historical policies supporting fire suppression have lead to large fuel loads building up in the forests of the Sierra Nevada and creating the potential for large-scale and catastrophic fires.", "authors": [], "refs": [{"url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "status": "BROKEN", "code": "404", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Supporting Ecosystem and Community Resilience Through Wetland Restoration", "db": "NbSI", "id": "1150", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1150", "description": "Through a combination of wetland restoration and traditional Hawaiian agricultural practices the Nature conservancy worked to restore the He‘eia wetlands. Nature-based Intervention: This intervention focused on the restoration of 405 acres of wetland and the implementation of traditional Hawaiian agricultural practices in surrounding areas. The goal was to restore the natural ecosystem functions of the wetland where 8 streams intersected with the largest bay of the main Hawaiian islands. The intervention focuses on limiting sediment and nutrient run-off while also minimizing local flood risk. This included the removal of invasive red mangroves ( Rhizophora mangle ) which had lead to increased sedimentation at the mouth of the streams. The removals and restorations were executed with the assistance of over 1,000 volunteers from the local community. Overview of context and outcomes: This wetland is highly important to the local community and its restoration was able to support cultural practices as provide food and clean water for the community. This is part of a wider decades long effort to protect this important site. It is located next to the 88-acre ancient He‘eia fishpond which receives protection from the wetland and has been supported through this project.", "authors": [], "refs": [{"url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://www.nfwf.org/sites/default/files/2022-03/case-study-TNC-031622.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.whitehouse.gov/wp-content/uploads/2022/11/Nature-Based-Solutions-Resource-Guide-2022.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 1, "ok": 1}, "base": {"peer": 0, "grey": 2}}, {"title": "Supporting land rights and sustainable management in the Yaeda-Eyasi landscape", "db": "NbSI", "id": "1193", "country": "Tanzania, United Republic of", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1193", "description": "The Yaeda-Eyasi landscape is a REDD+ project which focuses on improving land-tenure rights and sustainable management in order to reduce local deforestation and support traditional hunter-gather and pastoralist communities. Nature-based Intervention: The project works with the local Hadza community and 12 local Datooga villages in order to protect the forest, upon which they all depend on for their livelihoods. The project does this through strengthening local land tenure tenure rights while simultaneously improving management capacity over local natural resources in order to diversify income strategies. After strengthening land tenure rights the project focused on sustainable land-use plans and strict village bylaws which will continue to reduce to reduce land incursions into protected areas. The initial project included 2 villages and covered 20,000 hectares, but when news of the success spread, 10 more villages joined bringing the total area of land protected to over 110,000 hectares. Overview of context and outcomes: This landscape is inhabited by both the Hadza and Datooga peoples. The Hadza are hunter-gatherers which have lived in the Yaeda Valley for 40,000 years. Their lifestyle is directly intertwined with the landscape and they are dependent on the health of the local environment. The Datooga people practice a traditional pastoralist lifestyle, and after noticing the success of the project lead by the Hadza, they collaborated with them to expand the project.", "authors": [], "refs": [{"url": "https://www.carbontanzania.com/our-projects/yaeda-valley/", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://www.wbcsd.org/download/file/15184", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.carbontanzania.com/our-projects/yaeda-valley/", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"broken": 1, "ok": 1}, "base": {"peer": 0, "grey": 2}}, {"title": "Sustainable farming and national-local co-management of the Pendjari Wildlife Reserve", "db": "NbSI", "id": "109", "country": "Benin", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=109", "description": "Organic farming methods such as intercropping, crop rotation, and tree maintenance are reducing reliance on chemical fertilizers and pesticides that have contaminated food and water sources for communities surrounding the Pendjari Wildlife Reserve. A national-local co-management scheme ensures revenues from the reserve are shared with the local communities who originally inhabited the land. Nature-based Intervention: The Union des Associations Villageoises de Gestion des Réserves de Faune Pendjari (U-AVIGREF) or the Union of Village Associations for the Management of Pendjari Wildlife Reserve, is focused on introducing organic cotton production practices requiring, for example, the maintenance of trees in cotton fields to increase soil fertility and agrobiodiversity. Villagers are also intercropping cotton with soy, maize, and cowpeas. Okra and sorrel of Guinea serve as trap plants for pests that threaten cotton. These practices not only increase pest resistance but also provide edible crops to the surrounding communities. Notably, the initiative also focuses on redistributing control over the Reserve to local communities, many of whom were forcibly relocated when the park was first established for hunting. The national body has agreed to share 30% of revenue from game hunting within the reserve with U-AVIGREF. In 2013, this share came to 38 million FCFA or 64,000 $USD. The funds were divided among participating villages to support investments in education, healthcare, and infrastructure. Overview of context and outcomes: U-AVIGREF is working to simultaneously improve income opportunities for local communities and reduce human pressures on the reserve through more sustainable agricultural practices. Cotton production is one of the main sources of income for local villages and accounts for 10-15% of the nation's GDP overall. However, it is most often carried out through monocropping methods heavily reliant on chemical fertilizers and pesticides. These chemical inputs jeopardize the health of local communities by seeping into and contaminating soil and water.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1_1469738273.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://avigref-pendjari.jimdofree.com/", "status": "BROKEN", "code": "404", "field": "resource"}, {"url": "https://doi.org/10.5367/oa.2014.0166", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://avigref-pendjari.jimdofree.com/", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 2, "broken": 1}, "base": {"peer": 1, "grey": 2}}, {"title": "Testing the efficacy of artificial grasslands for restoration and revegetation of the Qinghai-Tibetan Plateau biome", "db": "NbSI", "id": "561", "country": "China", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=561", "description": "Researchers empirically tested the potential of artificial grassland creation to restore and revegetate degraded grassland on the Qinghai-Tibetan Plateau. A four-year field test found that the intervention had a positive impact on soil quality, biomass cover, and other relevant metrics. Nature-based Intervention: In an effort to better understand possible solutions to the challenge of grassland degradation, researchers at the Southwest University for Nationalities and the Chinese Academy of Science empirically tested the merit of establishing artificial grasslands for restoring and revegetating degraded grassland, especially in heavily degraded areas. An area within the Plateau was designated for grassland planting. First, the grassland was ploughed and harrowed prior to the seeding of perennial grasses by hand at a soil depth of two to three centimetres. Nitrogen was applied for the purpose of fertilisation and finally, the plots were harrowed and tamped to prevent soil erosion. Livestock was excluded from the reseeded plots in the first year of the project, but were allowed re-entry thereafter. Overview of context and outcomes: The Qinghai-Tibetan Plateau is a globally important terrestrial biome of which two-thirds is covered by grassland. Unfortunately, anthropogenic pressures including seasonal overgrazing, poorly managed land reclamation, road construction, and sand and gold mining have caused severe land degradation. These degradation challenges are further exacerbated by climate change induced impacts including increased warming, drying, presence of pests, wind erosion, and freeze-thaw. After four years of restoration, the researchers examined the results to find that the effort had positive impacts on soil quality, biomass recovery, and several other identified metrics relevant for measuring the extent of restoration and revegetation.", "authors": [], "refs": [{"url": "https://doi.org/10.1080/15659801.2013.863669", "status": "BROKEN", "code": "405", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://doi.org/10.1080/15659801.2013.863669", "detail": "HTTP 405", "extra": "", "via": "link check"}], "health": {"broken": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "The Great North Bog: a partnership for landscape-scale peatland restoration", "db": "HUB", "id": "1912", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1912", "description": "Building on 20 years of successful peatland restoration, the Great North Bog partnership aims to use a blended finance approach to restore all of northern England’s remaining degraded upland peatlands by 2040, by bringing together a broad coalition of peatland restoration organisations to concentrate funding and resources. Nature-based intervention: Peat in northern England is highly degraded due to previous drainage, peat cutting, overgrazing, and burning, leading to high carbon dioxide emissions (1). Under the GNB, peatland restoration organisations in northern England are collaborating to mobilise collective resources and expertise. The GNB aims to facilitate faster and larger scale restoration, raise awareness of peatlands, build capacity of staff and contracts, widen the science base for restoration and conservation of peatlands, and diversify income streams to support restoration. They aim to achieve the restoration of all northern England’s peatlands by 2040 or sooner. Strategies include the blocking of grips (man-made drains), cutting, transporting and spreading heather brash using helicopters to reach remote locations, spreading of seed and fertiliser to increase habitat regeneration, and inoculating sphagnum moss into moors (2). Overview of context: Announced during COP26 in 2021, the GNB encompasses 92% of England’s upland peat (6,670 km²), including 2,150 km² of blanket bog and 4,520 km² of shallow peat. The area includes five national parks, the Peak District, Yorkshire Dales, North York Moors, Lake District, and Northumberland. Over the past 20 years, GNB partners have restored 1,100 km² of peatlands, equivalent to 20% of the total partnership area, but they now want to join together in order to rapidly increase the pace and scale of change. These ambitions are aligned with UK policies and strategies, including the Government’s 25 year plan for the environment in England, the Net Zero Strategy, and the 30x30 biodiversity goals (1).", "authors": [], "refs": [{"url": "https://greatnorthbog.org.uk/strategy/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.youtube.com/watch?v=yvKT5MpDQ0A", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://greatnorthbog.org.uk/wp-content/uploads/2023/05/Great-North-Bog-Financing.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://greatnorthbog.org.uk/about/#benefits", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.moorsforthefuture.org.uk/__data/assets/pdf_file/0024/87441/Blanket-bog-land-manager-guidance-FAQs-Report.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.northernfarmer.co.uk/news/19220930.ambitious-plans-aim-create-great-north-bog/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://greatnorthbog.org.uk/delivery-partnerships/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.peakdistrict.gov.uk/learning-about/news/archive/2022-press-releases/2022-news/funding-success-for-the-great-north-bog", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.naturenorth.org.uk/resources/nature-north-summary-document/", "status": "BROKEN", "code": "404", "field": "literature"}, {"url": "https://www.yppartnership.org.uk/news/great-north-bog-rises-climate-challenge", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.moorsforthefuture.org.uk/our-work/research-and-monitoring", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.moorsforthefuture.org.uk/__data/assets/pdf_file/0020/440228/Biodiversity-and-ecosystem-services-of-Blanket-Bogs-_Summary-Chapter_MLIFE2020_2022_web-res.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.moorsforthefuture.org.uk/__data/assets/pdf_file/0041/97979/Carbon-Audit-Update-Report-MoorLIFE-2020-2021.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.naturenorth.org.uk/resources/nature-north-summary-document/", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 12, "broken": 1}, "base": {"peer": 0, "grey": 13}}, {"title": "Wild Ennerdale: a landscape-scale partnership to reduce farming intensity and restore natural processes", "db": "HUB", "id": "1913", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1913", "description": "Boundaries between landowners in Ennerdale valley have resulted in stark contrasts in land uses. Now, partnerships between these organisations facilitate the co-operative landscape restoration and management of the second largest National Nature Reserve in Cumbria, spanning 4,400 hectares. Nature-based intervention: During the Mesolithic and Neolithic periods, the Ennerdale valley was predominantly covered in oak, alder, and birch woodlands. Forest clearings in the valley can be traced as far back as 3200 BC, and the subsequent practice of pastoral farming hindered the regrowth of trees. The Wild Ennerdale partnership aims to foster a sense of ‘wildness’ of the landscape and allow natural processes to change the valley. In this approach, farming practices continue at a reduced intensity with considerations for maximising ecology. For example, grazing approaches have been modified to use low-density year-round grazing with black Galloway cattle to mimic disturbances caused by the native herbivores that once existed on the landscape (1). Other initiatives involve the removal of river barriers, targeted species conservation approaches to benefit Arctic Char, juniper, the Marsh Fritillary butterfly and Red Squirrels, the removal of mature non-native conifers to facilitate a mixed-species forest, and the creation of the ‘Wild Ennerdale’ brand to increase tourism and support local livelihoods. Overview of context: Ennerdale valley is 14.5 km long and 5.6 km wide, surrounded by mountain peaks reaching 900 m. Historical land use includes sheep grazing and commercial forestry (2). Land management strategies differed among the three main landowners in the valley, the Forestry Commission, National Trust, and United Utilities, resulting in sharp boundaries and stark contrasts in land uses (3) However, the three landowners formed a partnership in 2002 to cooperatively manage land. The broader Lake District, encompassing Ennerdale, has been recognised as a World Heritage Site due to its cultural landscapes shaped by human society and natural processes (4).", "authors": ["Doyle", "Browning", "McCullough", "Convery", "Duston", "Rodgers"], "refs": [{"url": "https://www.wildennerdale.co.uk/wp-content/uploads/2019/02/wesp-final-11-2018.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/wp-content/uploads/2013/02/Stewardship-Plan-Text.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://consult.forestryengland.uk/forest-districts/wild_ennerdale/supporting_documents/Combined%20maps.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.lakedistrict.gov.uk/caringfor/whs/what-is-a-world-heritage-site", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.youtube.com/watch?v=EpvVmOfCDfE", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/wp-content/uploads/2019/03/wild-ennerdale-stewardship-plan-consulation-responses-summary.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cumbria-butterflies.org.uk/conservation/marsh_fritillary/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/wp-content/uploads/2013/02/Wild-Ennerdale-IFM-Magazine-2015-re-wilding-and-Giving-Artic-Charr-a-helping-hand.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/wp-content/uploads/2013/02/Wild-Ennerdale-Red-Grouse-Survey-2007.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/wp-content/uploads/2022/11/WildEnnerdaleRedGrouse-2022-draft-2.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/managing/forest/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/managing/archaeology/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://link.springer.com/chapter/10.1007/978-94-007-5326-6_12", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/wp-content/uploads/2013/02/wild-ennerdale-liaison-group-2011-summary-of-feedback.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.eocaconservation.org/projects/wild-ennerdale/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/managing/monitoring/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/wp-content/uploads/2019/02/Appendix-2-Actions-Achievements.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://committees.parliament.uk/writtenevidence/115872/pdf/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/managing/stewardship-plan/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/wp-content/uploads/2023/04/wild-ennerdale-newsletter-winter-2023.pdf", "status": "BROKEN", "code": "404", "field": "literature"}, {"url": "https://www.wildennerdale.co.uk/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [{"kind": "link", "label": "Remove dead link", "url": "https://www.wildennerdale.co.uk/wp-content/uploads/2023/04/wild-ennerdale-newsletter-winter-2023.pdf", "detail": "HTTP 404", "extra": "", "via": "link check"}], "health": {"ok": 20, "broken": 1}, "base": {"peer": 1, "grey": 20}}, {"title": "Advocating for land rights and eco-agriculture by Women and Earth", "db": "NbSI", "id": "178", "country": "Tajikistan", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=178", "description": "Zan va Zamin advocates for the land rights of landless and women farmers and promotes agrobiodiversity through the reintroduction and teaching of traditional eco-agriculture methods. Nature-based Intervention: Zan va Zamin, or Women and Earth, is an advocacy organisation that works primarily to provide land tenure to landless farmers and landless women in particular who have historically been excluded from holding land tenure. Simultaneously, the group works alongside farmers to increase local agrobiodiversity through diversified farming methods and more responsible resource management. The state of agrobiodiversity in Tajikistan has suffered as a result of state-planned industrialised agriculture that favored mono-cropping, particularly of cotton. Zan va Zamin continues to report successful reductions in the total area under industrial cotton production and increases in the cultivation of orchards of traditional fruit varieties such as apple, pear, grape, apricot, and peach. In communication with holders of traditional knowledge, eco-agriculture practices have been reintroduced and passed on, mainly through the work of twelve field schools established by Zan va Zamin. Overview of context and outcomes: The change from production of a non-edible, mainly exported crop to an edible one aims to increase food security and incomes in the region. The work is consistently underpinned by a commitment to bring forth and preserve the traditional agricultural knowledge that had evolved over generations to respond to the extreme climate of the region.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1370356763.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.devex.com/organizations/zan-va-zamin-117705", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "An eco-regional approach to ecosystem conservation in the Bale Eco-region", "db": "NbSI", "id": "733", "country": "Ethiopia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=733", "description": "Traditional conservation combined with agroforestry and climate-smart agriculture were implemented to reduce pressure to overgraze, replenish water sources, and restore soil and land integrity in the Bale Eco-region. Nature-based Intervention: Farm Africa is working with national and regional partners, supported by the European Union's Supporting Horn of Africa Resilience (SHARE) initiative, to implement improved agroforestry, sustainable farming, livestock support, water access, and community grazing land management methods. More specifically, agroforestry and climate-smart agricultural techniques such as row planting, mulching, terracing, and diversified crop planting were introduced to reduce pressures to expand farmland. Agroforestry efforts made non-timber forest products like honey, bamboo, forest coffee, and oils available to help diversify local livelihoods. To support the well-being of local livestock, community animal health workers were employed, feed was improved, and ten nature-based ponds were introduced to improve water access and availability. A community grazing plan was also introduced to ensure proper communication about and sharing of grazing lands. These efforts were implemented starting in 2014, but built on the important work of Farm Africa in the region dating back to the 1990s. Overview of context and outcomes: The Bale Eco-region is susceptible to frequent droughts and erratic and unpredictable rainfall. Highland grazing areas are also being converted to agricultural land inducing overgrazing of grassland and forest resources worsening the effects of soil erosion, flooding, drought, and disrupting the hydrological cycle of the area.", "authors": [], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://pubs.iied.org/sites/default/files/pdfs/migrate/13611IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Beaver re-introduction on the River Otter in Devon", "db": "HUB + NbSI", "id": "778", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=778", "description": "Through community-based trial and error, the UK's first beaver ( Castor fiber ) reintroduction attempt aimed to restore healthier functioning of the River Otter ecosystem and reduce downstream flooding impacts on local communities. The experiment's recent approved extension succeeded largely because of the involvement of local communities who have learned along the way how to adapt to any disruptions caused. Nature-based Intervention: In 2015, several families of beavers were reintroduced in Devon as part of the River Otter Beaver trial (ROBT). As the beavers alter the landscape in and around waterways, their dams help reduce pollution, create habitats for local wildlife, slow the speed of floods downhill, provide water storage, and combat the washing away of topsoil. Over the course of four years, the two original beaver families had built 28 dams on various tributaries in the river catchment and impounded almost two kilometres of the river creating reservoirs that serve critical ecological functions and likely aid biodiversity recovery. The proper management of their reintroduction required the participation of community members who volunteered to reduce the height of certain dams and install so-called \"beaver deceivers\" or bypass devices to deter beaver's from causing unwanted flooding of agricultural land. Overview of context and outcomes: Beavers were once common in England, Wales, and Scotland but became extinct in the sixteenth century. Their presence in Devon makes them the first wild beaver breeding in over 400 years and the first legally sanctioned reintroduction of an extinct native mammal in the country. Beavers are considered a \"keystone species,\" defined as an organism that plays a key role in holding an ecosystem together, and can serve both an ecological and social benefit. The beaver reintroduction trial is an important step toward restoring naturally functioning river systems. In August 2020, the UK's Department for Environment, Food, and Rural Affairs announced that the beavers would be allowed to remain in Devon.", "authors": [], "refs": [{"url": "https://www.wildlifetrusts.org/saving-species/beavers#:~:text=In%20May%202009%2C%20the%20Scottish,enhance%20and%20restore%20natural%20environments", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.rspb.org.uk/our-work/policy-insight/species/beaver-reintroduction-in-the-uk/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.rspb.org.uk/globalassets/downloads/policy-briefings/nature-based-solutions-adaption-report.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 0, "grey": 3}}, {"title": "Beldorney Estate Rewilding Project (Highlands Rewilding)", "db": "HUB", "id": "1936", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1936", "description": "Through rewilding riparian habitats and establishing regenerative agriculture, the Beldorney Estate rewilding project aims to increase carbon sequestration and biodiversity while delivering benefits for local communities. The estate encourages research partnerships to assess baseline biodiversity and carbon on the estate and build the science on natural capital verification. Nature-based intervention: Beldorney estate presently features extensive grasslands once subject to heavy grazing, with patches of both native and non-native woodlands as well as peatland areas (1). Highlands Rewilding acquired the estate in 2021 and conducted assessments to evaluate carbon stocks using a combination of data collection and modelling techniques. Additionally, a range of biodiversity assessments have been used to identify specific habitat types to target management initiatives and establish a biodiversity baseline for the estate. Primary interventions for the estate began in 2022 and involved enhancing carbon sequestration and biodiversity by expanding broadleaf woodland areas along the River Deveron and implementing regenerative agriculture practices to restore grasslands. Concurrently, plans are in development for the restoration of peatlands and wetlands as well as the implementation of sustainable timber production (2). Management of the estate is conducted in consultation with the local community. Overview of context: Historical land use of the area encompassed farm steadings, crofts, grazing, and more recently, the establishment of timber plantations. Until the 1870s, the estate featured extensive areas of woodland, but presently only 7.9 hectares of semi-natural woodland and 13.2 hectares of plantation-origin woodland remain in these areas (1). There are additionally 87 hectares of woodland created by planting between 1900 to 2020, including 19 hectares of broadleaf woodland, 6 hectares of mixed conifer and broadleaf, nearly 50 hectares of conifer plantations, and 12 hectares of open ground within forest areas. A 2022 analysis of natural carbon stocks indicate that estate habitats are likely to be net emitters of carbon due to degraded peat soils, but under future management scenarios have the potential to provide for 85,504 tonnes of carbon dioxide equivalent (tCO2e) sequestered over the next 100 years.", "authors": ["Glenn"], "refs": [{"url": "https://www.highlandsrewilding.co.uk/beldorney-estate", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Chimney Meadows floodplain restoration", "db": "HUB", "id": "1939", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1939", "description": "Wildflower meadows and wetlands are being restored at Chimney Meadows Nature Reserve to increase biodiversity, provide flood protection and improve water quality. Innovative financing enables the uncertain outcomes of nature-led restoration approaches to be assessed, and a targeted approach is used to monitor outcomes with limited resources. Rapid ecosystem assessment tools have been used to demonstrate the multiple benefits of restoration. Nature-based intervention: The site was restored from a commercial farm into wildflower meadows, hedgerows, and wetlands. Traditional farming methods are used to manage the meadows. New scrapes and ponds were created to facilitate wading birds and amphibians, and a fish bypass channel was installed. The nature reserve is part of a larger Upper Thames Living Landscape area which connects 2,760 hectares of riverside habitats. Overview of context and outcomes: Chimney Meadows National Nature Reserve has been managed by Berkshire, Buckinghamshire, and Oxfordshire Trust (BBOWT) since 1999. In 2003, BBOWT purchased an adjacent plot of intensively managed farmland, aiming to restore wetland features and extend floodplain hay meadows. A further acquisition of Duxford Old River in 2017 provides BBOWT with a total of 307 hectares of land managed as the Chimney Meadows Nature Reserve.", "authors": [], "refs": [{"url": "https://www.bbowt.org.uk/chimney-meadows-nature-based-solutions-case-study", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.bbowt.org.uk/chimney-meadows-nature-based-solutions-case-study", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.bbowt.org.uk/sites/default/files/2018-02/Chimney%20Meadows%20Ecosystem%20Services%20Assessment%202017%20FINAL_0.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.bbowt.org.uk/chimney-meadows-wetland-restoration-and-fish-passage-project", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://publications.naturalengland.org.uk/publication/6414097026646016", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://ukgbc.org/resources/duxford-old-river-floodplain-restoration-project-habitat-bank/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://democratic.whitehorsedc.gov.uk/documents/s58527/Oxfordshire%20Nature%20Finance%20Strategy%20v5.pdf", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.bbowt.org.uk/what-we-do/future-nature-wtc/biodiversity-net-gain/duxford-habitat-bank", "status": "LIVE", "code": "200", "field": "literature"}], "actions": [], "health": {"ok": 8}, "base": {"peer": 0, "grey": 8}}, {"title": "Climate resilient livestock production and rangeland restoration on communal lands", "db": "NbSI", "id": "354", "country": "South Africa", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=354", "description": "Communal lands in the Succulent Karoo Biome face combined pressures from climate change and overgrazing. Therefore, local farmers and pastoralists have been trained in rangeland restoration techniques and climate resilient livestock farming. Nature-based Intervention: Conservation South Africa (CSA) has worked with the Namakwa District Municipality to conserve, manage, and rehabilitate dryland rangelands in the Succulent Karoo Biome. This project worked to rehabilitate 25,000 hectares of communal rangeland and the nearby wetland that provides drinking water for livestock. The restoration activities included re-seeding, mulching with plant material and animal manure, micro-catchment management, and brush packing. Furthermore, they were trained in and encouraged to implement low-cost low-tech structures to combat soil erosion. Importantly, the farmers participated in the design of new grazing management systems to reduce over-grazing and land degradation as well as climate resilient livestock farming. Climate resilient livestock farming includes efforts to ensure the greater comfort and resilience of livestock including reducing heat, thermal, nutritional, and water stress. Overview of context and outcomes: This region is expected to become hotter, drier, and more prone to storms, floods, and droughts as a result of climate change. Households living in the area subject to the organisation's intervention rely on livestock farming as one of their main livelihood options. Rangeland and wetland restoration are important efforts to support such climate resilient livestock farming.", "authors": [], "refs": [{"url": "https://pubs.iied.org/pdfs/17622IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Combined climate smart agriculture and ecosystem-based approaches to adaptation", "db": "NbSI", "id": "362", "country": "Burkina Faso", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=362", "description": "Stone bunds, Zaï, and half-moon agriculture techniques have been implemented alongside composting, reforestation, and farmer-managed natural regeneration to reduce the vulnerability of communities to increasingly unpredictable and limited rainfall. Nature-based Intervention: Six villages in the Yatenga and Lorum provinces have worked to reduce vulnerability to unpredictable rainfall and droughts. Sustainable agriculture techniques combined with various nature-based interventions were implemented with the aim of protecting soil, conserving water, and restoring the local ecosystem's ability to retain and regulate water flows. Various farming techniques have been employed to counter the challenges of rainfall variability by improving water infiltration and soil stability and reducing erosion. Stone bunds aligned with land contours were built on 1,045 hectares of land. These stone bunds are able to reduce water run-off and erosion while increasing infiltration into surrounding soil. Zaï has been employed on 2,122 hectares of land involving digging pits in the soil before a period of rain to catch water and concentrate compost. Furthermore, a practice of farming in half-moon shapes has been increasingly embraced to capture water and hold it in place for improved uptake by arid soils. Artificial pools called Boulis were also constructed to collect water run-off, increasing water availability for livestock and crops. These farming techniques have been accompanied by reforestation and farmer-managed natural regeneration (FMNR) where 42,022 seedlings produced in five community nurseries have been planted across the project area. Furthermore, waterbody greening and gully treatment to strengthen riverbank and dam protection, biodigesters transforming domestic waste and cattle dung into biogas and fertilizer, and organic gardening have been embraced as additional interventions to improve the adaptive capacity of communities. Overview of context and outcomes: These solutions all help reduce water stress to crops during dry periods. These efforts aim to protect croplands from water and wind erosion while also further facilitating the improved regulation of water flows.", "authors": [], "refs": [{"url": "https://pubs.iied.org/pdfs/17630IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Community conservation and locally-owned forest management", "db": "NbSI", "id": "132", "country": "Papua New Guinea", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=132", "description": "The Tree Kangaroo Conservation Program aims to reduce human and environmental impacts on habitats in the Huon Peninsula of Papua New Guinea. Community-managed conservation, forest management, and organic coffee farming have been implemented to reduce pressures on local wildlife while also ensuring the stable and sustainable livelihoods of local communities. Nature-based Intervention: The Tree Kangaroo Conservation Program (TKCP) in the Huon Peninsula of Papua New Guinea works to protect the local watershed and provide the local population with sustainable livelihoods. Mainly, the community manages a protected area comprising 78,729 Ha of forest in total. Mapping and land-use planning has enabled local communities to identify agricultural areas, riparian areas, and sites slated for restoration. Conservation livelihoods programs have been created to both encourage buy-in from local communities and boost their livelihood opportunities. Furthermore, local communities have pledged to discontinue various fishing practices that have proven damaging to local ecosystems. Signage has also been posted to identify sensitive reefs and turtle nesting sites to fishers. Overview of context and outcomes: This area is of critical conservation importance due to the habitats it provides for endemic and endangered wildlife species, including the Huon tree kangaroo (Dendrolagus matschiei), that are traditionally hunted as bushmeat. Rather than banning hunting outright which would likely not have been supported by local communities, local groups designated several parcels of land as off-limits to hunting. They have also worked to set up alternative livelihood mechanisms for local communities. For example, a coffee harvesting project using organic agricultural methods was implemented. Coffee is shade grown in already existing family gardens along with other native trees and food crops. Participation in the coffee farming initiative is conditional on supporting the conservation area.", "authors": ["Schwartz", "Byers", "Miller", "Blessington", "Smith", "Dabek", "Valentine", "Williams"], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1475252084.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Community forest protection and management by indigenous peoples", "db": "NbSI", "id": "1196", "country": "Canada", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1196", "description": "The Cheakamus Community Forest is a collaboration by the Lil’wat and Squamish First Nations and the Resort Municipality of Whistler (RMOW) to protect and sustainably manage over 33,000 hectares of forest. Nature-based Intervention: In 2009 the forest allotment surrounding the Whistler ski resort became available when the Canadian Ministry of Forests and Range announced a new Community Forest program. When this opportunity arose the RMOW created a partnership with the Lil’wat and Squamish first nations communities where all three are equal partners. Together they created the Cheakamus Community Forest which encompasses 33,000 hectares in total with approximately 15,000 hectares being designated as an area where no commercial harvest is allowed. Sustainable forestry is part of the mandate for the land allotment, so the first nation's forestry partners use an Ecosystem Based Management approach to harvest approximately 40 hectares per year. Overview of context and outcomes: Whistler is the most visited tourist destination in British Columbia and has a high profile as a major outdoor recreation destination. This area of land surrounding the whistler resort was previously logged much more heavily and without indigenous community involvement. The commercial timber companies harvested 200 hectares annually with little available input from local peoples.", "authors": [], "refs": [{"url": "https://www.cheakamuscommunityforest.com/#top", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://thenarwhal.ca/bc-forests-carbon-offsets-cheakamus/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Community forests and REDD+", "db": "NbSI", "id": "525", "country": "Nepal", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=525", "description": "Community forests in Nepal are being complimented by REDD+ pilot projects, which have reportedly increased carbon stocks in the forests and provided livelihood benefits to local people. Nature-based Intervention: In 2010, a United Nations Reduced Emissions through Deforestation and forest Degradation (REDD+) pilot project began in Nepal, aiming to provide incentives for increasing and maintaining the carbon stocks in these community forests. A study of 105 of these community forests, covering a broad range of forest types and ethnically diverse communities, under the pilot scheme between 2010 and 2013 found that the project had been broadly successful for both increasing carbon sequestration and providing social benefits. The initiative involved encouraging reduced extraction of forest resources, such as by providing improved cooking stoves and biogas plants to reduce the need for firewood collection, raising awareness about sustainable harvesting, guarding to control illegal harvesting, better controlling damage due to forest fires, and creating alternative sources of income. The latter involved, for example, the provision of goats and buffalo to disadvantaged members of communities. In addition, creation of plantations on uncultivated land or sparse forest was encouraged. Overview of context and outcomes: For decades, local people have engaged in the sustainable management of community forests across Nepal, depending on them for wild food, fuel and fodder for livestock. Overall the REDD+ activities were found to provide both climate mitigation and adaptation benefits, where carbon stocks increased in most cases. The REDD+ project was reported to provide social benefits, through increasing communication and cooperation between communities and organizations. Interviews of community members showed that this resulted in increased confidence in the resilience of the communities to climate change.", "authors": [], "refs": [{"url": "https://doi.org/10.1016/j.foreco.2015.09.040", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Community management and forestry in the Kangchenjunga Conservation Area", "db": "NbSI", "id": "347", "country": "Nepal", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=347", "description": "In 2006, the Kangchenjunga Conservation Area became the first community-managed conservation area in Nepal. Since this transfer from former national government management, local communities have engaged in community forest management, restored large parts of the area, and continuously monitor and work to respond to conservation needs. Nature-based Intervention: In 2006, a historical handover of the Kangchenjunga Conservation Area (KCA)'s management responsibility to local community members made it the first protected area in the entire country to ever be managed by local community stewards. The overarching goals of the KCA are to conserve and protect biodiversity, improve the livelihoods of local communities, and advocate for and respond to conservation needs. The project created community forests as the principal forest management strategy. By 2017, 27 community forests had been created increasing the total forest cover of the KCA by 3,300 hectares. The community forests cover 72,000 hectares of land in total benefiting 1,257 households. Community managed nurseries have allowed for the distribution of over 185,000 seedlings of fruit trees, agro-forestry crops, fodder, timber, and non-timber forest products to community forests and private land in the KCA. Community members are provided with training on sustainable management of the forest including training in plant ecology and propagation techniques. Furthermore, herders were trained in improved pastureland management using techniques such as rotational grazing. Agricultural adaptation measures have also been embraced to increase crop resilience and promote integrated pest management. Forest based green enterprises focusing on non-timber forest products have boosted local incomes and provided training in techniques for value addition through natural resource processing. Overview of context and outcomes: The KCA lies within the Sacred Himalayan Landscape and is of incredible value in terms of biodiversity. The KCA was established in 1998 and was originally managed by the national government in collaboration with the World Wildlife Fund.", "authors": [], "refs": [{"url": "https://wwf.panda.org/wwf_news/?331530/Kangchenjunga-Conservation-Area-Project-1998-2017", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Community reforestation to enhance the buffer zone surrounding a landfill site", "db": "NbSI", "id": "1233", "country": "South Africa", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1233", "description": "A 787 ha buffer zone around the Buffelsdraai Landfill Site was previously under sugarcane production and has been changed into a community reforestation project. Nature-based Intervention: The Wildlands Conservation Trust’s implemented the Indigenous Trees for Life Programme surrounding the landfill site. This Programme allows for local unemployed residents to become ‘Tree-preneurs’, where they set up small-scale indigenous tree nurseries. These trees are then bought for credits by the reforestation project to be utilized at the landfill site. The credits can be utilized to purchase groceries, bicycles, building materials, cover school fees, or to receive vehicle driving lessons. There have been over 786,894 trees and other plants of over 141 species planted on 712 ha of land so far utilizing this model. These new trees also provide an important forest barrier protecting the local community from noise and air pollution from the landfill, while simultaneously capturing carbon and increasing habitat availability for local species. Overview of context and outcomes: The Buffelsdraai Landfill Site is the largest regional waste landfill within the eThekwini Municipality and the 787 ha buffer zone around it had previously been used to farm sugarcane for almost 100 years. The project to restore this buffer zone landscape was initialized by the nearby city of Durban in order to offset the emissions it would release for hosting part of the 2010 FIFA World Cup™.", "authors": [], "refs": [{"url": "https://www.researchgate.net/publication/311946376_The_Buffelsdraai_Landfill_Site_Community_Reforestation_Project", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://data.jncc.gov.uk/data/376d989f-0563-4e7f-b034-c79108f63758/nbs-triple-win-toolkit.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://panorama.solutions/en/solution/ecosystem-based-adaptation-durban-south-africa-buffelsdraai-community-reforestation-project", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 1, "grey": 2}}, {"title": "Community-based conservation of flooded forest in the Mamirauá Sustainable Development Reserve", "db": "NbSI", "id": "388", "country": "Brazil", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=388", "description": "An iterative learning process of community-based management of a flooded forest in the Brazilian Amazon is approaching a framework that simultaneously benefits biodiversity conservation and local communities. Nature-based Intervention: In 1992, in response to deforestation pressures, Mamirauá Sustainable Development Reserve (MSDR) was designated an Ecological Station which required the complete restriction of human influence on the area. However, within a few years, scientists noted that continued intense pressure from external commercial interests coupled with lack of state means for surveillance and enforcement threatened the longevity and sustainability of the forest area under the strict management scheme. Rather, the involvement of local people in the area's management was essential to its long-term viability. Therefore, in 1996, the area was re-classified as a Sustainable Development Reserve which allowed residents and legitimate users of the forest to both manage the conservation imperatives of the area and regain access to the benefits and livelihoods they had derived from the forest for generations. Since this designation, the NGO Sociedade Civil Mamirauá (SCM) has worked to develop and implement suitable approaches for carrying out effective conservation while also improving livelihoods of the residents of the area. For example, community fisheries and forestry schemes based on traditional low-impact practices have been devised to ensure sustainable harvesting of these forest resources. One of the greatest innovations of the SCM has been the combination of traditional and indigenous knowledge with modern science and monitoring to bolster sustainable resource management. This has been particularly successful in the management of local fisheries. Overview of context and outcomes: MSDR is located in one of the world's largest flooded forests and part of the Brazilian Amazon. Annually, the forest floods by roughly 12 meters to the tree tops for a six-month period. This flooded forest is thus not only of extremely high local and global biodiversity value but also of value as a regional floodplain.", "authors": [], "refs": [{"url": "https://wedocs.unep.org/bitstream/handle/20.500.11822/7945/-Connecting%20the%20Dots_%20%20%20Biodiversity,%20Adaptation,%20Food%20Security%20and%20Livelihoods-2010publicationconnectingdots.pdf?sequence=3&amp%3BisAllowed=", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "http://pubs.iied.org/pdfs/9168IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.equatorinitiative.org/2017/05/29/sociedade-civil-mamiraua/", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 0, "grey": 3}}, {"title": "Community-based floodplain resource management through revegetation and protection", "db": "NbSI", "id": "387", "country": "Bangladesh", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=387", "description": "The Haor Basin exhibits a delicately balanced ecosystem whose stability is threatened by increased instances of flooding. An integrated community management programme is implementing revegetation and tree-planting with the support of community nurseries and working to conserve areas of high ecological, social, and economic value. Nature-based Intervention: The International Union for Conservation of Nature has implemented the \"Community Based Haor Management\" project facilitated by the Bangladesh Ministry of Environment and funded by the United Nations Development Programme. The program aims to promote an integrated approach that includes habitat restoration, climate change adaptation, and social organisation and capacity building. Specific actions taken include the revegetation of weakened hillsides that encourage improved water retention in soils, the establishment of over 100 community nurseries to support reforestation efforts, and the excavation and demarcation of canals and other small water bodies as special conservation areas. A turtle hatchery was also established and has thus far released over 100 hatchlings. The initiatives are supported by capacity building, involvement, and training of local community members who are also taking advantage of available micro-credit programmes to fund other livelihood activities including duck rearing, establishing nurseries, and cultivating vegetable gardens. Overview of context and outcomes: The Haor Basin in Bangladesh is unique in that natural patterns of flooding create productive fisheries in the wet season and allow for rice harvesting in the dry season. This combination of ecosystem services is enabled by a delicately balanced ecosystem that is under threat from changing flooding patterns, over-fishing, and human manipulation of the landscape including tree-clearing. The basin is critical to local and national food security and disruptions to its functioning threaten the livelihoods of local communities as well as biodiversity in the area. The reforestation efforts using wetland species have led to the natural regeneration of grass and reed species including medicinal plants. The demarcation of conservation areas has enabled the improved protection of the globally endangered Palla's Fishing Eagle, cormorants, bats, and snails.", "authors": [], "refs": [{"url": "https://wedocs.unep.org/bitstream/handle/20.500.11822/7945/-Connecting%20the%20Dots_%20%20%20Biodiversity,%20Adaptation,%20Food%20Security%20and%20Livelihoods-2010publicationconnectingdots.pdf?sequence=3&amp%3BisAllowed=", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Community-based land and water management", "db": "NbSI", "id": "753", "country": "Sudan", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=753", "description": "A combination of nature-based solutions and grey infrastructure aims to improve water availability while community resource management groups are working to ensure more equitable access to the scarce resource. Nature-based Intervention: Community members, together with Practical Action, an NGO based in the United Kingdom, created an integrated water resource management plan (IWRM) to combine nature-based solutions, including the planting of high-quality indigenous grass seeds, with 'grey' infrastructure like building earth dams and crescent terraces. Agroforestry was also promoted in the area to restore the landscape and provide an additional source of income for community members. Most prominently, the local gum arabic tree was replanted and continuously managed. Many of the area's water challenges also stemmed from inequitable water management systems. Therefore, the communities dependent on the watershed created inclusive natural resource management committees to ensure more equitable and fair access to the scarce resource. Overview of context and outcomes: Increased unpredictability of rainfall in the Wadi El Ku and Kabkabiya catchment areas of the North Darfur State has led to increased pressure on already scarce groundwater sources. This challenge affects farmers in the area that rely on rain-fed crops like millet and sorghum for food security and livelihoods. Furthermore, pastoralists face pressure to overgraze due to sharp reductions in the plant density and diversity available for livestock. This overgrazing degrades land, reduces biodiversity, and increases desertification risks further exacerbating water scarcity challenges in the area. In some cases, the unreliable rainwater and dwindling groundwater supplies have led to the abandonment of settlements.", "authors": [], "refs": [{"url": "https://www.bond.org.uk/resources/nature-based-solutions-in-action-lessons-from-the-frontline", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Community-based mangrove forest restoration and management", "db": "NbSI", "id": "504", "country": "Vietnam", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=504", "description": "Communities in Vietnam are restoring weakened mangrove ecosystems and employing more sustainable farming and harvesting methods to boost resilience to climate change-induced flooding and other coastal pressures. Nature-based Intervention: With the support of international NGO CARE, local communities created an integrated approach to manage forthcoming climate change risks. Primarily, Community-Based Mangrove Management Boards (CMMB) were created to advance the planning and implementation of mangrove restoration to strengthen biological coastal barriers. The development and maintenance of a mature mangrove ecosystem also allows for its sustainable harvesting by community members. Furthermore, local households identified various ways to bolster more sustainable livelihood models by replacing chemical fertilizer with bio-fertilizer made from leaves and dung, employing innovative ways to grow rice and maize, and establishing stable contracts with domestic buyers of chili. Moreover, the CMMB established a group to patrol the forest and manage the sustainable use of forest resources. Overview of context and outcomes: The coastal ecosystems of the Da Loc and Nga Thuy communes have faced continual degradation due to climate change and pressures to exploit mangrove forests for timber and seafood. Upstream river pollution and the application of chemical fertiliser to crops have degraded soil quality and water resources in the area. These challenges were compounded with the devastating impact of a typhoon in 2005 that destroyed shrimp farms, 500 hectares of crops, and 100 houses. Communities were able to learn from experiences in the nearby Thai Binh province that had piloted mangrove restoration efforts in the 1990s. In the seventeen years since the initial pilot in Thai Binh, $USD 8.88 million has been spent on restoration in several parts of the country.", "authors": [], "refs": [{"url": "https://careclimatechange.org/wp-content/uploads/2019/06/Building-Coastal-Resilience-in-Vietnam.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.cifor.org/publications/pdf_files/OccPapers/OP-197.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Community-based mangrove restoration and carbon credit project", "db": "NbSI", "id": "252", "country": "Kenya", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=252", "description": "Mangrove restoration in the Gazi Bay provided critical shoreline protection and restored habitats for wildlife with additional revenues from carbon credits invested in further conservation efforts and community needs. Nature-based Intervention: The Mikoko Pamoja Community Organization (MPCO) is providing incentives for the restoration and more sustainable management of the local mangrove ecosystem through avoided deforestation and the replanting of degraded mangrove areas. The work of MPCO has generated income from carbon credits which have been used to pay for staff wages and various conservation activities, with any surplus further reinvested into the community's needs. According to the UN, the total economic value of the mangrove forest through fisheries, timber, eco-tourism, research, education, aquaculture, shoreline protection, carbon sequestration, biodiversity, as well as its mere existence value is estimated at USD$ 1,092 per
