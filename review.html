ting the risk of flooding in the area.", "authors": [], "refs": [{"url": "https://doi.org/10.3390/su4113066", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://www.nature.org/en-us/get-involved/how-to-help/places-we-protect/glacial-ridge-project/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 1, "grey": 1}}, {"title": "Mai Ndombe REDD+ project to protect biodiverse tropical forests", "db": "NbSI", "id": "1190", "country": "Congo Democratic Republic of the Congo", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1190", "description": "The Mai Ndombe REDD+ project works to protect a biodiverse section of tropical rainforest through investing in the health education, and agricultural techniques of the surrounding community. Nature-based Intervention: The Mai Ndombe Reducing Emissions from Deforestation and Forest Degradation (REDD+) Project works with local communities to protect 300,000 hectares of the Congo rainforest. The program does this by investing in reducing the drivers of deforestation through supporting the local community. The program worked to protect already forested areas and implemented reforestation in portions of the forest which had already been deforested. They also invested in community programs, such as constructing 10 schools and building a local health clinic to support community development. A large portion of the efforts to alleviate deforestation pressures also centers around the implementation of agroforestry and sustainable farming. The project has opened an agroforestry nursey and provided new crops and techniques to be utilized by the community in a way which can reduce extractive pressures on the forest system. Overview of context and outcomes: This area represents a large section highly valued area of rainforests which have been repeatedly targeted for logging concessions. There is major conflict in the region between large logging companies and the over 180,000 people which inhabit this forest. This also jeopardizes the rare species in the area and their habitat. This section of forest is home to chimpanzees ( Pan troglodytes ), bonobos( Pan paniscus ) and forest elephants( Loxodonta cyclotis ); as well as unique wetland landscapes.", "authors": [], "refs": [{"url": "https://www.wildlifeworks.com/dr-congo", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.wbcsd.org/download/file/14219", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Meuse River restoration and floodplain creation", "db": "NbSI", "id": "1185", "country": "Netherlands", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1185", "description": "Conservation organizations, gravel extraction companies, and the local government teamed up to create a 45km stretch of rewilded river with increased flood prevention capacity. Nature-based Intervention: This rewilding project focuses on taking a previously human-altered river and returning it to a more natural state in order to facilitate increased flood protection and biological regeneration. This was done through collaborating with gravel dredging companies which wished to harvest gravel from the Meuse river. During the harvesting process they helped to widen the river, lower riverbanks and therefore expand the overall floodplain. This is the largest river restoration project in the Netherlands with it covering a 45km stretch of the river called Grensmaas. They also put 200 ha of riverside lands under naturalistic grazing regimes to help facilitate regeneration. Beaver ( Castor fiber ) and otter( Lutra lutra ) were also reintroduced to the landscape. Overview of context and outcomes: This region of the Netherlands has been historically prone to flooding with major floods in 1993 and 1995 leading to residents to push for solutions to the problem. In 1980, the Meuse river system, and specifically the Grensmaas, was the only river system in the Netherlands without boat traffic. This is what had originally made it a focus point for the sand and gravel industry as a source of possible extractions. The Grensmaas river portion also flows from north to south and acts as an important ecological corridor between the upper and lower reaches of the river Meuse.", "authors": [], "refs": [], "actions": [], "health": {}, "base": {"peer": 0, "grey": 0}}, {"title": "Million Streams Project", "db": "NbSI", "id": "1243", "country": "New Zealand", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1243", "description": "The Million Metres Streams project is a national program and funding mechanism which helps identify native vegetation river restoration efforts and facilitates securing them funding from multiple sources. Nature-based program: The Million Metres Streams project is run by the Sustainable Business Network and focuses on brokering financing for community-led waterway restoration projects. The project aims to raise $10 million over the next 5 years for these projects and secures financing through partnerships with philanthropic organizations and the private sector. Until 2022, the project had accepted crowd-funding as a financing mechanism, but has updated its protocols to focus solely on businesses and philanthropic organizations. Since 2014 the project has worked with 43 local land-owners and community organizations to help finance 72 restoration projects. In total across New Zealand it has helped plant 550,000+ native tree and plant species and restored more than 80km of waterways. Overview of context and outcomes: The waterways of New Zealand currently exist in a highly degraded state. It is reported that 82% of river length in pastoral farming areas and 94% of river length in urban areas are not suitable for swimming due to pollution. On top of this 90% of the countries historic wetlands have been destroyed for alternative uses and 76% of native freshwater fish species are threatened.", "authors": [], "refs": [{"url": "https://sustainable.org.nz/projects/million-metres-streams/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://sustainable.org.nz/media/yxjbweit/mms-impact-report_final.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Multi-paddock adaptive management grazing", "db": "NbSI", "id": "703", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=703", "description": "Multi-paddock adaptive management grazing was found to support superior vegetation biomass and composure as well as higher soil quality and soil carbon levels. Nature-based Intervention: Multi-paddock adaptive grazing (henceforth: multi-paddock) consists of rotating livestock at higher densities for shorter periods of time while adapting rotational cycles to climatic conditions. This technique is based on the theory of mimicking the natural grazing patterns of herds of large, migratory herbivores which used to inhabit the great North American plains and would group together and move quickly in response to predation pressures. This is in contrast to conventional grazing management styles, where livestock are kept continuously on a few very large paddocks at lighter stocking densities, where they tend to repeatedly overgraze certain plants, often leading to lower nutritional outcomes for the cattle. Overview of context and outcomes: The results of a study conducted in a north Texas tall grass prairie suggests that multi-paddock adaptive management grazing yields better ecological and climate outcomes than other management alternatives. The study compared multi-paddock to light continuous and heavy continuous grazing sites, as well as control sites that were ungrazed. Each of these sites had been under their respective management regimes (eg. multi-paddock, heavy continuous) for at least nine years prior to the study. The results of the study found that the multi-paddock sites had superior vegetation biomass and composure and also had properties of higher soil quality such as higher soil organic matter, cation exchange capacity, fungal/bacterial ratio and aggregate stability, indicating higher water and nutrient-holding capacities.", "authors": [], "refs": [{"url": "https://doi.org/10.1016/j.agee.2011.03.009", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Multi-stakeholder association promotes marine conservation, forest management, and sustainable agriculture", "db": "NbSI", "id": "135", "country": "Madagascar", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=135", "description": "A multi-stakeholder platform underpinned by traditional governance principles based on mutual obligations and trust, is working to reduce pressures on coastal ecosystems through marine conservation, forest management, and sustainable agriculture. Nature-based Intervention: The multi-stakeholder Plateforme de Concertation pour le Développement Durable de la Baie d’Antongil (PCDDBA, Collaborative Platform for Sustainable Development of the Antongil Bay) was created to provide a space for communication and collaboration about resource management between the various groups that depend on the Antongil bay for different reasons. The PCDDBA has created 20 locally managed marine areas along the bay's coastline which are continuously monitored for illegal fishing activities. Additionally, they also work on sustainable agriculture supporting various climate resilient and sustainable agricultural practices including the planting of mucuna, a nitrogen-fixing plant that can enrich local soil during fallow periods. Furthermore, promotion of forest management practices that focus on the production of non-timber forest products helps to stave off excessive timber extraction in the area. Overview of context and outcomes: The Antongil Bay in Madagascar is the largest bay in the country and one of the most productive in the Indian Ocean. However, it suffers pressures from industrial fishing interests that come into conflict with traditional and artisanal fishing, land conversion from mangroves to rice fields, and climate change and has, as a result, seen declining fish populations and significant damage to marine ecosystems.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1490641742.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "National Park established and co-managed by indigenous association in Amazonia", "db": "NbSI", "id": "116", "country": "Colombia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=116", "description": "The Association of Indigenous Leaders of the Yaigojé Apaporis (ACIYA), composed of 21 indigenous communities, was responsible for setting up the Yaigojé Apaporis National Natural Park, the third largest of its kind in all of Colombia, effectively giving the one-million-hectare area legal protection from exploitative gold mining operations. Nature-based Intervention: Located in the Colombian Amazon, the Association of Indigenous Leaders of the Yaigojé Apaporis (ACIYA) initiated the process of creating the Yaigojé Apaporis National Natural Park and fought a legal battle for five years to achieve this feat. Joint management of the park by the ACIYA and the Colombian National Park authority has resulted in the formal documentation of traditional ecological knowledge and the strengthening of indigenous autonomy over their territory, while strengthening the protection of one million hectares of rainforest contributing to biodiversity conservation and climate change mitigation. Overview of context and outcomes: While the land was previously an indigenous reserve, it was only by converting it into a National Park that local indigenous communities could legally combat the encroaching threat of a large gold mining company.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1490725991_EN.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "National forestation program", "db": "NbSI", "id": "721", "country": "Republic of Korea", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=721", "description": "The National Forestation Program implemented by the Korean government in the 1960s and spanning several decades was found to have successfully sequestered carbon and reduced disaster risk in an economically viable way. Nature-based Intervention: After the Korean War, over half of the country's forests had been destroyed. The average stand density was reported to increase from 9.5 m3 per ha in 1960 to 146 m3 per ha in 2015. The net carbon sequestration as a result of the project was reportedly found to be positive and increase over time, with sequestration rates of up to up to 95.95 Tg CO2 per year estimated for 2010. The annual monetary benefits of carbon sequestration, disaster risk reduction (DRR), reduced soil erosion and water yield enhancement were estimated in million USD$ per year to be $2,778m, $1,019m, $278m, and $263m in 2010, respectively. Overview of context and outcomes: The national forestation program was initiated as a post-war forest rehabilitation program, and the Republic of Korea was found to be one of only four countries in which such efforts were successful, along with Germany, the UK and New Zealand, according to a 2018 study. Overall, the forestation program was found to be highly economically viable and the authors of the study recommend that it be used as an example for other national reforestation efforts. They emphasized that early and extensive investment as well as subsidiary implementations such as shifting energy source away from wood, increasing administrative regulation, and including the participation of villagers were instrumental to the success of the program.", "authors": [], "refs": [{"url": "https://doi.org/10.1016/j.ecoser.2017.11.001", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Nattergal: A natural capital approach to rewilding degraded land at scale", "db": "HUB", "id": "1944", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1944", "description": "Nattergal is a nature recovery business that aims to purchase and restore degraded land to enhance biodiversity, carbon storage, water quality and soil health, generating income through natural capital markets and eco-tourism while delivering benefits for local communities. Nature-based intervention: Nattergal aims to restore bought, leased, or managed land to improve carbon sequestration, water quality, soil function, flood protection, and air quality (1). Alongside these goals, Nattergal aims to facilitate employment and outreach opportunities for local communities and encourage research collaborations. Financial returns from restoration will be created through the sale of Biodiversity Net Gain (BNG) units and other natural capital investments. Overview of context: Nattergal was formed in 2021 as a nature recovery company that aims to promote investment in natural capital assets. Their first site, Boothby Wildland in Lincolnshire, was purchased in December 2021, and was a 617 hectare intensively managed cereal farm. Although biodiverse habitats remain around the field margins, due to good management under agri-environment schemes, 90% of original wetlands on the site have been lost. As part of restoration efforts, intensive cereal production will be gradually stopped, and vegetation will be mostly left to recover naturally. Plans include the introduction of herbivores and the restoration of natural site hydrology through the destruction of created field drains and restoration of the river. A second site of 292 hectares, High Fen Wildland in Norfolk, was purchased in December 2022 (3). Once an arable and daffodil farm, it later became unproductive and in 2007 it was restored to seasonally wet grassland in partnership with Natural England. Following research on the site, Nattergal plans to initiate restoration in 2024, aiming to increase habitat diversity and improve carbon sequestration.", "authors": ["Deklee"], "refs": [{"url": "https://www.nattergal.co.uk/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.nattergal.co.uk/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.nattergal.co.uk/boothby-wildland", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.nattergal.co.uk/high-fen-wildland", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://static1.squarespace.com/static/62bdbafba41de5210660365f/t/65cb5c2d4067a86c80f5df50/1707826221494/BNG+Boothby+Wildland+Media+Release.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.nattergal.co.uk/blog/river-restoration-slowing-the-flow", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.nattergal.co.uk/blog/working-with-water", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://rural.struttandparker.com/article/meet-the-natural-capital-pioneers/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.nattergal.co.uk/videos", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.nattergal.co.uk/partners", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.lincstrust.org.uk/sites/default/files/2022-05/05%20IdKlee%20GIGL%20EVENT-%20IVAN%20DE%20KLEE.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.nattergal.co.uk/bng", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.gov.uk/guidance/biodiversity-metric-calculate-the-biodiversity-net-gain-of-a-project-or-development", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.theguardian.com/environment/2022/nov/12/its-like-winning-the-lottery-lincolnshire-rewilding-plan-welcomed-by-some-others-not-so-happy", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://thecritic.co.uk/issues/may-2023/natural-goodness/", "status": "BLOCKED", "code": "403", "field": "literature"}], "actions": [], "health": {"ok": 15}, "base": {"peer": 0, "grey": 15}}, {"title": "Nature-based solutions across landscapes for climate change mitigation", "db": "HUB + NbSI", "id": "1262", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=1262", "description": "Natural England announced funding for six study projects which would utilize nature restoration for carbon sequestration methodologies and each cover an area of greater than 500 hectares. Nature-based Intervention: Natural England has worked with entities across the country to establish pilot sites for the implementation and evaluation of six different types of nature-based solution. Each of the projects has goals for both nature regeneration and carbon sequestration while being adapted to the local contexts. The six pilot projects are the Wild Exmoor Carbon Sequestration Project, the Wansbeck Restoration for Climate Change, the Plymouth’s Natural Grid Nature Based Solutions for Climate Change at the Landscape Scale project, the Derwent Forest Landscape Recovery Project, the Oxfordshire–Buckinghamshire Freshwater Network and the Severn Solutions for Nature’s Recovery. Each of these 6 projects helps to investigate a different ecosystem or challenges related to the implementation of nature-based solutions. One of the core goals of this research is to then discover how diverse landscapes such as nature-rich woodlands, grasslands, wetlands and urban habitats take up and store carbon. Overview of context and outcomes: The government has reported that the information from the pilot sites will be used to better inform habitat creation and contribute to tackling climate change across England. This information could be critical to help inform the creation of new carbon codes, similar to the already existing Woodland Carbon Code and the Peatland Code. This project will occur as Natural England also assess the biodiversity and carbon outcomes of previous restoration projects they have conducted.", "authors": [], "refs": [{"url": "https://www.gov.uk/government/news/pioneering-nature-projects-launched-to-test-carbon-capture-methods-in-fight-against-climate-change", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "North East Cotswold Farmer Cluster: Landscape-scale nature recovery on farmland", "db": "HUB", "id": "2023", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=2023", "description": "The North East Cotswold Farmer Cluster is a network of farmers, growers, landowners, foresters, and advisors who share knowledge and collaborate on landscape-scale regeneration of farmed environments in the North East Cotswolds. Nature-based intervention: Collectively, the group of over 161 farmers and landowners covers 47,600 hectares (1). To improve natural capital and address climate change while facilitating resilient food and farming businesses, the group collaborates to achieve six main objectives: i) improve soil health, ii) monitor, create, and connect priority habitats, iii) grow the local food economy through innovative practices, iv) access private investment and public funding opportunities, v) monitor outcomes at multiple scales, and vi) engage with communities. The Cluster is working on a variety of projects, all of which are laying the groundwork for their flagship Evenlode Landscape Recovery project, a 20 year vision for landscape restoration that is part of Defra’s Environmental Land Management scheme (15). This will focus on improving river health, reducing flooding and improving biodiversity. It initially targets riparian land parcels in the Evenlode and Windrush valleys that cover 14% of the area, through actions such as floodplain meadow and river restoration. Habitat restoration across the catchment will include arable reversion to grassland, creation and restoration of wetlands, ponds, watercourses and traditional orchards, and tree planting in carefully selected locations. A pilot ‘One field’ project (2) modelled the potential financial benefits of different potential options for a single arable field that frequently floods, and developed a progressive conversion strategy with flexible endpoints that can be determined by the landowner. From an arable baseline, the project can move to no till, then reversion to agricultural grass, herbal ley, floodplain meadow, and lastly to a floodplain habitat mosaic. Benefits for soil, carbon, water quality and biodiversity increase significantly at each step, for a minimal reduction in food production (3). Other measures considered as part of the Landscape Recovery project include redirecting water from natural springs and underdrainage networks to create floodplain habitats (4), creating multi-threaded river systems (5), and restoring straightened and embanked river channels to their historical sinuous pathways (6). Targeted support for species includes wildflowers for pollinators, winter feeding of wild birds, creation of fish and eel passes, and floodplain restoration for wading birds. Overview of context: Farmer Clusters are local groups of farmers and other landowners or land managers who work together on common goals, helping them to share knowledge and attract more funding. There are over 100 clusters in the UK, and although the North East Cotswolds cluster was only established in 2020 it has grown rapidly to become one of the largest in the country. It is based around the Evenlode and Windrush catchments in the Thames Valley and the Cotswolds National Landscape (formerly ‘Area of Outstanding Natural Beauty’) (7), aiming to facilitate landscape-scale environmental projects using a bottom-up governance approach (9). In common with many lowland agricultural regions, the area has undergone widespread conversion of grassland to arable land since 1945 (8) and now suffers severe problems with soil erosion, flooding, poor water quality and biodiversity loss, which the project aims to help tackle in partnership with other organisations.", "authors": ["Rossel", "Webster"], "refs": [{"url": "https://www.cotswoldfarmers.org/about", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/lr-1", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.southeastfarmer.net/features/environmental-health-and-restoration-a-common-theme/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/lr-3", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/lr-4", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/lr-5", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://floodplainmeadows.org.uk/sites/default/files/resources/Farmer-led%20projects%20to%20enable%20landscape%20scale%20ecosystem%20recovery%20%28Tim%20Field%29.pdf", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://drive.google.com/file/d/1gbFXh0oShoK_02Q_qe5NeWSVC8lg2i-Q/view", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://agricology.co.uk/research-projects/north-east-cotswold-farmer-cluster-cic/", "status": "BLOCKED", "code": "403", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/soil-carbon-baselining", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.youtube.com/watch?v=JEdiY6qtinY&amp;list=PLWTgP69uJo05aFv_-Nqb3Nro3ypIJBpB-&amp;index=1", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.blenheimestate.com/news/local-farmers-join-forces.html", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/lr-2", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.youtube.com/watch?app=desktop&amp;v=cyuDfpxBF0g", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/evenlode-landscape-recovery", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.youtube.com/watch?v=ugE6yWs8hNw&amp;list=PLWTgP69uJo05aFv_-Nqb3Nro3ypIJBpB-&amp;index=6", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://drive.google.com/file/d/1qyW1Uwkqb1yBnE-bcFyyrNJXH1DGUCQA/view", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/habitat-creation-lyneham", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/supplementary-bird-feeding", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/post/slides-from-our-1st-agm", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/deer-and-venison", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/membership", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.oxbury.com/blog/neirf-grant", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://arcg.is/1WuXDD", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://arcg.is/1WuXDD", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://repository.rothamsted.ac.uk/item/987w9/the-cost-effectiveness-of-reflectance-spectroscopy-for-estimating-soil-organic-carbon", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/windrush-floodplain-meadows", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.youtube.com/watch?v=enSwZ5uqR5Q&amp;t=18s", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://www.cotswoldfarmers.org/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 29}, "base": {"peer": 0, "grey": 29}}, {"title": "Organic farming, conservation, and restoration in a wetland ecosystem", "db": "NbSI", "id": "127", "country": "Nepal", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=127", "description": "The Alliance for Integrated Development (AID-Nepal) works to protect and manage the resources of Nepal's largest human-made wetland ecosystem. Organic farming and restoration efforts conserve biodiversity in the area, of birds in particular, and support sustainable livelihood options. Nature-based Intervention: The Alliance for Integrated Development (AID-Nepal) works to maintain biodiversity in the Jagadishpur wetland and create sustainable livelihood options for surrounding communities. The main activities implemented include organic farming, riverbank restoration and reforestation, anti-poaching, sustainable livelihoods, and developing ecotourism. The organic farming practices implemented focus on reducing reliance on chemical fertilisers and integrated pest management, providing technical, in-the-field training to support the implementation of these practices. These efforts all serve to support sustainable livelihood options for surrounding communities and have a particular focus on conserving the variety of birdlife in the wetland, including endangered vultures and cranes. Overview of context and outcomes: The Jagadishpur wetland is the largest human-made wetland area in Nepal covering an area of 2.25 square kilometres. It was initially constructed in 1972 for irrigation purposes but was later declared a Ramsar site in 2003. The wetland provides important ecological functions and serves as habitat for wildlife, especially birds, while also harbouring water to irrigate more than 6,200 hectares of surrounding agricultural land. The integrity of the wetland is threatened by overexploitation through sand extraction, poaching, land conversion, deforestation, water pollution from inorganic agricultural runoff, and invasive alien species. Furthermore, the wetland is classified as being in a \"submerged succession stage,\" a stage in a natural transition of open water to swamp to dry woodland. Although part of a natural transition process, this risks disrupting the water security of surrounding farms.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1469733171_EN.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Organic silvo-arable agroforestry on Whitehall Farm", "db": "HUB + NbSI", "id": "785", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=785", "description": "Silvo-arable agroforestry, the practice of planting trees between crops, has been largely successful on the 125 hectare Whitehall Farm, reportedly reducing soil erosion and increasing agro-biodiversity. Agro-ecology principles have also been embraced to attract wildlife including pollinators and pest predators. Nature-based Intervention: In 2009, Stephen and Lynn Briggs started planting rows of apple trees 27 metres apart, leaving enough space for farm machinery to cultivate cereals in the alleys between them. The apple trees are intended to provide several benefits to the farming system including improved soil quality and greater resilience through crop diversity. Furthermore, the direction of the planted tree rows allows for optimised sun exposure during the day for all crops, extending harvesting possibilities throughout the year. Agro-ecology principles were also adopted throughout the farm including leaving 15% of the area as habitat for pollinators and pest predators. Wildflower strips beneath trees attract pollinators and grassy flower-rich buffers around the fields protect the soil from being washed into watercourses. Ditches dug are deliberately left unkempt to provide habitat for wildlife. Seed mix strips are sown to feed farmland birds. Overview of context and outcomes: Soils at Whitehall Farm are particularly susceptible to wind erosion, a challenge that was exacerbated by the destabilised quality of the soil prior to the introduction of agroforestry principles. The tenants managed to secure a 15 year tenancy as opposed to the traditional 3-4 year tenancy to allow significant time for their agroforestry investments and efforts on the 125 hectare plot to succeed.", "authors": [], "refs": [{"url": "https://www.rspb.org.uk/globalassets/downloads/policy-briefings/nature-based-solutions-adaption-report.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.agricology.co.uk/field/farmer-profiles/stephen-briggs", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://agroforestrynet.eu/afinet/whitehall-farm-an-innovative-silvoarable-orchard-system-in-the-uk", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 0, "grey": 3}}, {"title": "Oyster breakwater reefs support climate adaptation", "db": "NbSI", "id": "576", "country": "Bangladesh", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=576", "description": "Oyster breakwater reefs promote adjacent mudflat stability and salt marsh growth in a monsoon-dominated subtropical coast. Nature-based Intervention: On Kutubdia Island off the coast of Bangladesh, three oyster reefs were constructed on tidal mud flats using precast concrete rings. These reefs were deployed parallel to the coastline to serve as wave-break structures by attenuating wave energy. The concrete rings were first allowed to be colonized by oyster larvae and other marine organisms such as barnacles, sea anemones and gastropods for two years, before being deployed to their final location. The intervention primarily addresses the challenges of disaster risk reduction and climate change adaptation by dissipating wave energy and acting as breakwaters for tidal water. Overview of context and outcomes: This intervention showed that breakwater oyster reefs can help reduce erosion, trap suspended sediment, and support seaward saltmarsh expansion, demonstrating their potential as a credible nature-based solution for protecting subtropical coastlines.", "authors": [], "refs": [{"url": "https://doi.org/10.1038/s41598-019-44925-6", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Participatory forest restoration in semiarid areas of North Africa", "db": "NbSI", "id": "613", "country": "Morocco", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=613", "description": "Aiming to serve as an example of more participatory ecological restoration in semiarid areas of North Africa, this initiative involved scientists, managers, and local stakeholders in every part of a project aiming to restore an area of Tetraclinis articulata forest in Morocco. Nature-based Intervention: A group of researchers launched a Participatory Ecological Restoration project in the Béni Boufrah Forests. The approach was based on knowledge sharing, trust, and active stakeholder participation with scientists, managers, and local stakeholders involved in and guiding every step of the process from planning to outcome monitoring. This participatory process was applied to all steps of the restoration initiative including the identification of restoration priorities, assessment of land-use options, definition of the restoration procedure, participatory plantation, evaluation, surveillance, and monitoring. Specifically, the restoration efforts were conducted on a one-hectare area of land where 250 plants were planted by 90 participants (57 men and 33 women). The area is primarily Tetraclinis articulata forest. As such, a stakeholder workshop concluded that the planting of Tetraclinis and other similar wood species would be most appropriate. Overview of context and outcomes: Semiarid regions of North Africa face frequent challenges of land degradation resulting from both human- and climate change-induced pressures. Simultaneously, efforts to achieve the ecological restoration of previously degraded land has had minimal success as they are often conducted in an often non-participatory and top-down manner.", "authors": [], "refs": [{"url": "https://doi.org/10.1111/rec.12486", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Participatory integrated watershed management in Yunnan province", "db": "NbSI", "id": "138", "country": "China", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=138", "description": "The Yunnan Green Watershed Management Research and Promotion Centre consists of an indigenous self-organization and participatory watershed management model, focusing on actions such as agroforestry, organic farming, tree planting, recovering fishing resources, water use management, wetland restoration, and forest protection. Nature-based Intervention: Four autonomous organizations for resource management were founded as part of the community initiative: two watershed management groups belonging to the Naxi and Yi communities, which have reportedly brought mudslides under control, established agroforestry projects which have increased incomes, and protected over 1,300 hectares of mountain forest. The remaining two organizations under the initiative consist of a fishermen’s association which has banned illegal nets and and works to recover and strengthen the local fishing industry, and a water users association which has successfully managed water access issues and negotiated fair upstream and downstream water use. Overview of context and outcomes: The initiative was formed in the aftermath of the Lashihai Dam project in 1998, which flooded large areas of farmland with impounded water and left the Naxi indigenous people displaced with few livelihood options other than farming unstable hillsides, leading to mudslides, and overfishing the Lashihai Lake.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/Green-Watershed-China.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Participatory plant breeding, community-based seed banks and agroecology practices", "db": "NbSI", "id": "656", "country": "China", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=656", "description": "Mountain farmers are employing community-based seed banks, participatory plant breeding, and agroecology practices informed by traditional knowledge to counter risks of increased food insecurity, climate change impacts, and unsustainable industrial farming practices. Nature-based Intervention: Local farmers have partnered with the Farmers' Seed Network of China and scientists from the Chinese Academy of Sciences to conserve and recover traditional seeds and indigenous crop varieties through participatory plant breeding, seed banks, and the incorporation of indigenous knowledge to improve farmers' old seed varieties to better withstand drought and pest infestations. In addition, 18 villages managing a total of 337 hectares of land have driven the uptake of agroecology practices that help restore biodiversity on farms, naturally control pests, and better conserve water and soil. More specifically, such practices, based on value systems and traditional diversified farming practices of the regions' Indigenous Peoples, include shifting farming, reviving intercropping, combining crop production with duck and fish cultivation, and reintroducing trees that promote healthy soils. Beyond agroecology interventions, reforestation and the return to traditional forest management on the mountain landscapes surrounding the farms support more sustainable water and soil management. The initiative also focused on providing farmers with greater access to markets. Collective agreements and actions have been fostered within and between the communities involved to take advantage of this improved market access. Overview of context and outcomes: Farmers in the Yunnan and Guangxi Provinces have seen changes to typical rainfall patterns causing more severe and prolonged periods of drought, often followed by more intense flooding. These climate change impacts have compounded the challenges farmers already faced due to increased deforestation and land degradation from unsustainable agricultural practices such as the expansion of industrial monoculture farming. These efforts also helped respond to a significant loss of local food crop varieties in years prior to the intervention. More precisely, communities in the area reported having lost 50 local food crop varieties before the project began. All efforts employed are reportedly rooted in participatory methods and engagement with indigenous communities, ensuring traditional knowledge centrally informs plant breeding, implemented agroecology practices, and improved management of the surrounding landscapes including forests, mountains, and freshwater sources such as rivers, lakes, and ponds. These collectives, by nature of the sustainable practices employed, have gained a strong reputation in niche high-value markets that value environmentally friendly products.", "authors": [], "refs": [], "actions": [], "health": {}, "base": {"peer": 0, "grey": 0}}, {"title": "Peatland forest restoration for emissions reductions", "db": "NbSI", "id": "1166", "country": "Indonesia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1166", "description": "In order to capture carbon and repair a fire damaged landscape, a large-scale ecosystem restoration project was undertaken in the Merang peatlands on the island of Sumatra. Nature-based Intervention: This project is managed under the Reduced Emissions from Degradation and Deforestation (REDD+) program and focuses on the revitalization of a tropical peatland forest. In the intervention they use a combination of techniques such as afforestation, reforestation, revegetation and wetlands restoration and conservation. So far these interventions have restored 22,934 hectares of peatland rainforest. In continuing the project they hope to focus on assisted natural regeneration strategies to expand the footprint of the restored landscape. Overview of context and outcomes: This protected landscape is located at the heart of the Merang peat dome. This is a one-contiguous high carbon stock peatland which covers more than 150,000 hectares of high priority conservation area. The area is also located along the important Merang biodiversity corridor and is 5km away from Sembilang National Park. This area was damaged by fires in 2015, and remains fire prone due to canals built in attempts to drain the peatlands.", "authors": [], "refs": [{"url": "https://www.wbcsd.org/download/file/14220", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://forestcarbon.com/projects/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Peatland restoration to protect water supplies in the Garron Plateau", "db": "HUB + NbSI", "id": "782", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=782", "description": "Activities to restore the Garron Plateau containing the largest area of peat bog in Northern Ireland began in 2010 after 95% of the bog had been degraded. Nature-based Intervention: In 2010, the Royal Society for the Protection of Birds, Northern Ireland Water and the Northern Ireland Environment Agency worked together to restore the bog through activities such as building thousands of small timber, peat and stone dams to block drains and ditches and negotiating agreements with local farmers to reduce the pressures from livestock grazing. As of 2016, 28% of the site had been restored to a favorable condition, and a further 27% was considered to be in a recovering condition, while the rest was still deemed degraded and in unfavorable condition, according to project reports. Restoration efforts are continuing and the initiative has an objective of having the entirety of the site returned to a favorable condition by 2045. The predicted value of the total benefits of the project is estimated to be £37 million by 2045, with the most value attributable to increased climate mitigation capacity complemented by increased quality water provisioning and ecological resilience of the area. Overview of context and outcomes: The peatland area of the Garron Plateau feeds into the Dungonnell Reservoir, which supplies water to 12,000 people and is a globally important Ramsar wetland site. However, as the area became almost completely degraded, the quality the water supplied decreased markedly, elevating the costs of water treatment.", "authors": [], "refs": [{"url": "https://www.rspb.org.uk/globalassets/downloads/policy-briefings/nature-based-solutions-adaption-report.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.rspb.org.uk/globalassets/downloads/about-us/valuing-our-peatlands.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.niwater.com/climatechange/news/garron-plateau-bog-project/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 0, "grey": 3}}, {"title": "Peru’s Potato Park preserves and restores diversity of potatoes and other Andean crops", "db": "NbSI", "id": "353", "country": "Peru", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=353", "description": "The Potato Park in Peru is managed by a collective of indigenous communities who employ traditional knowledge and management methods to restore agrobiodiversity, particularly of potatoes, adapt agricultural systems to climate change, and strengthen cultural identity and sovereignty in the area. Nature-based Intervention: Established in 2002, the Potato Park, located in the Cusco region in the Pisac district of Peru, aims to protect agrobiodiversity, particularly of potatoes. The Potato Park spans over 9,000 hectares in a mountainous area in the Andes. The Potato Park works with six local indigenous Quechua communities and aims to expand this partnership to a further 23 communities. Management of the area is governed by participating communities who hold a collective land title and have enacted an inter-community benefit-sharing agreement based on customary laws. Principally, the Potato Park aims to protect the diversity of native potato varieties as well as other Andean crops. Depending on which type of classification system is used, the area boasts 650 potato varieties, or 1,200 according to traditional classifications. Concretely, measures implemented included the diversification of crop planting with some farmers planting as many as 200 potato varieties. Additionally, working with the International Potato Centre, 410 locally adapted potato varieties, samples of which had been collected from the area in the 1960s and 1970s, were reintroduced further supporting the diversification and protection of agricultural resources. Furthermore, other biocultural innovations were documented in the Potato Park including the increased use of natural fertilisers and pesticides and shifting the range of cultivation to adapt to changing microclimates. Overview of context and outcomes: Efforts to safeguard and enhance food systems and native agrobiodiversity is rooted in indigenous biocultural heritage, traditional knowledge, and community-led and rights-based methods of management. The communal management structure of the Potato Park allows for collaborative learning through experimentation that can help communities effectively adapt local ecosystems to a changing climate.", "authors": [], "refs": [{"url": "https://pubs.iied.org/pdfs/17619IIED.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "http://pubs.iied.org/14663IIED", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Promoting sustainable livelihoods through forest conservation and the protection and cultivation of native medicinal plants", "db": "NbSI", "id": "187", "country": "Venezuela, Bolivarian Republic of", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=187", "description": "The Foundation for Alternative Tropical Agriculture and Sustainable Development (FUNDATADI) works to conserve local forests and biodiversity and promote sustainable livelihoods through agricultural diversification, primarily through the introduction and cultivation of medicinal plants. Nature-based Intervention: The Foundation for Alternative Tropical Agriculture and Sustainable Development (FUNDATADI) works with rural Piedemonte Andino communities in northwest Venezuela. FUNDATADI works principally to promote sustainable livelihoods and conserve local forests in the Ramal de Calderas forest corridor which has a high level of biodiversity and species endemism. Forest conservation takes the form of reforesting using native trees grown in community nurseries and the protection of over 47 hectares of coffee forest. Furthermore, sustainable livelihood options developed for local communities are designed taking into account potential impacts on local forests. Most prominently, FUNDATADI promotes agricultural diversification through the organic cultivation of native medicinal plants in family gardens. In order to market and diversify livelihood options using these medicinal plants, community organisations have been established to process raw materials from family plantations to develop marketable products including artisanal infusions, soaps, and syrups. Overview of context and outcomes: Progressive deforestation over the past two decades has threatened the stability and well-being of the over 1,000 species of plants and animals endemic to the area, including 21 endangered species.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1348160682.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Protecting and managing an area of South American temperate rainforest", "db": "NbSI", "id": "1194", "country": "Chile", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1194", "description": "The Valdivian Coastal Reserve is a large protected area which had previously been owned by a forestry company until the Nature conservancy was able to purchase it and begin managing it in collaboration with local communities. Nature-based Intervention: This project began in 2003 when the Nature Conservancy was able to purchase the forest area in a commercial auction from a forestry company which had gone bankrupt. In 2005 they formalized the 150,000 acres of land into the Valdivian Coastal Reserve. In collaboration with the Chilean government they then donated 25,500 acres of native forest which had previously been in the Valdivian Coastal Reserve in order to create the adjoining Alerce Coastal National Park. The reserve also works with local fisherman and indigenous communities to support traditional land uses and sustainable economic development. The project is also working to restore a 8,400 acre section of non-native eucalyptus trees with native plant species. Overview of context and outcomes: The Valdivian Coastal Reserve includes large sections of old growth temperate forest including Alerce ( Fitzroya cupressoides ) trees which are 2,500 years old. This area is also a key biodiversity hotspot with over 50% of the world’s temperate rainforests having already been destroyed. The reserve is now a tourist destination which receives many summertime visitors wishing to explore the landscape.", "authors": [], "refs": [{"url": "https://www.nature.org/content/dam/tnc/nature/en/documents/ValdivianCoastalReservefactsheetENG.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Push-pull biological control for maize production", "db": "NbSI", "id": "810", "country": "Kenya", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=810", "description": "Push-pull biological control involves using certain plants to both attract and repel pests, in this case helping to increase yields of maize crops while reducing the need for harmful pesticides. Nature-based Intervention: The ‘push-pull’ system has been widely implemented in Kenya to reduce loss of maize to pests, leading to increase in yields and net income, and a concurrent reduction in the incidence of poverty. The system works by incorporating different native grasses and legume fodder species into the agro-ecosystem, alongside the maize, in order to simultaneously deter and distract pests to reduce pest damage on maize. Napier grass ( Pennisetum purpureum ) or Sudan grass ( Sorghum vulgare ) are planted around the border of the field and attract the stem-borer moth pests away from the maize crop, acting as a ‘pull’. In tandem, desmodiums ( Desmodium uncinatum and Desmodium intortum ) are planted within the maize crop between the rows and release natural volatile chemicals that repel the pests, acting as the ‘push’. In addition to providing insect control, the push and pull plants can be fed to livestock. Moreover, desmodium is a legume and so fixes nitrogen from the air, increasing the nitrate content of the soil. Furthermore, it also releases chemicals from its roots which prevent germination of the parasitic striga weed. Molasses grass ( Melinis minutiflora ) is also used as a “push” plant as it is key habitat to support large populations of parasitoid wasps which hunt the stem boring pests. Overview of context and outcomes: Changes in the climate drive shifts in the distribution and numbers of insects, plants and pathogens that are pests for agriculture. This paired with the effect of climatic patterns on crops means that regions such as western Kenya are at higher risk for crop damage and loss. This push-pull system falls under the umbrella of companion planting , one of several agro-ecological techniques that harness nature to reduce external inputs and improve agricultural production. The additional biomass provided can also help improve the amount of organic matter and moisture held within the soil.", "authors": ["Pickett", "Woodcock", "Midega", "Khan", "Lamichhane", "Barzman", "Booij", "Boonekamp"], "refs": [{"url": "https://doi.org/10.1016/j.landusepol.2018.05.041", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://doi.org/10.1007/s13593-014-0275-9", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://doi.org/10.1016/j.copbio.2013.12.006", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 3}, "base": {"peer": 3, "grey": 0}}, {"title": "Reef enhancement and vegetation restoration to enhance coastal resilience in Grenville Bay", "db": "NbSI", "id": "312", "country": "Grenada", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=312", "description": "Community planned and implemented reef enhancement and mangrove restoration aims to break wave energy, reduce coastal erosion, and create a habitat for fish, coral, and other species. Nature-based Intervention: Residents of Grenville Bay have carried out reef enhancement and restored mangrove forests to combat the consequences of sea level rise including coastal erosion, flooding, and greater storm surges. The engineered artificial reef structure used in Grenville Bay provides a stable substrate for coral colonization and restoration of habitats for fish and other species. The design of the reef enhancement project was informed by wave energy modeling, in-depth measurements of the seabed, and continuous engagements with community members of Grenville. The intervention was intentionally made modular, easy to assemble on-site, and significantly porous to allow for habitat enhancement. Fishers and commercial divers from the area both constructed and installed the artificial reef using locally available materials including cement, steel, cinder blocks, and stones from an adjacent quarry. Community members also worked to improve the biological barrier of the shoreline through the planting and nursing of mangrove seedlings to restore the habitats that had previously been lost to coastal erosion. Overview of context and outcomes: Grenville Bay in Grenada was faced with the combined threats of coastal erosion, sedimentation, and rising sea levels. As the Bay's coastline began to erode it caused both ecological economic threats to the local community as the important harbor risked being blocked by sediment requiring dredging (1). As an alternative to structural measures to combat coastal erosion that can sometimes compromise coastal habitats, reef enhancement aims to strengthen existing reefs through the building and planting of artificial reef-like structures. These structures will over time become integrated into the existing reefs through the commingling of habitats and coral regeneration. Reef enhancement measures improve the capacity of formerly degraded reefs to break wave energy, reduce coastal erosion, and minimize flooding.", "authors": ["Reguero", "Beck", "Agostini", "Kramer", "Hancock", "Kuwae", "Hori", "Hylkema"], "refs": [{"url": "https://reefresilience.org/case-studies/grenada-coastal-resilience/", "status": "LIVE", "code": "200", "field": "literature"}, {"url": "https://portals.iucn.org/library/sites/library/files/documents/2015-042-2nd%20ed.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://doi.org/10.1016/j.jenvman.2018.01.024", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://panorama.solutions/en/solution/waters-edge-enhancing-coastal-resilience-grenada", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://coastalresilience.org/mapping-the-reef-video-in-grenada/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://coastalresilience.org/project/grenada-at-the-waters-edge/", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 6}, "base": {"peer": 1, "grey": 5}}, {"title": "Reforestation, agroforestry, and fishing regulations along the Gulf of Kabuno", "db": "NbSI", "id": "304", "country": "Congo Democratic Republic of the Congo", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=304", "description": "Sustainable agriculture and agroforestry combined with political advocacy for improved regulation of fishing in Lake Kivu are helping restore coastal forests and aquatic habitats in the Gulf of Kabuno. Reforestation efforts also aim to improve the carbon storage potential of the surrounding area to counter Lake Kivu's high rates of carbon and methane emissions. Nature-based Intervention: The Program to support Arable and Livestock Farmers for Local Development (PAEDE) is working to train local community members in more sustainable agricultural practices. Furthermore, communities are engaging in reforestation projects using agroforestry species to help improve the carbon storage potential of the area. These reforestation efforts also help preserve endangered bees and fingerlings. In order to help protect aquatic species, PAEDE has introduced riparian sugar cane and seaweed which provide suitable environments to protect fish and other wildlife. Furthermore, in order to advance an enabling regulatory environment for these developments, PAEDE also advocates for legal changes to better regulate fishing, including in protected areas on the shoreline of the Gulf of Kabuno. Overview of context and outcomes: Ecosystems on the Gulf of Kabuno shores are threatened by deforestation, habitat destruction, and the spillover effects of unsustainable fishing in Lake Kivu.", "authors": [], "refs": [{"url": "https://portals.iucn.org/library/sites/library/files/documents/2016-075.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Reforestation, agroforestry, and sustainable water management in Pico Bonito National Park", "db": "NbSI", "id": "156", "country": "Honduras", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=156", "description": "27 village water committees have come together to guide community-based, decentralised water management, reforestation, and agroforestry. Widespread planting of native tree species, improved monitoring of water sharing and use between communities, and reduced dependence on local firewood have improved the availability of potable water and increased biodiversity and agricultural productivity in the area. Nature-based Intervention: An association of 27 village water committees in the southern buffer zone of the Pico Bonito National Park were able to attribute a declining freshwater supply to deforestation, unsustainable agricultural practices, ranching, and firewood collection. To respond to this growing challenge, the village water committees work together to maintain water delivery systems, protect recharge areas, and collect and regulate water fees. In addition, they are promoting agro-forestry projects, such as the planting of guama trees among conventional corn and bean crops, and the replanting of native trees in order to restore ecosystem functioning that naturally supports freshwater regulation in the area. The association trains local communities in these various techniques and the application of environmentally friendly technologies and serve as a model management structure for more than 80 communities across the northern coast of Honduras. Overview of context and outcomes: A 40,000 hectare watershed is currently under the association's protection.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1_1370554910.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}, {"url": "https://unfccc.int/climate-action/momentum-for-change/activity-database/communities-organizing-for-watersheds", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "Regional federation promotes agro-ecological principles to local smallholder farmers", "db": "NbSI", "id": "111", "country": "Niger", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=111", "description": "The Fédération des Unions de Producteurs de Maradi Gaskiya has brought communities from around the Maradi region in Niger together to promote agro-ecological principles among smallholder farmers including the use of bio-fertiliser, high-yield crops, organic seeds, and more diversified agricultural production. A main tenet of the intervention is the participatory on-farm research process that allows solutions to be tailored to the needs of farmers themselves. Nature-based Intervention: The Fédération des Unions de Producteurs de Maradi Gaskiya promotes the use of high-yield crops, the marketing of organic certified seeds, the use of bio-fertilisers such as ashes or manure, as well as the diversification of agricultural production systems. Furthermore, in order to improve food security, fast-growing and off-season crops are also being introduced, with most of the income from these sources accruing to local women. Community members themselves were involved in seed testing and were therefore able to select their preferred indigenous, climate resilient varieties. This participatory on-farm research method is an important element of the Fédération's work in the area as it allows for the involvement of local farmers who are able to tailor the agricultural options to their needs. For example, the Fédération worked with the German Ministry for Economic Cooperation and Development to develop superior, trait-specific farmer-preferred millet populations which were vetted by farmers themselves. This research process was conducted in a gender-disaggregated way allowing for an evaluation of different preferences and knowledge held by women and men. Overview of context and outcomes: The Fédération des Unions de Producteurs de Maradi Gaskiya is a research-driven initiative aiming to bring agro-ecological options to small holder farmers in the Maradi region of Niger.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1_1471989173.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Reintroduction of traditional grazing practice to restore degraded rangeland", "db": "NbSI", "id": "577", "country": "Tunisia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=577", "description": "A traditional grazing technique called gdel was reintroduced in an area of south-eastern Tunisia to allow for the regeneration of local rangelands. The technique allows for plots of land to \"rest\" between grazing periods to encourage the recovery of vegetation. Nature-based Intervention: A traditional grazing technique, gdel , has recently been reintroduced in the Chenini community rangelands in south-eastern Tunisia. Gdel is the practice of allowing parts of the rangeland to \"rest\" without active grazing for a period of time to allow for the recovery of vegetation. The interventions were reintroduced and monitored across a 7,600 hectare area, including a control site of free grazing to allow for adequate monitoring of the results. Sites across the area were sheltered from grazing for up to three years and then exposed to short durations of grazing of one to two years at a time. Overview of context and outcomes: Grazing is the most extensive land use practice in southern Tunisia. Unfortunately, the rangelands in the region have suffered severe degradation over many decades largely due climate change impacts and the emergence of an agro-pastoral society in the place of a formerly pastoral one. During this evolution, traditional grazing patterns were largely abandoned which further exacerbated the unsustainable management of the rangelands.", "authors": [], "refs": [{"url": "https://doi.org/10.1108/IJCCSM-02-2018-0019", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Restoration of a marshland ecosystem for local community flood protection", "db": "NbSI", "id": "1186", "country": "Netherlands", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1186", "description": "The Kempen-Broek project involves the restoration of agricultural lands back to their previously marshland state through rewilding practices which provide flood protections for downstream communities. Nature-based Intervention: The intervention created a almost 2000 ha wetland system that would act as a water buffer and reduce the risk of flooding in the downstream cities of Eindhoven and Den Bosch. The land was individually acquired farm parcels which were eventually re-connected. Hydrological cohesiveness was evaluated and when key parcels were able to be joined, restoration efforts would begin. This included removing fencing and drainage, while rewetting the landscape in a way that wouldn't impact nearby farmers. Naturalistic grazing regimes were then re-implemented utilizing free-ranging herds of Exmoor horses and Tauros cattle. Old fen systems also had sediment dug out as part of the restoration. Overview of context and outcomes: This area had previously been a 15 000 ha marsh system, but it was drained during WW2 in order to increase food production in the area. As the land returned to wetlands the project made an effort to link these changes to the local community. ARK Nature engaged the local community in the project by organizing events to celebrate milestones, using names of areas inspired by local culture, adding access gates and creating a book highlighting the oral history of the area.", "authors": [], "refs": [{"url": "https://royalsocietypublishing.org/doi/10.1098/rstb.2017.0434", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Restoration of lowland fen for flood management in Wicken Fen", "db": "HUB + NbSI", "id": "776", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=776", "description": "Previously converted land at Wicken Fen in the United Kingdom, has been restored to lowland fen to reduce flood risk and recover the biodiversity that once characterised the area. A flood storage area has been created to further reduce damaging flood impacts. Nature-based Intervention: A large portion of former farmland in Wicken Fen, an area owned by the UK National Trust, has been restored to lowland fen. A flood storage area has also been created that can respond to a 1 in 20 year flooding event. The restoration of the lowland fen was also motivated by a desire to bring back the booming biodiversity that once characterised the area. Overview of context and outcomes: The Fenlands are a coastal plain in England that have traditionally boasted natural marsh with rich biodiversity. Unfortunately, most of the area has been drained to encourage arable farming. As the underlying peat of the marshy land dries out, it oxidises and subsides, bringing the farmland below sea level and increasing its associated flood risk. Man-made rivers now run at an average of three meters above the fields. These raised rivers are contained by embankments and flood risk is reduced through the use of pumps in high-pressure conditions. However, flood risk remains high as flooding pressures increase and rainfall becomes more erratic due to climate change. In the event that the embankments or pumps fail, flooding could be serious.", "authors": [], "refs": [{"url": "https://www.rspb.org.uk/globalassets/downloads/policy-briefings/nature-based-solutions-adaption-report.pdf", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://dx.doi.org/10.1002%2Fece3.1248", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 1, "grey": 1}}, {"title": "Restoration of trout streams, riparian habitat and watersheds", "db": "NbSI", "id": "709", "country": "United States", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=709", "description": "Across the Western United States of America, trout habitat such as streams and rivers is being increasingly affected by climate change. The restoration efforts highlighted here have taken whole-landscape approaches, including restoring headwater meadows and wetlands, riparian habitat and floodplain areas. Nature-based Intervention: Maggie Creek, Nevada; Crow Creek, Idaho; and Wasson Creek, Montana have made efforts at riparian restoration to benefit local trout populations. In order to mitigate the effects of warmer temperatures, streams were shaded by restored riparian trees and the number and size of deep pools were reportedly increased. Headwater meadows and wetlands were restored in order to keep ﬂows in headwaters longer, serving to mitigate the effect of earlier peak ﬂows. Natural meanders were restored and recreated, slowing the flow of water, reducing sedimentation and bank erosion and recharging aquifers which help to mitigate the effects of increasing summer droughts. Large burn-resistant wet zones along the streams were created to reduce the impact of wildfires by increasing the width and lushness of riparian areas and by introducing beavers that help create wetlands. Floodplains were restored and reconnected to riparian zones, in order to reduce the damage caused by winter floods. Lastly, other sources of stress which can compound the effects of climate change were reduced through improved livestock management near riparian zones and restructuring dams that were barriers to fish migration helping to reconnecting trout populations to improve their resilience. Overview of context and outcomes: Climate change, compounded by other human-induced disturbances such as livestock grazing and channel straightening, has had and will continue to have negative effects on trout populations. Warmer water temperatures in summer months, earlier peak ﬂows, decreasing summer ﬂows, increased incidences of wildfires, and winter flooding are climatic changes that have been documented in the streams and rivers in the Western USA, and which have harmful effects on trout populations.", "authors": [], "refs": [{"url": "https://doi.org/10.1080/03632415.2015.1049692", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Restoring ecosystem services for smallholder farmers", "db": "NbSI", "id": "581", "country": "Vietnam", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=581", "description": "Reforestation and agricultural landscape restoration have been employed to reduce the impacts of climate-related hazards on local communities. Nature-based Intervention: An ecosystem-based adaptation pilot was conducted in So’n Tho commune, a mountainous area of Vietnam comprised of 75% forest and 15% agricultural land. The upper slopes of the landscape were planted with native timber species to restore lost biodiversity. The middle part of mountain slopes were planted with orange trees using pineapple and peanut pinto trees as contours. Nearly 12,000 seedlings were planted as well as forty hectares protected to restore the low density forest area of the commune. Compost from increased vegetation and agricultural output provided organic fertilizer for orange farmers. Overview of context and outcomes: Smallholder farmers depend on the landscape for various ecosystem services. Therefore, the ecosystem-based adaptation scheme aimed to reduce the risk of climate-related hazards including droughts, heat waves, whirlwinds, storms and ensure food security through increased agricultural resilience and forest restoration. Furthermore, farmers generated additional income from beehives placed in the forest that also contributed to pollinating trees.", "authors": [], "refs": [{"url": "https://doi.org/10.1007/s10457-018-0302-y", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 1, "grey": 0}}, {"title": "Reversing desertification and land degradation in the community of Abrha Weatsbha", "db": "NbSI", "id": "167", "country": "Ethiopia", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=167", "description": "In response to the threats of desertification and land degradation, the community of Abrha Weatsbha carried out land rehabilitation and reclamation efforts through reforestation, water management, the establishment of temporary areas closed to grazing in order to allow for regeneration, composting to improve soil fertility, and agroforestry. Nature-based Intervention: As part of this initiative, over 224,000 hectares of forest have been reforested and brought under more sustainable management in order to improve soil quality, increase crop yields, improve biomass production and groundwater functioning, and prevent damaging flooding impacts. The organization has constructed small dams, created water catchment ponds, and built trenches and wells to restore groundwater functioning and to increase access to potable water. In addition to improved water management, the community has also changed its agricultural practices and crop selections to better matched the needs and potential of the water-scarce area. Overview of context and outcomes: The Abrha Weatsbha community faced rapid desertification and intense water scarcity before the implementation of the intervention.", "authors": [], "refs": [{"url": "https://www.equatorinitiative.org/wp-content/uploads/2017/05/case_1370354707.pdf", "status": "BLOCKED", "code": "403", "field": "resource"}], "actions": [], "health": {"ok": 1}, "base": {"peer": 0, "grey": 1}}, {"title": "Reversing land and soil degradation through reforestation", "db": "NbSI", "id": "1164", "country": "Republic of Moldova", "view": "https://casestudies.naturebasedsolutionsinitiative.org/?p=1164", "description": "The Moldova Soil Conservation Project focuses on restoring degraded lands across the country through wide scale reforestation efforts covering 20.3 thousand ha of previously degraded lands. Nature-based Intervention: The project focused on using reforestation and afforestation to repair degraded lands and vulnerable soils. This included the return of 20.3 thousand ha of previously degraded lands back into general production. The implementation of this program involved working with a network of 383 communities and 23 forest enterprises within the country. Over 60% of the project sites are owned by local communities and plating took place at 2,421 different project locations. The project also opens up use of the forests to sustainable timber harvesting and the harvesting of non-wood forest products in order to bolster local livelihood outcomes. In areas which are highly degraded the project utilized fast growing tree species such as Robinia pseudoacacia and Gleditschia triachantos to stabilize the soil and and once the landscape has recovered the species can be harvested and replaced with native oak and ash. Overview of context and outcomes: Moldova faces widespread risks from land degradation and soil erosion. More than 50% of the countries territory is located on land which has an incline making it vulnerable to erosion and gully formation. The erosion risk is widespread and more than 80,000 ha of land have been destroyed by the formation of 6,200 ravines. A goal of the project was to support Moldova's commitments to the United Nations Framework Convention on Climate Changes (UNFCCC) and the Kyoto Protocol mechanisms.", "authors": [], "refs": [{"url": "http://www.moldsilva.gov.md/pageview.php?l=en&idc=227&t=/Cooperation/Soil-conservation-project/Moldova-Soil-Conservation-Project/", "status": "LIVE", "code": "200", "field": "resource"}, {"url": "https://www.cbd.int/doc/nbsap/nbsapcbw-ceeca-03/nbsap-chisinau-moldova.pdf", "status": "LIVE", "code": "200", "field": "resource"}], "actions": [], "health": {"ok": 2}, "base": {"peer": 0, "grey": 2}}, {"title": "River restoration for natural flood management in Eddleston Water", "db": "HUB + NbSI", "id": "781", "country": "United Kingdom", "view": "https://nbshub.naturebasedsolutionsinitiative.org/?p=781", "description": "The restoration of a straightened river included re-connecting the river to its surrounding floodplain and creating storage ponds and small wetlands. These measures aimed to improve natural flood management of the catchment w
