const dec=JSON.parse(localStorage.getItem('nbsrev')||'{}');
let sel=0;
const progEl=document.getElementById('prog'),listEl=document.getElementById('list'),caseEl=document.getElementById('casePanel');
const id=(c,i)=>c.title+'#'+i;
function save(){localStorage.setItem('nbsrev',JSON.stringify(dec))}
const notes=JSON.parse(localStorage.getItem('nbsrevnotes')||'{}');
function setNote(k,v){if(v.trim())notes[k]=v;else delete notes[k];localStorage.setItem('nbsrevnotes',JSON.stringify(notes))}
function onNote(i,v){setNote(id(DATA[sel],i),v)}
function onLitNote(j,v){const c=DATA[sel];setNote(litKey(c,found[c.title][j]),v)}
const DBS=['all','HUB','NbSI'];
const ACTF=[['all','All'],['link','🔗 Link rot'],['enrich','✚ Enrichment'],['discuss','⁉️ Needs discussion']];
let dbf='all', actf='all', sortMode='review';
const peerFrac=c=>{const t=c.base.peer+c.base.grey;return t?c.base.peer/t:-1};
function toggleSort(){sortMode=sortMode==='review'?'thin':'review';document.getElementById('sortbtn').textContent=sortMode==='review'?'Sort: review queue':'Sort: thinnest evidence';renderList()}
const dbMatch=c=>dbf==='all'||c.db.includes(dbf);
const actKind=(f,a)=>f==='all'?true:f==='link'?a.kind==='link':f==='discuss'?a.flag==='Needs discussion':a.kind!=='link';
const matching=c=>c.actions.map((a,i)=>[a,i]).filter(([a])=>actKind(actf,a));
const searchQ=()=>(document.getElementById('search').value||'').toLowerCase().trim();
const searchMatch=c=>{const q=searchQ();return !q||c.title.toLowerCase().includes(q)||(c.country||'').toLowerCase().includes(q)};
const caseVisible=c=>{if(!dbMatch(c)||!searchMatch(c))return false;return searchQ()?true:(actf==='all'||matching(c).length>0)};
const visIdx=()=>DATA.map((c,n)=>n).filter(n=>caseVisible(DATA[n]));
function caseDone(c){const m=matching(c);return m.length>0&&m.every(([a,i])=>dec[id(c,i)])}
function fixSel(){const v=visIdx();if(!v.includes(sel))sel=v.length?v[0]:0}
function renderFilt(){
  document.getElementById('filt').innerHTML='<span class="flab">Cases</span>'+DBS.map(f=>`<button class="fb ${f===dbf?'on':''}" onclick="setF('${f}')">${f==='all'?'All':f} ${DATA.filter(c=>f==='all'||c.db.includes(f)).length}</button>`).join('');
  document.getElementById('actfilt').innerHTML='<span class="flab">Items</span>'+ACTF.map(([f,lab])=>`<button class="fb ${f===actf?'on':''}" onclick="setA('${f}')">${lab} ${DATA.reduce((s,c)=>s+c.actions.filter(a=>actKind(f,a)).length,0)}</button>`).join('');
}
function setF(f){dbf=f;fixSel();renderFilt();renderCase()}
function setA(f){actf=f;fixSel();renderFilt();renderCase()}
function renderList(){
  const vis=DATA.map((c,n)=>[c,n]).filter(([c])=>caseVisible(c));
  if(sortMode==='thin')vis.sort((a,b)=>peerFrac(a[0])-peerFrac(b[0]));
  const total=DATA.reduce((s,c)=>s+matching(c).length,0);
  const done=DATA.reduce((s,c)=>s+matching(c).filter(([a,i])=>dec[id(c,i)]).length,0);
  progEl.textContent=`${vis.length} cases · ${done}/${total} ${actf==='all'?'items':actf} decided`;
  listEl.innerHTML=vis.map(([c,n])=>{const m=matching(c).length,bt=c.base.peer+c.base.grey;return `<div class="cl ${n===sel?'sel':''} ${caseDone(c)?'done':''}" onclick="pick(${n})">
    <div class="cl-row"><span class="t">${esc(c.title)}</span>${m?`<span class="n">${m}</span>`:''}</div>
    ${bt?`<div class="ib-mini" title="📗 ${c.base.peer} peer-reviewed · 📄 ${c.base.grey} grey"><span style="width:${Math.round(100*c.base.peer/bt)}%"></span></div>`:''}</div>`}).join('');
}
function renderCase(){
  const c=DATA[sel];
  caseEl.innerHTML=`<div class="hdr"><span class="badge">${c.db}</span>
    <a href="${c.view}" target="_blank">view case ↗</a></div>
    <h2>${esc(c.title)}</h2>
    <div class="desc">${esc(c.description)||'<i>no description</i>'}</div>
    <div class="refs">${refGroup(c,'literature','📚 Literature')}${refGroup(c,'resource','🌐 Resources')}${c.refs.length?'':'<span class=pill>no refs checked</span>'}</div>
    <div class="infobase" title="evidence mix — no judgement, just the balance of source types">Evidence base:
      <span class="ib-bar"><span class="ib-peer" style="width:${(c.base.peer+c.base.grey)?Math.round(100*c.base.peer/(c.base.peer+c.base.grey)):0}%"></span></span>
      📗 ${c.base.peer} peer-reviewed · 📄 ${c.base.grey} grey${(c.base.peer+c.base.grey)?'':' — no refs'}</div>
    ${matching(c).map(([a,i])=>{const d=dec[id(c,i)];const cl={link:'🔗 link',literature:'📚 literature',resource:'🌐 resource'}[a.kind]||a.kind;return `<div class="item kind-${a.kind} ${d?'decided':''} ${a.flag==='Needs discussion'?'flagged':''}">
      <div class="lab"><span class="chip c-${a.kind}">${cl}</span>${esc(a.label)}${a.via?`<span class="via">via ${esc(a.via)}</span>`:''}</div>
      ${a.flag==='Needs discussion'?`<div class="flag"><b>⁉️ Flagged for discussion</b>${a.by?` by ${esc(a.by)}`:''}${a.fnote?` — “${esc(a.fnote)}”`:''}</div>`:''}
      ${a.url?`<a class="u" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.url)} ↗</a>`:''}
      ${a.detail?`<div class="d">${esc(a.detail)}</div>`:''}
      ${a.extra?`<div class="d">archive: <a href="${esc(a.extra)}" target="_blank" rel="noopener">${esc(a.extra)} ↗</a></div>`:''}
      <div class="btns"><button class="acc ${d==='accept'?'on':''}" onclick="set(${i},'accept')">✓ Accept</button>
      <button class="rej ${d==='reject'?'on':''}" onclick="set(${i},'reject')">✕ Reject</button>
      <button class="dis ${d==='discuss'?'on':''}" onclick="set(${i},'discuss')">? Discuss</button>
      ${d?`<button class="undo" onclick="set(${i},'${d}')" title="undo decision">↺ undo</button>`:''}</div>
      <input class="note" placeholder="note / why (optional)" value="${esc(notes[id(c,i)]||'')}" oninput="onNote(${i},this.value)"></div>`}).join('')}
    <div class="litbox"><div class="lithead">🔎 Find more literature (live, via OpenAlex) <a class="keylink" onclick="setKey()">use my key</a></div>
      <div class="litctl"><button onclick="findLit()">🔎 Find papers for this case</button>
      <input id="litauthor" placeholder="narrow by author(s) — comma-separated" onkeydown="if(event.key==='Enter')findLit()"/></div>
      ${(c.authors||[]).length?`<div class="authchips">cited authors → click to add (multiple ok): ${c.authors.map((n,j)=>`<button class="authchip" onclick="searchAuthor(${j})">${esc(n)}</button>`).join('')}</div>`:''}
      <div id="litresults"></div></div>`;
  renderLit(c);
  renderList();
}
const MAILTO='nbs-case-studies@naturebasedsolutionsinitiative.org';
const OA_KEY='';
function oaqs(o){o.mailto=MAILTO;const k=localStorage.getItem('nbs_oa_key')||OA_KEY;if(k)o.api_key=k;return new URLSearchParams(o);}
function setKey(){const cur=localStorage.getItem('nbs_oa_key')||'';const k=prompt('Your OpenAlex API key (optional — blank uses the shared one):',cur);if(k===null)return;k.trim()?localStorage.setItem('nbs_oa_key',k.trim()):localStorage.removeItem('nbs_oa_key')}
const found={},foundQ={},litHist={};
function litBack(){const c=DATA[sel],h=litHist[c.title];if(!h||!h.length)return;const p=h.pop();document.getElementById('litauthor').value=p.q;found[c.title]=p.res;foundQ[c.title]=p.q;renderLit(c)}
async function jget(u){const r=await fetch(u);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
function parseOA(w){return{title:w.title||'',year:w.publication_year,
  authors:(w.authorships||[]).slice(0,3).map(a=>a.author.display_name),
  url:w.doi||((w.primary_location||{}).landing_page_url)||w.id,cited:w.cited_by_count||0,src:'OpenAlex'};}
function parseCR(w){const doi=(w.DOI||'').toLowerCase();return{title:(w.title||[''])[0]||'',
  year:((w.issued||{})['date-parts']||[[null]])[0][0],
  authors:(w.author||[]).slice(0,3).map(a=>((a.given||'')+' '+(a.family||'')).trim()),
  url:doi?('https://doi.org/'+doi):'',cited:w['is-referenced-by-count']||0,src:'Crossref'};}
async function crTopic(q,authors){const p={query:q,rows:'12',mailto:MAILTO};if(authors&&authors.length)p['query.author']=authors.join(' ');
  const d=await jget('https://api.crossref.org/works?'+new URLSearchParams(p));return ((d.message||{}).items||[]).map(parseCR).filter(x=>x.title);}
async function oaTopic(q){const d=await jget('https://api.openalex.org/works?'+oaqs({search:q,per_page:'6'}));return (d.results||[]).map(parseOA);}
async function oaAuthors(names,topic){
  const ids=[];
  for(const name of names){try{
    const a=await jget('https://api.openalex.org/authors?'+oaqs({search:name,per_page:'1'}));
    if((a.results||[]).length)ids.push(a.results[0].id.split('/').pop());
  }catch(e){}}
  if(!ids.length)return [];
  const p={filter:'authorships.author.id:'+ids.join('|'),per_page:'12',sort:'cited_by_count:desc'};
  if(topic)p.search=topic;
  const d=await jget('https://api.openalex.org/works?'+oaqs(p));return (d.results||[]).map(parseOA);}
async function findLit(){
  const c=DATA[sel],box=document.getElementById('litresults');box.innerHTML='<div class="d">searching OpenAlex…</div>';
  const authors=document.getElementById('litauthor').value.split(',').map(s=>s.trim()).filter(Boolean);
  const topic=(c.title+' '+(c.country||'')).trim();
  if(found[c.title]!==undefined){(litHist[c.title]=litHist[c.title]||[]).push({q:foundQ[c.title]||'',res:found[c.title]});}
  try{
    let papers=[];
    try{papers=authors.length?await oaAuthors(authors,topic):await oaTopic(topic);}catch(e){}
    if(!papers.length){box.innerHTML='<div class="d">OpenAlex quiet — trying Crossref…</div>';papers=await crTopic(topic,authors);}
    found[c.title]=papers;foundQ[c.title]=document.getElementById('litauthor').value;renderLit(c);
    if(!papers.length)box.innerHTML=`<div class="d">no papers found${authors.length?' for '+esc(authors.join(', ')):''} — try a broader author/term</div>`;
  }catch(e){box.innerHTML='<div class="d">search failed: '+esc(''+e)+'</div>';}
}
function litKey(c,p){return c.title+'#lit#'+(p.url||p.title)}
function renderLit(c){
  const box=document.getElementById('litresults');if(!box)return;
  const ps=found[c.title]||[];
  const back=(litHist[c.title]&&litHist[c.title].length)?'<button class="litback" onclick="litBack()">← back to previous search</button>':'';
  box.innerHTML=back+(ps.length?ps.map((p,j)=>{const d=dec[litKey(c,p)];
    const al=p.authors.filter(Boolean).map((n,k)=>`<button class="authchip authsm" onclick="searchAuthorFrom(${j},${k})" title="find more by this author">${esc(n)}</button>`).join(' ');
    return `<div class="item kind-literature ${d?'decided':''}">
      <div class="lab"><span class="chip c-literature">📚 candidate</span>${esc(p.title)} (${p.year||'n/a'})<span class="via">via ${esc(p.src||'OpenAlex')}</span></div>
      <div class="d">${al} · cited ${p.cited}×</div>
      ${p.url?`<a class="u" href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.url)} ↗</a>`:''}
      <div class="btns"><button class="acc ${d==='accept'?'on':''}" onclick="setLit(${j},'accept')">✓ Accept</button>
      <button class="rej ${d==='reject'?'on':''}" onclick="setLit(${j},'reject')">✕ Reject</button>
      <button class="dis ${d==='discuss'?'on':''}" onclick="setLit(${j},'discuss')">? Discuss</button></div>
      <input class="note" placeholder="note / why (optional)" value="${esc(notes[litKey(c,p)]||'')}" oninput="onLitNote(${j},this.value)"></div>`;}).join(''):(back?'<div class="d">no results</div>':''));
}
function setLit(j,v){const c=DATA[sel],k=litKey(c,found[c.title][j]);if(dec[k]===v)delete dec[k];else dec[k]=v;save();renderLit(c)}
function addAuthor(name){const inp=document.getElementById('litauthor');const cur=inp.value.split(',').map(s=>s.trim()).filter(Boolean);if(!cur.includes(name))cur.push(name);inp.value=cur.join(', ');findLit()}
function searchAuthor(j){addAuthor(DATA[sel].authors[j])}
function searchAuthorFrom(j,k){window.scrollTo(0,document.body.scrollHeight);addAuthor(found[DATA[sel].title][j].authors[k])}
function set(i,v){const k=id(DATA[sel],i);if(dec[k]===v)delete dec[k];else dec[k]=v;save();renderCase()}
function pick(n){sel=n;renderCase();window.scrollTo(0,0)}
function exportJSON(){
  const out=[];DATA.forEach(c=>c.actions.forEach((a,i)=>{const k=id(c,i),d=dec[k],nt=notes[k];if(d||nt)out.push({case:c.title,action:a.label,url:a.url,decision:d||'',note:nt||''})}));
  Object.keys(found).forEach(t=>found[t].forEach(p=>{const k=t+'#lit#'+(p.url||p.title),d=dec[k],nt=notes[k];if(d||nt)out.push({case:t,action:'add literature (found)',url:p.url,decision:d||'',note:nt||''})}));
  const b=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='review-decisions.json';a.click();
}
function refGroup(c,field,label){
  const items=c.refs.filter(r=>r.field===field);
  if(!items.length) return '';
  return `<div class="refgrp"><span class="rl">${label} (${items.length})</span>`+items.map(r=>{
    let host;try{host=new URL(r.url).hostname.replace(/^www\./,'')}catch(e){host=r.url.slice(0,28)}
    const code=r.code&&r.code!=='0'?' '+r.code:'';
    return `<a class="pill ${r.status}" href="${esc(r.url)}" target="_blank" rel="noopener" title="${esc(r.url)}">${esc(host)} · ${r.status.toLowerCase()}${code}</a>`;
  }).join('')+`</div>`;
}
function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
addEventListener('keydown',e=>{
  const v=visIdx(), p=v.indexOf(sel);
  if(e.key==='j'&&p<v.length-1)pick(v[p+1]);
  else if(e.key==='k'&&p>0)pick(v[p-1]);
  else{const c=DATA[sel],m=matching(c).find(([a,i])=>!dec[id(c,i)]);if(!m)return;const i=m[1];
    if(e.key==='a')set(i,'accept');else if(e.key==='r')set(i,'reject');else if(e.key==='d')set(i,'discuss');}
});
renderFilt();renderCase();
</script></body></html>
